<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="view-transition" content="same-origin">
<title>VOLO SST — Pointage</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
:root{
  --bg:#0C0608;
  --card:rgba(28,16,18,.90);--card2:rgba(38,22,26,.94);--cardSolid:#1C1012;
  --gold:#C9A84C;--goldL:#E8C84A;
  --rescue:#E65100;--rescueL:#FF6D00;--rescueD:#BF360C;--rescueGlow:rgba(230,81,0,.15);
  --red:#C0392B;--green:#27AE60;--orange:#E67E22;
  --txt:#F5F0EB;--muted:#C9BAA9;--border:rgba(68,40,46,.55);
  --blue:#3B82F6;--radius:14px;--radius-sm:10px;--radius-lg:18px;
}
body.light{
  --bg:#F8FAFC;--card:rgba(255,255,255,.96);--card2:rgba(241,245,249,.98);--cardSolid:#fff;
  --gold:#C2410C;--goldL:#EA580C;
  --rescue:#E65100;--rescueL:#EA580C;--rescueD:#BF360C;--rescueGlow:rgba(230,81,0,.09);
  --txt:#0F172A;--muted:#64748B;--border:rgba(203,213,225,.9);
}
*{margin:0;padding:0;box-sizing:border-box;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px;}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;transition:background .3s,color .2s;}
@view-transition{navigation:auto}
/* -- View Transitions -- */
@keyframes vt-fade-in{from{opacity:0}to{opacity:1}}
@keyframes vt-fade-out{from{opacity:1}to{opacity:0}}
@keyframes vt-slide-from-right{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes vt-slide-to-left{from{transform:translateX(0);opacity:1}to{transform:translateX(-30px);opacity:0}}
@keyframes vt-slide-from-left{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes vt-slide-to-right{from{transform:translateX(0);opacity:1}to{transform:translateX(30px);opacity:0}}

::view-transition-old(root){animation:.25s ease-out both vt-fade-out}
::view-transition-new(root){animation:.25s ease-out both vt-fade-in}

::view-transition-old(page-content){animation:.3s ease-out both vt-slide-to-left}
::view-transition-new(page-content){animation:.3s ease-in both vt-slide-from-right}

.header{view-transition-name:main-header}
::view-transition-old(main-header){animation:.2s ease-out both vt-fade-out}
::view-transition-new(main-header){animation:.2s ease-in both vt-fade-in}

@media(prefers-reduced-motion:reduce){
  ::view-transition-old(root),::view-transition-new(root),
  ::view-transition-old(page-content),::view-transition-new(page-content),
  ::view-transition-old(main-header),::view-transition-new(main-header){animation-duration:.01s}
}
.gold-bar{height:3px;background:linear-gradient(90deg,transparent 0%,var(--rescue) 20%,var(--gold) 50%,var(--rescue) 80%,transparent 100%);background-size:200% 100%;animation:shimmer 3s linear infinite;position:relative;z-index:200;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(230,81,0,.2)}50%{box-shadow:0 0 40px rgba(230,81,0,.45)}}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.3}}
.net-badge{position:fixed;top:10px;right:14px;display:flex;align-items:center;gap:5px;font-size:.65em;font-family:'JetBrains Mono',monospace;z-index:150;padding:4px 12px;background:rgba(28,16,18,.92);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(10px);}
body.light .net-badge{background:rgba(248,250,252,.95);}
.net-dot{width:7px;height:7px;border-radius:50%;}
.net-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.net-dot.off{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulseDot 1.5s infinite;}
.container{max-width:480px;margin:0 auto;padding:12px 16px 100px;min-height:100vh;min-height:100dvh;position:relative;z-index:1;}
.header{text-align:center;padding:14px 0 10px;position:relative;}
.header h1{font-family:'Oswald',sans-serif;font-size:1.35em;font-weight:600;color:var(--rescue);letter-spacing:3px;text-shadow:0 0 20px rgba(230,81,0,.2);}
.header .sub{font-size:.7em;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.back-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:var(--radius-sm);font-size:.72em;font-family:'Oswald',sans-serif;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.back-btn:hover{border-color:var(--rescue);color:var(--rescue);}
.eagle-logo{width:72px;height:72px;border-radius:50%;margin-bottom:8px;border:2.5px solid var(--gold);object-fit:cover;box-shadow:0 0 24px rgba(201,168,76,.35),0 0 60px rgba(201,168,76,.12);animation:float 3s ease-in-out infinite,pulseGlow 3s ease-in-out infinite;}
.eagle-fallback{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#9A8230);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:8px;border:2.5px solid var(--gold);box-shadow:0 0 24px rgba(201,168,76,.35);animation:float 3s ease-in-out infinite;}
.eagle-accueil{width:72px;height:72px;border-radius:50%;margin-bottom:6px;border:2.5px solid var(--gold);object-fit:cover;box-shadow:0 0 24px rgba(201,168,76,.35);animation:float 3s ease-in-out infinite;}
.clock-display{text-align:center;margin:12px 0;}
.clock-display .time{font-family:'JetBrains Mono',monospace;font-size:2.4em;color:var(--rescue);text-shadow:0 0 20px rgba(230,81,0,.2);}
.clock-display .date{font-size:.78em;color:var(--muted);margin-top:4px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;backdrop-filter:blur(12px);transition:border-color .2s;}
.card-glow{box-shadow:0 0 24px rgba(230,81,0,.12);}
.btn{width:100%;padding:16px;border:none;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:1.05em;letter-spacing:2px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);font-weight:600;}
.btn-gold{background:linear-gradient(135deg,var(--rescue),var(--rescueD));color:#fff;box-shadow:0 4px 16px rgba(230,81,0,.25);}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(230,81,0,.4);}
.btn-green{background:linear-gradient(135deg,var(--green),#2ECC71);color:#fff;}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(39,174,96,.35);}
.btn-red{background:linear-gradient(135deg,var(--red),#E74C3C);color:#fff;}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(192,57,43,.35);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--rescue);color:var(--rescueL);}
.btn-disabled{opacity:.4;pointer-events:none;}
.btn:active{transform:translateY(0)!important;}
.qr-scan-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px auto 0;padding:12px 24px;background:transparent;border:1.5px solid rgba(230,81,0,.45);color:var(--rescueL);border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:.9em;letter-spacing:2px;cursor:pointer;transition:all .3s;width:80%;max-width:280px;}
.qr-scan-btn:hover,.qr-scan-btn:active{background:var(--rescue);color:#fff;transform:scale(1.02);}
.qr-scan-btn svg{width:20px;height:20px;}
.pin-row{display:flex;gap:10px;justify-content:center;margin:16px 0;}
.pin-dot{width:52px;height:60px;border-radius:var(--radius-sm);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--rescue);font-weight:700;transition:all .25s;background:var(--cardSolid);}
.pin-dot.filled{border-color:var(--rescue);box-shadow:0 0 16px rgba(230,81,0,.2);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:0 auto;}
.numpad button{padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--txt);font-family:'Oswald',sans-serif;font-size:1.4em;cursor:pointer;transition:all .2s;}
.numpad button:hover{background:var(--card2);border-color:rgba(230,81,0,.4);}
.numpad button:active{background:rgba(230,81,0,.15);color:var(--rescue);border-color:var(--rescue);}
.user-badge{text-align:center;padding:14px;background:rgba(230,81,0,.06);border-radius:var(--radius);border:1px solid rgba(230,81,0,.18);margin:12px 0;}
.user-badge .name{font-family:'Oswald',sans-serif;font-size:1.25em;color:var(--rescue);letter-spacing:2px;}
.user-badge .role{font-size:.78em;color:var(--muted);margin-top:2px;}
.user-badge .uid{font-family:'JetBrains Mono',monospace;font-size:.72em;color:var(--muted);margin-top:4px;}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.75em;font-weight:600;}
.status-badge.on-site{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3);}
.status-badge.off-site{background:rgba(184,169,154,.1);color:var(--muted);border:1px solid var(--border);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.stat-card{text-align:center;padding:14px 10px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);}
.stat-card .num{font-family:'Oswald',sans-serif;font-size:1.6em;font-weight:600;}
.stat-card .lbl{font-size:.62em;color:var(--muted);letter-spacing:1.5px;margin-top:2px;}
.search-box{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:'Inter',sans-serif;font-size:.9em;outline:none;margin-bottom:10px;transition:border-color .15s;}
.search-box:focus{border-color:var(--rescue);box-shadow:0 0 0 3px rgba(230,81,0,.08);}
.search-box::placeholder{color:var(--muted);}
.lieu-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;padding-right:4px;}
.lieu-item{padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center;}
.lieu-item:hover{background:var(--card2);border-color:rgba(230,81,0,.35);transform:translateX(3px);}
.lieu-item.sel{background:rgba(230,81,0,.08);border-color:var(--rescue);}
.lieu-item .ln{font-weight:500;color:var(--txt);}
.lieu-item .lr{font-size:.72em;color:var(--muted);margin-top:2px;}
.receipt{background:var(--card);border:1.5px solid var(--rescue);border-radius:var(--radius);padding:20px;margin:16px 0;box-shadow:0 0 24px rgba(230,81,0,.08);}
.receipt-header{text-align:center;padding-bottom:12px;border-bottom:1px dashed var(--border);margin-bottom:12px;}
.receipt-header .mode{font-family:'Oswald',sans-serif;font-size:1.3em;letter-spacing:3px;}
.rrow{display:flex;justify-content:space-between;padding:6px 0;font-size:.9em;}
.rrow .rl{color:var(--muted);}
.rrow .rv{color:var(--txt);font-weight:500;text-align:right;max-width:60%;}
.receipt-hours{text-align:center;padding:16px 0;margin:12px 0;background:rgba(39,174,96,.08);border-radius:var(--radius-sm);border:1px solid rgba(39,174,96,.2);}
.receipt-hours .big{font-family:'Oswald',sans-serif;font-size:2em;color:var(--green);}
.receipt-hours .lbl{font-size:.72em;color:var(--muted);letter-spacing:2px;}
.onsite-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;font-size:.85em;transition:border-color .15s;}
.onsite-item:hover{border-color:rgba(230,81,0,.3);}
.onsite-item .on-name{color:var(--txt);font-weight:500;}
.onsite-item .on-lieu{color:var(--muted);font-size:.75em;margin-top:2px;}
.onsite-item .on-time{font-family:'JetBrains Mono',monospace;font-size:.8em;}
.hist-item{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;font-size:.85em;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s;}
.hist-item:hover{border-color:rgba(230,81,0,.3);}
.hist-item .h-mode{font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:.85em;}
.hist-item .h-info{text-align:right;font-size:.75em;color:var(--muted);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);padding:12px 24px;border-radius:var(--radius-sm);font-size:.85em;font-weight:600;z-index:300;transition:transform .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;backdrop-filter:blur(12px);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast-ok{background:rgba(39,174,96,.95);color:#fff;}
.toast-err{background:rgba(192,57,43,.95);color:#fff;}
.toast-warn{background:rgba(230,126,34,.95);color:#fff;}
.toast-info{background:rgba(52,152,219,.95);color:#fff;}
.qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:250;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 20px;}
.qr-overlay .qr-title{font-family:'Oswald',sans-serif;color:var(--rescue);font-size:1.2em;letter-spacing:2px;margin-bottom:14px;margin-top:20px;}
#qr-reader{width:100%;max-width:340px;border-radius:var(--radius);overflow:hidden;border:2px solid var(--rescue);box-shadow:0 0 30px rgba(230,81,0,.2);}
.qr-hint{color:var(--muted);font-size:.8em;margin-top:14px;text-align:center;max-width:300px;line-height:1.5;}
.step-label{font-family:'Oswald',sans-serif;font-size:.7em;color:var(--muted);letter-spacing:3px;text-align:center;margin-bottom:8px;text-transform:uppercase;}
.custom-input{width:100%;padding:12px 16px;background:var(--cardSolid);border:1.5px solid var(--rescue);border-radius:var(--radius-sm);color:var(--txt);font-family:'Inter',sans-serif;font-size:.9em;outline:none;margin-top:10px;}
.custom-input:focus{box-shadow:0 0 0 3px rgba(230,81,0,.12);}
.theme-pill{position:fixed;bottom:20px;right:20px;z-index:160;background:var(--card2);border:1px solid var(--border);border-radius:30px;display:flex;align-items:center;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.theme-pill button{padding:8px 14px;background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);transition:all .15s;}
.theme-pill button.active{background:rgba(230,81,0,.15);color:var(--rescueL);}
.theme-pill button:hover:not(.active){color:var(--txt);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(230,81,0,.35);border-radius:4px;}
.hidden{display:none!important;}
.ptg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.ptg-modal{background:var(--cardSolid);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.ptg-modal h3{font-family:'Oswald',sans-serif;letter-spacing:2px;margin-bottom:12px;color:var(--rescue);font-size:16px}
.ptg-modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.ptg-modal .ptg-modal-btns{display:flex;gap:10px}
.ptg-modal .ptg-modal-btns button{flex:1;padding:12px;border-radius:10px;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border);transition:all .2s}
/* === MOBILE 480px FINE-TUNING === */
@media(max-width:480px){
  .container{padding-left:12px;padding-right:12px;padding-bottom:calc(100px + env(safe-area-inset-bottom,0px));overflow-x:hidden;}
  .theme-pill{bottom:calc(20px + env(safe-area-inset-bottom,0px));right:12px;}
  .net-badge{top:calc(10px + env(safe-area-inset-top,0px));right:10px;font-size:.6em;padding:3px 8px;}
  .toast{max-width:92vw;font-size:.8em;padding:10px 16px;}
  .header h1{font-size:1.15em;letter-spacing:2px;}
  .header .sub{font-size:.65em;}
  .back-btn{padding:10px 14px;font-size:.72em;min-height:44px;}
  .eagle-logo,.eagle-fallback,.eagle-accueil{width:60px;height:60px;}
  .clock-display .time{font-size:2em;}
  .numpad{max-width:260px;gap:8px;}
  .numpad button{padding:14px;font-size:1.2em;}
  .pin-dot{width:46px;height:52px;font-size:22px;}
  .stat-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .stat-card{padding:10px 8px;}
  .stat-card .num{font-size:1.3em;}
  .btn{padding:14px;font-size:.95em;}
  .card{padding:16px;margin-bottom:10px;}
  .user-badge .name{font-size:1.1em;}
  .lieu-list{max-height:320px;}
  .lieu-item{padding:12px 14px;font-size:.9em;}
  .search-box{padding:10px 14px;font-size:.85em;}
  .custom-input{padding:10px 14px;font-size:.85em;}
  .qr-overlay{padding:16px 12px;}
  .ptg-modal{padding:20px;max-width:calc(100vw - 32px);}
  .ptg-modal .ptg-modal-btns button{padding:10px;font-size:13px;}
  .hist-item{font-size:.82em;}
  body{padding-bottom:env(safe-area-inset-bottom,0px);}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .theme-pill{padding-bottom:env(safe-area-inset-bottom,0px);}
  .container{padding-bottom:calc(100px + env(safe-area-inset-bottom,0px));}
}
</style>
</head>

<script>
(function(){try{var h=JSON.parse(localStorage.getItem('volo_history')||'[]'),closed=new Set();h.forEach(function(tx){if(tx.statut==='ANNULÉ'||tx.statut==='RETOURNÉ')closed.add((tx.original_timestamp||tx.timestamp)+tx.sauveteur_id)});var active=h.filter(function(tx){return tx.statut==='ACTIF'&&tx.mode==='PICK-ON'&&!closed.has(tx.timestamp+tx.sauveteur_id)});if(active.length===0)return;var totalItems=active.reduce(function(n,tx){try{return n+JSON.parse(tx.items||'[]').length}catch(e){return n}},0);document.getElementById('pickOnActiveBanner').innerHTML='<div onclick="window.location.href=\'index.html\'" style="position:sticky;top:0;z-index:9999;padding:10px 16px;background:linear-gradient(135deg,rgba(230,81,0,.95),rgba(192,57,43,.9));color:#fff;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:2px solid #E65100"><span style="font-size:20px;font-weight:bold">!</span><div style="flex:1"><div style="font-weight:800;font-size:13px;letter-spacing:1px;font-family:Oswald,sans-serif">PICK ON ACTIF — '+totalItems+' item'+(totalItems>1?'s':'')+' sorti'+(totalItems>1?'s':'')+'</div><div style="font-size:10px;opacity:.85">Toucher pour retourner au Pick-Off</div></div><span style="font-size:16px">→</span></div>';}catch(e){}})();

// -- View Transitions -- smooth navigation --
(function(){
  var mainContent = document.querySelector('#app') || document.querySelector('.screen') || document.querySelector('main') || document.body.firstElementChild;
  if(mainContent) mainContent.style.viewTransitionName = 'page-content';

  document.addEventListener('click', function(e){
    var link = e.target.closest('a[href]');
    if(!link) return;
    var href = link.getAttribute('href');
    if(!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
    if(!document.startViewTransition) return;
    e.preventDefault();
    document.startViewTransition(function(){
      window.location.href = href;
    });
  });
})();
</script>

<div class="container" id="app"></div>

  <button id="th-light" title="Mode clair" aria-label="Mode clair"></button>
</div>
<audio id="eagleAudio" preload="none"><source src="eagle.mp3" type="audio/mpeg"></audio>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="error-monitor.js"></script>
<script src="data.js?v=20"></script>
<script src="volo-crypto.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-service.js"></script>
<script src="volo-network.js"></script>
<script src="king-logo.js"></script>
<script>
// ══════════════════════════════════════════════════
//  VOLO SST — MODULE POINTAGE D'HEURES
//  156 membres | PIN = VOLO sans le V
//  Webhook → Make.com → Google Sheets (onglet Pointage)
// ══════════════════════════════════════════════════
const LIEUX=[
  {id:"L01",nom:"Bureau Sherbrooke",region:"Estrie"},
  {id:"L02",nom:"Dépôt Sherbrooke",region:"Estrie"},
  {id:"L03",nom:"Chantier Magog",region:"Estrie"},
  {id:"L04",nom:"Chantier Orford",region:"Estrie"},
  {id:"L05",nom:"Bureau Québec",region:"Capitale-Nationale"},
  {id:"L06",nom:"Chantier Lévis",region:"Capitale-Nationale"},
  {id:"L07",nom:"Kruger Trois-Rivières",region:"Mauricie"},
  {id:"L08",nom:"Chantier Shawinigan",region:"Mauricie"},
  {id:"L09",nom:"Chantier Rimouski",region:"Bas-St-Laurent"},
  {id:"L10",nom:"Chantier Rivière-du-Loup",region:"Bas-St-Laurent"},
  {id:"L11",nom:"Bureau Montréal",region:"Montréal"},
  {id:"L12",nom:"Chantier Longueuil",region:"Montérégie"},
  {id:"L13",nom:"Chantier Saguenay",region:"Saguenay"},
  {id:"L14",nom:"Chantier Drummondville",region:"Mauricie"},
  {id:"L15",nom:"Chantier Terrebonne",region:"Lanaudière"},
  {id:"L16",nom:"Formation / Entraînement",region:"Formation"},
  {id:"LAUTRE",nom:"Autre (préciser)",region:"—"},
];
const WEBHOOK_POINTAGE='/api/webhook-pointage';
let state={step:'pin',pin:'',user:null,mode:null,lieu:null,lieuCustom:'',missionType:'STANDARD',ts:null,_h:'',_m:0};
// Auto-login si pin dans URL (vient de index.html)
(function(){
  try{
    const p=new URLSearchParams(window.location.search).get('pin');
    if(p&&p.length===4){
      const u=PERSONNEL.find(x=>x.volo==='V'+p);
      if(u){state.pin=p;state.user=u;state.step='accueil';}
    }
  }catch(e){}
})();
let qrScanner = null;
let clockInt;
const LS_ONSITE='volo-ptg-onsite',LS_HIST='volo-ptg-history',LS_QUEUE='volo-ptg-queue';
function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error('lsSet error:',e)}}
function getOnSite(){return lsGet(LS_ONSITE,[])}
function setOnSite(d){lsSet(LS_ONSITE,d)}
function getHistory(){return lsGet(LS_HIST,[])}
function addHistory(e){const h=getHistory();h.unshift(e);if(h.length>200)h.length=200;lsSet(LS_HIST,h)}
function getQueue(){return lsGet(LS_QUEUE,[])}
function setQueue(q){lsSet(LS_QUEUE,q)}

// ── THEME ──
function applyTheme(){
  const t=localStorage.getItem('volo_theme_main')||'dark';
  document.body.classList.toggle('light',t==='light');
  document.getElementById('th-dark').classList.toggle('active',t!=='light');
  document.getElementById('th-light').classList.toggle('active',t==='light');
}
function setTheme(t){localStorage.setItem('volo_theme_main',t);applyTheme();}
document.getElementById('th-dark').addEventListener('click',()=>setTheme('dark'));
document.getElementById('th-light').addEventListener('click',()=>setTheme('light'));

// ── NETWORK ──
function updateNet(){
  const on=navigator.onLine;
  document.getElementById('netDot').className='net-dot '+(on?'on':'off');
  document.getElementById('netText').textContent=on?'EN LIGNE':'HORS-LIGNE';
  document.getElementById('netText').style.color=on?'var(--green)':'var(--red)';
  if(on)flushQueue();
}
window.addEventListener('online',updateNet);
window.addEventListener('offline',updateNet);
if(typeof VoloNetwork!=='undefined')VoloNetwork.init({skipBadge:true});
async function flushQueue(){
  const q=getQueue();if(!q.length)return;
  toast('Envoi de '+q.length+' pointage(s)...','info');
  const fail=[];
  for(const e of q){try{const r=await fetch(WEBHOOK_POINTAGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});if(!r.ok)fail.push(e);}catch{fail.push(e);}}
  setQueue(fail);
  if(!fail.length)toast('Tous les pointages envoyés','ok');
}

// ── UTILITIES ──
function escapeHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type+' show';setTimeout(()=>t.classList.remove('show'),3000);}
function fmtTime(d){return d.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
function fmtDate(d){return d.toLocaleDateString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function fmtTS(d){const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
function calcH(iso){const diff=Date.now()-new Date(iso).getTime();const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);return{h,m,display:h+'h'+String(m).padStart(2,'0'),totalMin:h*60+m};}
function startClock(){clearInterval(clockInt);clockInt=setInterval(()=>{const el=document.getElementById('liveClock');if(el)el.textContent=fmtTime(new Date());},1000);}
function vibrate(ms=30){try{navigator.vibrate(ms)}catch{}}

// ── LOGO HELPERS ──
const LOGO_BIG=`<img src="eagle_tactic.png" class="eagle-logo" alt="Golden Eagles" onerror="if(typeof KING_LOGO_B64!=='undefined'){this.src=KING_LOGO_B64}else{this.style.display='none';this.nextElementSibling.style.display='flex'}"><div class="eagle-fallback" style="display:none">GE</div>`;
const LOGO_MED=`<img src="eagle_tactic.png" class="eagle-accueil" alt="Golden Eagles" onerror="if(typeof KING_LOGO_B64!=='undefined'){this.src=KING_LOGO_B64}else{this.style.display='none'}">`;

// ── RENDER ──
function render(){
  const app=document.getElementById('app');
  switch(state.step){
    case 'pin':return rPIN(app);
    case 'accueil':return rAccueil(app);
    case 'lieu':return rLieu(app);
    case 'custom':return rCustom(app);
    case 'mission':return rMission(app);
    case 'confirm':return rConfirm(app);
    case 'receipt':return rReceipt(app);
    case 'onsite':return rOnSite(app);
    case 'history':return rHistory(app);
  }
}

// ── PIN ──
function rPIN(app){
  const dots=Array.from({length:4},(_,i)=>'<div class="pin-dot '+(state.pin.length>i?'filled':'')+'">'+( state.pin[i]?'●':'')+'</div>').join('');
  const nums=['1','2','3','4','5','6','7','8','9','⌫','0','✕'].map(d=>{
    if(d==='⌫')return '<button onclick="pinKey(\'back\')" aria-label="Effacer">⌫</button>';
    if(d==='✕')return '<button onclick="pinKey(\'clear\')" style="color:var(--red)" aria-label="Réinitialiser">✕</button>';
    return '<button onclick="pinKey(\''+d+'\')">'+d+'</button>';
  }).join('');
  let identified='';
  if(state.pin.length===4){
    const u=PERSONNEL.find(p=>p.volo==='V'+state.pin);
    if(u) identified='<div class="user-badge" style="margin-top:14px"><div class="name">'+u.name+'</div><div class="role">'+u.role+' — '+u.region+'</div><div class="uid">'+u.id+' | '+u.volo+'</div></div>';
    else  identified='<div style="text-align:center;margin-top:14px;color:var(--red);font-weight:600;font-family:\'Oswald\',sans-serif;letter-spacing:1px">✗ Code '+state.pin+' non reconnu</div>';
  }
  app.innerHTML='<div style="margin-bottom:10px"><a href="index.html" onclick="event.preventDefault();if(history.length>1){history.back()}else{location.href=\'index.html\'}" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-family:\'Inter\',sans-serif;text-decoration:none">◀ INVENTAIRE</a></div>'
    +'<div class="header" style="padding-bottom:4px"><div style="display:flex;flex-direction:column;align-items:center">'+LOGO_BIG+'<h1>POINTAGE</h1><div class="sub">THE GOLDEN EAGLES</div></div></div>'
    +'<div class="clock-display"><div class="time" id="liveClock">'+fmtTime(new Date())+'</div><div class="date">'+fmtDate(new Date())+'</div></div>'
    +'<div class="card"><div class="step-label">ENTREZ VOTRE CODE PIN</div><div class="pin-row">'+dots+'</div><div class="numpad">'+nums+'</div>'+identified+'</div>'
    +(state.pin.length===4&&PERSONNEL.find(p=>p.volo==='V'+state.pin)?'<button class="btn btn-gold" onclick="doLogin()" style="margin-top:4px">CONTINUER →</button>':'')
    +'<button class="qr-scan-btn" onclick="openQRScanner()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>SCANNER MON BADGE</button>';
  startClock();
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isMobile&&!document.getElementById('qr-overlay')&&!qrScanner&&state.pin.length===0)setTimeout(()=>openQRScanner(),600);
}

function pinKey(k){
  vibrate();
  if(qrScanner)closeQRScanner();
  if(k==='clear'){state.pin='';render();return;}
  if(k==='back'){state.pin=state.pin.slice(0,-1);render();return;}
  if(state.pin.length>=4)return;
  state.pin+=k;render();
}
function doLogin(){const u=PERSONNEL.find(p=>p.volo==='V'+state.pin);if(!u)return;state.user=u;state.step='accueil';render();}
function logout(){state={step:'pin',pin:'',user:null,mode:null,lieu:null,lieuCustom:'',missionType:'STANDARD',ts:null,_h:'',_m:0};render();}

// ── ACCUEIL ──
function rAccueil(app){
  const onSite=getOnSite();
  const me=onSite.find(e=>e.id===state.user.id);
  const today=new Date().toDateString();
  const todayH=getHistory().filter(e=>e.mode==='DÉPART'&&new Date(e.timestamp).toDateString()===today).reduce((a,e)=>a+(e.heures_minutes||0),0);
  const th=Math.floor(todayH/60),tm=todayH%60;
  app.innerHTML='<div style="display:flex;gap:10px;margin-bottom:10px"><a href="index.html" onclick="event.preventDefault();if(history.length>1){history.back()}else{location.href=\'index.html\'}" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-family:\'Inter\',sans-serif;text-decoration:none">◀ INVENTAIRE</a></div>'
    +'<div class="header"><button class="back-btn" onclick="logout()">DÉCONNEXION</button><h1>POINTAGE</h1><div class="sub">THE GOLDEN EAGLES</div></div>'
    +'<div class="user-badge"><div style="display:flex;flex-direction:column;align-items:center">'+LOGO_MED+'</div>'
    +'<div class="name">'+escapeHtml(state.user.name)+'</div><div class="role">'+escapeHtml(state.user.role)+' — '+escapeHtml(state.user.region)+'</div><div class="uid">'+escapeHtml(state.user.id)+' | '+escapeHtml(state.user.volo)+'</div>'
    +(me?'<div style="margin-top:8px"><span class="status-badge on-site">● Sur site depuis '+calcH(me.arrival).display+' — '+escapeHtml(me.lieu)+'</span></div>'
        :'<div style="margin-top:8px"><span class="status-badge off-site">● Pas sur site</span></div>')
    +'</div>'
    +'<div class="clock-display"><div class="time" id="liveClock">'+fmtTime(new Date())+'</div></div>'
    +'<div class="stat-grid"><div class="stat-card"><div class="num" style="color:var(--green)">'+onSite.length+'</div><div class="lbl">SUR LE TERRAIN</div></div>'
    +'<div class="stat-card"><div class="num" style="color:var(--gold)">'+th+'h'+String(tm).padStart(2,'0')+'</div><div class="lbl">HEURES AUJOURD\'HUI</div></div></div>'
    +(me?'<button class="btn btn-red" onclick="startMode(\'DÉPART\')" style="margin-bottom:10px">ENREGISTRER MON DÉPART</button><button class="btn btn-outline" onclick="startMode(\'ARRIVÉE\',true)" style="margin-bottom:10px">Changer de lieu</button>'
        :'<button class="btn btn-green" onclick="startMode(\'ARRIVÉE\')" style="margin-bottom:10px">ENREGISTRER MON ARRIVÉE</button>')
    +'<div style="display:flex;gap:10px;margin-bottom:10px">'
    +'<button class="btn btn-outline" style="flex:1;font-size:.78em" onclick="state.step=\'onsite\';render()">QUI EST LA ('+onSite.length+')</button>'
    +'<button class="btn btn-outline" style="flex:1;font-size:.78em" onclick="state.step=\'history\';render()">HISTORIQUE</button></div>';
  startClock();
}

function startMode(mode,isChangeLieu){
  state.mode=mode;
  if(mode==='DÉPART'){
    const me=getOnSite().find(e=>e.id===state.user.id);
    if(me)state.lieu={id:'auto',nom:me.lieu,region:me.region||''};
    state.step='confirm';
  }else{
    // If user is already on-site and this is NOT a "Changer de lieu"
    const onSite=getOnSite();
    const me=onSite.find(e=>e.id===state.user.id);
    if(me&&!isChangeLieu){
      showPtgModal('DÉJÀ EN POSTE','Vous êtes déjà EN POSTE à <b>'+escapeHtml(me.lieu)+'</b>.<br>Forcer le DÉPART de la session précédente?','OUI, FORCER',function(){
        closePtgModal();
        const c=calcH(me.arrival);
        const now=new Date();const ts=fmtTS(now);
        const depPayload={type:'POINTAGE',mode:'DEPART',sauveteur_id:state.user.id,sauveteur_nom:state.user.name,sauveteur_volo:state.user.volo,role:state.user.role,lieu:me.lieu,region:me.region||'',mission_type:'',heures:c.display,heures_minutes:c.totalMin,timestamp:ts,force_close:true};
        addHistory(depPayload);
        if(navigator.onLine){
          fetch(WEBHOOK_POINTAGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(depPayload)}).catch(()=>{const q=getQueue();q.push(depPayload);setQueue(q);});
        }else{const q=getQueue();q.push(depPayload);setQueue(q);}
        if(typeof VoloData!=='undefined'){try{VoloData.savePointage(depPayload);}catch(e){}}
        setOnSite(onSite.filter(e=>e.id!==state.user.id));
        toast('Départ forcé — '+c.display,'warn');
        state.lieu=null;state.lieuCustom='';state.missionType='STANDARD';
        state.step='lieu';render();
      });
      return;
    }
    state.lieu=null;state.lieuCustom='';state.missionType='STANDARD';
    state.step='lieu';
  }
  render();
}

// ── LIEU ──
function rLieu(app){
  const items=LIEUX.map(l=>'<div class="lieu-item '+(state.lieu&&state.lieu.id===l.id?'sel':'')+'" onclick="pickLieu(\''+l.id+'\')">'
    +'<div><div class="ln">'+l.nom+'</div><div class="lr">'+l.region+'</div></div>'
    +(state.lieu&&state.lieu.id===l.id?'<span style="color:var(--gold);font-size:1.1em">✓</span>':'')
    +'</div>').join('');
  app.innerHTML='<div class="header"><button class="back-btn" onclick="state.step=\'accueil\';render()">← RETOUR</button><h1>LIEU</h1><div class="sub">OÙ TRAVAILLEZ-VOUS?</div></div>'
    +'<input class="search-box" id="lieuQ" placeholder="Rechercher un lieu..." oninput="filterLieux()">'
    +'<div class="lieu-list" id="lieuList">'+items+'</div>'
    +'<button class="btn btn-gold '+((!state.lieu)?'btn-disabled':'')+'" onclick="if(state.lieu){if(state.lieu.id===\'LAUTRE\'){state.step=\'custom\';}else{state.step=\'mission\';}render();}" style="margin-top:14px">CONTINUER →</button>';
}
function filterLieux(){
  const q=document.getElementById('lieuQ').value.toLowerCase();
  document.querySelectorAll('.lieu-item').forEach(el=>{
    const t=(el.querySelector('.ln').textContent+' '+el.querySelector('.lr').textContent).toLowerCase();
    el.style.display=t.includes(q)?'flex':'none';
  });
}
function pickLieu(id){state.lieu=LIEUX.find(l=>l.id===id);vibrate();render();}

// ── CUSTOM ──
function rCustom(app){
  app.innerHTML='<div class="header"><button class="back-btn" onclick="state.step=\'lieu\';render()">← RETOUR</button><h1>LIEU CUSTOM</h1><div class="sub">PRÉCISEZ LE LIEU</div></div>'
    +'<div class="card"><div class="step-label">NOM DU CHANTIER / LIEU</div>'
    +'<input class="custom-input" id="customLieu" placeholder="Ex: Chantier Hydro-Québec Lac-Mégantic" value="'+escapeHtml(state.lieuCustom)+'" autofocus></div>'
    +'<button class="btn btn-gold btn-disabled" id="btnCustomGo" onclick="submitCustomLieu()">CONTINUER →</button>';
  const inp=document.getElementById('customLieu');
  const btn=document.getElementById('btnCustomGo');
  inp.addEventListener('input',function(){state.lieuCustom=this.value;if(this.value.trim())btn.classList.remove('btn-disabled');else btn.classList.add('btn-disabled');});
  if(state.lieuCustom.trim())btn.classList.remove('btn-disabled');
  setTimeout(()=>inp.focus(),50);
}
function submitCustomLieu(){if(!state.lieuCustom.trim())return;state.lieu={id:'CUSTOM',nom:state.lieuCustom.trim(),region:'Autre'};state.step='mission';render();}

// ── MISSION ──
function getMissionTypes(){
  const surv=state.user&&state.user.type==='SURVEILLANT';
  const types=[
    {id:'STANDARD',label:'STANDARD',desc:'Mission régulière hors local',icon:'',perdiem:surv?'150$/j':'200$/j (sauv.) · 150$/j (surv.)'},
    {id:'LOCAL',label:'LOCAL',desc:'Travail au bureau / local',icon:'',perdiem:'0$/j (pas de per diem)'},
  ];
  if(!surv)types.push({id:'URGENCE',label:'URGENCE',desc:'Intervention urgente / rappel',icon:'',perdiem:'285$/j + 64$/h transport'});
  return types;
}
function rMission(app){
  const items=getMissionTypes().map(m=>'<div class="lieu-item '+(state.missionType===m.id?'sel':'')+'" onclick="state.missionType=\''+m.id+'\';vibrate();render()">'
    +'<div><div class="ln">'+m.icon+' '+m.label+'</div><div class="lr">'+m.desc+'</div><div style="font-size:.65em;color:var(--gold);margin-top:2px">'+m.perdiem+'</div></div>'
    +(state.missionType===m.id?'<span style="color:var(--gold);font-size:1.2em">✓</span>':'')
    +'</div>').join('');
  app.innerHTML='<div class="header"><button class="back-btn" onclick="state.step=\'lieu\';render()">← RETOUR</button><h1>TYPE MISSION</h1><div class="sub">QUEL TYPE DE JOURNÉE?</div></div>'
    +'<div class="lieu-list">'+items+'</div>'
    +'<button class="btn btn-gold" onclick="state.step=\'confirm\';render()" style="margin-top:14px">CONTINUER →</button>';
}

// ── CONFIRM ──
function rConfirm(app){
  const now=new Date();
  const isDep=state.mode==='DÉPART';
  const me=getOnSite().find(e=>e.id===state.user.id);
  let hBlock='';
  if(isDep&&me){const c=calcH(me.arrival);hBlock='<div class="receipt-hours"><div class="lbl">HEURES TRAVAILLÉES</div><div class="big">'+c.display+'</div></div>';}
  app.innerHTML='<div class="header"><button class="back-btn" onclick="state.step='+(isDep?"'accueil'":"'mission'")+';render()">← RETOUR</button><h1>✓ CONFIRMER</h1><div class="sub">'+state.mode+'</div></div>'
    +'<div class="receipt"><div class="receipt-header"><div class="mode" style="color:'+(isDep?'var(--red)':'var(--green)')+'">'+(isDep?'':'')+' '+state.mode+'</div></div>'
    +'<div class="rrow"><span class="rl">Nom</span><span class="rv">'+escapeHtml(state.user.name)+'</span></div>'
    +'<div class="rrow"><span class="rl">ID</span><span class="rv" style="font-family:\'JetBrains Mono\',monospace;font-size:.85em">'+escapeHtml(state.user.id)+'</span></div>'
    +'<div class="rrow"><span class="rl">Lieu</span><span class="rv">'+(state.lieu?escapeHtml(state.lieu.nom):'—')+'</span></div>'
    +(!isDep?'<div class="rrow"><span class="rl">Type</span><span class="rv" style="color:var(--gold);font-weight:600">'+state.missionType+'</span></div>':'')
    +'<div class="rrow"><span class="rl">Date/Heure</span><span class="rv">'+fmtTS(now)+'</span></div>'
    +hBlock+'</div>'
    +'<button class="btn '+(isDep?'btn-red':'btn-green')+'" onclick="doPointage()">'+(isDep?'CONFIRMER DÉPART':'CONFIRMER ARRIVÉE')+'</button>'
    +'<button class="btn btn-outline" onclick="state.step=\'accueil\';render()" style="margin-top:10px">ANNULER</button>';
}

// ── EXECUTE ──
async function doPointage(){
  const now=new Date();const ts=fmtTS(now);const isDep=state.mode==='DÉPART';let hDisp='',hMin=0;
  let onSite=getOnSite();
  if(isDep){const me=onSite.find(e=>e.id===state.user.id);if(me){const c=calcH(me.arrival);hDisp=c.display;hMin=c.totalMin;}onSite=onSite.filter(e=>e.id!==state.user.id);}
  else{onSite=onSite.filter(e=>e.id!==state.user.id);onSite.push({id:state.user.id,nom:state.user.name,role:state.user.role,lieu:state.lieu.nom,region:state.lieu.region,missionType:state.missionType,arrival:now.toISOString()});}
  setOnSite(onSite);
  const modeClean=state.mode==='ARRIVÉE'?'ARRIVEE':'DEPART';
  const payload={type:'POINTAGE',mode:modeClean,sauveteur_id:state.user.id,sauveteur_nom:state.user.name,sauveteur_volo:state.user.volo,role:state.user.role,lieu:state.lieu?state.lieu.nom:'',region:state.lieu?state.lieu.region:'',mission_type:state.mode==='ARRIVÉE'?state.missionType:'',heures:hDisp,heures_minutes:hMin,timestamp:ts};
  addHistory(payload);
  if(navigator.onLine){
    try{const r=await fetch(WEBHOOK_POINTAGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(r.ok)toast(isDep?'Départ — '+hDisp:'Arrivée enregistrée','ok');
      else{toast('Erreur serveur — sauvé local','err');const q=getQueue();q.push(payload);setQueue(q);}}
    catch{toast('Erreur réseau — sauvé local','err');const q=getQueue();q.push(payload);setQueue(q);}
  }else{toast('Hors-ligne — sauvé local','warn');const q=getQueue();q.push(payload);setQueue(q);}
  // Firestore dual-write (fire & forget)
  if(typeof VoloData!=='undefined'){try{VoloData.savePointage(payload);}catch(e){console.warn('[VoloData] savePointage:',e);}}
  try{document.getElementById('eagleAudio').currentTime=0;document.getElementById('eagleAudio').play();}catch{}
  vibrate(100);state.ts=ts;state._h=hDisp;state._m=hMin;state.step='receipt';render();
}

// ── RECEIPT ──
function rReceipt(app){
  const isDep=state.mode==='DÉPART';
  app.innerHTML='<div class="header"><h1>'+(isDep?'':'')+' '+state.mode+'</h1><div class="sub">POINTAGE ENREGISTRÉ</div></div>'
    +'<div class="receipt card-glow"><div class="receipt-header"><div class="mode" style="color:'+(isDep?'var(--red)':'var(--green)')+'">✓ '+state.mode+' CONFIRMÉ'+(isDep?'':'E')+'</div></div>'
    +'<div class="rrow"><span class="rl">Nom</span><span class="rv">'+escapeHtml(state.user.name)+'</span></div>'
    +'<div class="rrow"><span class="rl">ID</span><span class="rv" style="font-family:\'JetBrains Mono\',monospace">'+escapeHtml(state.user.id)+'</span></div>'
    +'<div class="rrow"><span class="rl">Lieu</span><span class="rv">'+(state.lieu?escapeHtml(state.lieu.nom):'—')+'</span></div>'
    +'<div class="rrow"><span class="rl">Heure</span><span class="rv">'+state.ts+'</span></div>'
    +(!isDep?'<div class="rrow"><span class="rl">Type</span><span class="rv" style="color:var(--gold);font-weight:600">'+state.missionType+'</span></div>':'')
    +(isDep&&state._h?'<div class="receipt-hours"><div class="lbl">HEURES TRAVAILLÉES</div><div class="big">'+state._h+'</div></div>':'')
    +'</div>'
    +'<button class="btn btn-gold" onclick="if(history.length>1){history.back()}else{location.href=\'index.html\'}">← RETOUR À L\'APP</button>'
    +'<button class="btn btn-outline" onclick="state.step=\'accueil\';state.mode=null;state.lieu=null;render()" style="margin-top:10px">NOUVEAU POINTAGE</button>';
}

// ── QUI EST LÀ ──
function rOnSite(app){
  const onSite=getOnSite();
  const items=onSite.length?onSite.map(e=>{
    const c=calcH(e.arrival);const col=c.h>=10?'var(--red)':c.h>=8?'var(--orange)':'var(--green)';
    return '<div class="onsite-item" data-n="'+escapeHtml(e.nom.toLowerCase())+'"><div><div class="on-name">'+escapeHtml(e.nom)+'</div><div class="on-lieu">'+escapeHtml(e.lieu)+(e.region?' — '+escapeHtml(e.region):'')+'</div>'+(e.missionType?'<div style="font-size:.62em;color:var(--gold);margin-top:2px">'+escapeHtml(e.missionType)+'</div>':'')+'</div>'
      +'<div style="text-align:right"><div class="on-time" style="color:'+col+'">'+c.display+'</div><div style="font-size:.65em;color:var(--muted)">depuis '+new Date(e.arrival).toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit',hour12:false})+'</div></div></div>';
  }).join(''):'<div class="card" style="text-align:center;color:var(--muted);font-family:\'Oswald\',sans-serif;letter-spacing:1px">Personne n\'est pointé actuellement</div>';
  app.innerHTML='<div class="header"><button class="back-btn" onclick="state.step=\'accueil\';render()">← RETOUR</button><h1>SUR LE TERRAIN</h1><div class="sub">'+onSite.length+' PERSONNE'+(onSite.length>1?'S':'')+'</div></div>'
    +'<input class="search-box" placeholder="Rechercher..." oninput="document.querySelectorAll(\'.onsite-item\').forEach(e=>e.style.display=e.dataset.n.includes(this.value.toLowerCase())?\'flex\':\'none\')">'
    +'<div id="onSiteList">'+items+'</div>';
}

// ── HISTORIQUE ──
function rHistory(app){
  const hist=getHistory().slice(0,50);
  const items=hist.length?hist.map(e=>{
    const isDep=e.mode==='DÉPART';
    return '<div class="hist-item"><div><div class="h-mode" style="color:'+(isDep?'var(--red)':'var(--green)')+'">'+(isDep?'':'')+' '+e.mode+'</div><div style="font-size:.75em;color:var(--muted)">'+escapeHtml(e.sauveteur_nom)+' — '+escapeHtml(e.lieu)+'</div></div>'
      +'<div class="h-info"><div>'+(e.timestamp.split(' ')[1]||'')+'</div><div>'+(e.timestamp.split(' ')[0]||'')+'</div>'+(isDep&&e.heures?'<div style="color:var(--green);font-weight:600">'+e.heures+'</div>':'')+'</div></div>';
  }).join(''):'<div class="card" style="text-align:center;color:var(--muted);font-family:\'Oswald\',sans-serif;letter-spacing:1px">Aucun historique</div>';
  app.innerHTML='<div class="header"><button class="back-btn" onclick="state.step=\'accueil\';render()">← RETOUR</button><h1>HISTORIQUE</h1><div class="sub">DERNIERS POINTAGES</div></div>'
    +items
    +(hist.length?'<button class="btn btn-outline" onclick="confirmClearHistory()" style="margin-top:14px;font-size:.8em">EFFACER L\'HISTORIQUE</button>':'');
}

// ── QR SCANNER ──
let _ptgStream=null,_ptgAnimFrame=null,_ptgVideo=null;
async function startQrScan(){
  const container=document.getElementById('qr-reader');
  container.innerHTML='<video id="ptg-qr-video" style="width:100%;border-radius:10px" playsinline autoplay muted></video><canvas id="ptg-qr-canvas" style="display:none"></canvas>';
  _ptgVideo=document.getElementById('ptg-qr-video');
  const canvas=document.getElementById('ptg-qr-canvas');
  const ctx=canvas.getContext('2d',{willReadFrequently:true});
  try{
    _ptgStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}});
  }catch(e){try{_ptgStream=await navigator.mediaDevices.getUserMedia({video:true});}catch(e2){container.innerHTML='<div style="color:var(--red);padding:20px">Camera non disponible</div>';return;}}
  _ptgVideo.srcObject=_ptgStream;
  let fc=0;
  function loop(){
    _ptgAnimFrame=requestAnimationFrame(loop);
    if(fc++%3!==0)return;
    if(_ptgVideo.readyState<2)return;
    canvas.width=_ptgVideo.videoWidth;canvas.height=_ptgVideo.videoHeight;
    ctx.drawImage(_ptgVideo,0,0);
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(img.data,canvas.width,canvas.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data){stopQrScan();onQrResult(code.data);}
  }
  loop();
}
function stopQrScan(){
  cancelAnimationFrame(_ptgAnimFrame);_ptgAnimFrame=null;
  if(_ptgStream){_ptgStream.getTracks().forEach(t=>t.stop());_ptgStream=null;}
  _ptgVideo=null;
}
function onQrResult(data){onQRSuccess(data);}
function openQRScanner(){
  vibrate();
  const overlay=document.createElement('div');overlay.className='qr-overlay';overlay.id='qr-overlay';
  overlay.innerHTML='<button onclick="closeQRScanner()" aria-label="Fermer le scanner" style="position:fixed;top:16px;right:16px;z-index:251;background:var(--red);border:none;color:#fff;width:50px;height:50px;border-radius:50%;font-size:1.4em;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(192,57,43,.5)">✕</button>'
    +'<div class="qr-title">SCANNER VOTRE BADGE</div><div id="qr-reader"></div>'
    +'<div class="qr-hint">Placez le QR code de votre badge devant la caméra.<br>La connexion sera automatique.</div>';
  document.body.appendChild(overlay);
  startQrScan();
}
function closeQRScanner(){
  stopQrScan();
  const ov=document.getElementById('qr-overlay');if(ov)ov.remove();
}
function onQRSuccess(data){
  const parts=data.split('|');
  if(parts.length>=3&&parts[0]==='VOLO'){const pin=parts[2];const user=PERSONNEL.find(p=>p.volo==='V'+pin);
    if(user){closeQRScanner();vibrate();state.pin=pin;state.user=user;state.step='accueil';toast('Badge scanné — '+user.name,'ok');render();return;}}
  toast('Badge non reconnu','err');
}

// ── AUTO-LOCK ──
let lockTimer;
function resetLock(){clearTimeout(lockTimer);if(state.step!=='pin'){lockTimer=setTimeout(()=>{toast('Session expirée','warn');logout();},120000);}}
['click','touchstart','keydown'].forEach(e=>document.addEventListener(e,resetLock));

// ── MODALS (remplacement confirm/prompt natifs) ──
let _ptgModalCb=null;
function showPtgModal(title,msg,confirmText,onConfirm){
  _ptgModalCb=onConfirm;
  const el=document.createElement('div');
  el.id='ptg-modal-overlay';
  el.className='ptg-modal-overlay';
  el.innerHTML='<div class="ptg-modal"><h3>'+title+'</h3><p>'+msg+'</p><div class="ptg-modal-btns"><button onclick="closePtgModal()" style="background:var(--card);color:var(--muted)">ANNULER</button><button onclick="_ptgModalCb&&_ptgModalCb()" style="background:rgba(192,57,43,.15);color:var(--red);border-color:rgba(192,57,43,.3)">'+confirmText+'</button></div></div>';
  document.body.appendChild(el);
}
function closePtgModal(){
  const el=document.getElementById('ptg-modal-overlay');if(el)el.remove();_ptgModalCb=null;
}
function confirmClearHistory(){
  showPtgModal('EFFACER','Effacer tout l\'historique de pointage local?','OUI, EFFACER',function(){closePtgModal();localStorage.removeItem(LS_HIST);render();});
}

// ── INIT ──
applyTheme();
updateNet();
// Auto-login: use volo_last_volo (non-sensitive VOLO ID) instead of plaintext PIN
const savedVolo=localStorage.getItem('volo_last_volo');
if(savedVolo){const u=PERSONNEL.find(p=>p.volo===savedVolo);if(u){state.pin=savedVolo.replace('V','');state.user=u;state.step='accueil';}}
render();
</script>
