<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VOLO SST — QR Inventaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="data.js"></script>
<style>
/* ── DESIGN SYSTEM: TACTICAL EAGLE ── */
:root{
  --bg:#0C0608;
  --card:rgba(28,16,18,.90);
  --card2:rgba(38,22,26,.94);
  --cardSolid:#1C1012;
  --gold:#D4A017; --goldL:#E8C547;
  --rescue:#E65100; --rescueL:#FF6D00; --rescueD:#BF360C; --rescueGlow:rgba(230,81,0,.15);
  --red:#C0392B; --green:#27AE60; --orange:#E67E22;
  --txt:#F5F0EB; --muted:#B8A99A;
  --border:rgba(68,40,46,.55);
  --blue:#3B82F6;
  --glow:0 0 30px rgba(230,81,0,.08);
  --radius:14px; --radius-sm:10px; --radius-lg:18px;
}
body.light{
  --bg:#F8FAFC; --card:rgba(255,255,255,.96); --card2:rgba(241,245,249,.98); --cardSolid:#fff;
  --gold:#C2410C; --goldL:#EA580C;
  --rescue:#E65100; --rescueL:#EA580C; --rescueD:#BF360C; --rescueGlow:rgba(230,81,0,.09);
  --txt:#0F172A; --muted:#64748B; --border:rgba(203,213,225,.9);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .2s;
}

/* ── GOLD BAR ── */
.gold-bar{
  height:3px;
  background:linear-gradient(90deg,transparent 0%,var(--rescue) 20%,var(--gold) 50%,var(--rescue) 80%,transparent 100%);
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  position:relative;z-index:200;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── HEADER ── */
.header{
  background:rgba(12,6,8,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
  padding:0 20px;
  transition:background .3s,border-color .3s;
}
body.light .header{background:rgba(248,250,252,.97);box-shadow:0 1px 0 var(--border);}
.header-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
  height:56px;
}
.logo-img{
  width:36px;height:36px;
  border-radius:50%;
  border:1.5px solid var(--rescue);
  object-fit:cover;
  flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(230,81,0,.4));
}
.logo-fallback{
  width:36px;height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--rescue),var(--rescueD));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  border:1.5px solid var(--rescue);
  box-shadow:0 0 10px rgba(230,81,0,.3);
}
.header-titles{flex:1;min-width:0;}
.header-title{
  font-family:'Oswald',sans-serif;
  font-size:15px;font-weight:600;
  letter-spacing:1px;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-sub{
  font-size:10px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.5px;margin-top:1px;
}
.header-actions{
  display:flex;gap:6px;align-items:center;
}

/* ── BUTTONS ── */
.btn{
  height:34px;padding:0 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.4px;
  cursor:pointer;
  transition:all .15s ease;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
  position:relative;z-index:1;
}
.btn:hover{background:var(--card2);color:var(--txt);border-color:rgba(230,81,0,.35);}
.btn:active{transform:scale(.97);}
.btn-primary{
  background:linear-gradient(135deg,var(--rescue),var(--rescueD));
  border-color:var(--rescue);color:#fff;
  box-shadow:0 2px 10px rgba(230,81,0,.25);
}
.btn-primary:hover{background:linear-gradient(135deg,var(--rescueL),var(--rescue));color:#fff;}
.btn-ghost-gold{border-color:rgba(212,160,23,.35);color:var(--gold);}
.btn-ghost-gold:hover{background:rgba(212,160,23,.08);border-color:var(--gold);}
.btn-ghost-rescue{border-color:rgba(230,81,0,.35);color:var(--rescueL);}
.btn-ghost-rescue:hover{background:var(--rescueGlow);border-color:var(--rescue);color:var(--rescue);}
.btn-icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.btn-round{
  width:36px;height:36px;padding:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;line-height:1;
  background:linear-gradient(135deg,var(--rescue),var(--rescueD));
  border:none;color:#fff;cursor:pointer;
  transition:all .15s;
  box-shadow:0 2px 10px rgba(230,81,0,.3);
}
.btn-round:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(230,81,0,.4);}
body.light .btn{background:rgba(255,255,255,.9);color:#64748B;border-color:var(--border);}
body.light .btn:hover{background:#F1F5F9;color:#0F172A;}
body.light .btn-primary{background:linear-gradient(135deg,var(--rescue),var(--rescueD));color:#fff;border-color:var(--rescue);}

/* ── SEARCH BAR ── */
.search-bar{
  padding:12px 20px;
  background:rgba(12,6,8,.6);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
  transition:background .3s;
}
body.light .search-bar{background:rgba(241,245,249,.98);}
.search-inner{max-width:1200px;margin:0 auto;}
.search-input-wrap{position:relative;}
.search-input-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;
}
.search-input{
  width:100%;height:40px;padding:0 38px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--txt);
  font-family:'Inter',sans-serif;font-size:13px;
  outline:none;transition:border-color .15s,background .3s;
}
.search-input:focus{border-color:var(--rescue);}
.search-input::placeholder{color:var(--muted);}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:16px;padding:4px;display:none;
}
.search-clear.visible{display:block;}
body.light .search-input{background:#fff;color:#0F172A;}

/* ── TABS ── */
.tabs-wrap{
  padding:0 20px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  transition:background .3s;
}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{
  max-width:1200px;margin:0 auto;
  display:flex;gap:4px;padding:8px 0;white-space:nowrap;
}
.tab{
  padding:5px 14px;
  border-radius:20px;
  border:1px solid transparent;
  background:transparent;
  color:var(--muted);
  font-family:'Oswald',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.8px;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.tab:hover{background:var(--card2);color:var(--txt);}
.tab.active{
  background:rgba(230,81,0,.12);
  border-color:rgba(230,81,0,.4);
  color:var(--rescueL);
}
body.light .tab{color:var(--muted);}
body.light .tab:hover{background:var(--card2);color:var(--txt);}

/* ── MAIN ── */
.main{max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-label{
  font-family:'Oswald',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:2.5px;
  color:var(--muted);text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.section-label::before,.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--rescue),transparent);
}
.section-label::before{max-width:30px;}
.section-label::after{max-width:60px;background:linear-gradient(90deg,transparent,var(--rescue),transparent);flex:none;width:30px;}
.count-pill{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--rescueL);
  background:rgba(230,81,0,.1);border:1px solid rgba(230,81,0,.2);
  border-radius:20px;padding:2px 10px;
}

/* ── CAISSE GRID ── */
.caisse-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;margin-bottom:24px;
}

/* ── CAISSE CARD ── */
.caisse-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;cursor:pointer;
  transition:all .15s ease;position:relative;overflow:hidden;
}
.caisse-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--rescue),var(--gold));
  transform:scaleX(0);transform-origin:left;transition:transform .2s ease;
}
.caisse-card:hover{
  background:var(--card2);border-color:rgba(230,81,0,.35);
  transform:translateY(-1px);box-shadow:0 4px 20px rgba(230,81,0,.1);
}
.caisse-card:hover::before{transform:scaleX(1);}
.caisse-card.selected{border-color:var(--rescue);background:rgba(230,81,0,.06);}
.caisse-card.selected::before{transform:scaleX(1);}
body.light .caisse-card{box-shadow:0 1px 4px rgba(0,0,0,.06);}

.cc-top{display:flex;flex-direction:column;align-items:center;margin-bottom:10px;gap:8px;}
.cc-id{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  color:var(--muted);letter-spacing:.5px;align-self:flex-start;
}
.cc-qr-wrap{
  width:100%;aspect-ratio:1;max-width:180px;
  border-radius:8px;background:#fff;cursor:pointer;
  box-shadow:0 0 0 3px rgba(212,160,23,.3);
  display:flex;align-items:center;justify-content:center;padding:6px;
}
.cc-qr-wrap canvas,.cc-qr-wrap img{
  width:100%!important;height:100%!important;
  max-width:none!important;max-height:none!important;
  display:block;object-fit:contain;
}

.cc-name{
  font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.5px;
  color:var(--txt);margin-bottom:6px;line-height:1.25;
}
.cc-icons{font-size:14px;margin-bottom:6px;letter-spacing:2px;}
.cc-preview{font-size:12px;color:var(--muted);line-height:1.6;}
.cc-preview span{
  display:inline-block;
  background:rgba(68,40,46,.45);border-radius:4px;
  padding:2px 7px;margin:2px 3px 2px 0;font-size:11px;color:var(--txt);
}
body.light .cc-preview span{background:rgba(100,116,139,.1);color:#475569;}
.cc-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:8px;border-top:1px solid var(--border);
}
.cc-count{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--muted);}
.cc-drill{font-size:11px;color:var(--rescueL);font-weight:600;display:flex;align-items:center;gap:3px;}

/* ── ITEMS (drill-down) ── */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.item-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .15s;
}
.item-card:hover{background:var(--card2);border-color:rgba(230,81,0,.3);}
.item-card.selected{border-color:var(--rescue);background:rgba(230,81,0,.05);}
body.light .item-card{box-shadow:0 1px 4px rgba(0,0,0,.06);}
.ic-top{display:flex;flex-direction:column;align-items:center;margin-bottom:8px;gap:8px;}
.ic-icon{font-size:22px;align-self:flex-start;}
.ic-qr-wrap{
  width:100%;aspect-ratio:1;max-width:180px;
  border-radius:8px;background:#fff;cursor:pointer;
  box-shadow:0 0 0 3px rgba(212,160,23,.3);
  display:flex;align-items:center;justify-content:center;padding:6px;
}
.ic-qr-wrap canvas,.ic-qr-wrap img{
  width:100%!important;height:100%!important;
  max-width:none!important;max-height:none!important;
  display:block;object-fit:contain;
}

/* ── GLASS EFFECT SÉLECTION ── */
.caisse-card.selected{
  border-color:var(--rescue);
  background:rgba(230,81,0,.08);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 0 2px var(--rescue),0 8px 32px rgba(230,81,0,.2),inset 0 1px 0 rgba(255,255,255,.08);
}
.item-card.selected{
  border-color:var(--rescue);
  background:rgba(230,81,0,.07);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 0 2px var(--rescue),0 4px 20px rgba(230,81,0,.15),inset 0 1px 0 rgba(255,255,255,.06);
}
.ic-id{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  color:var(--muted);letter-spacing:.5px;margin-bottom:4px;
}
.ic-name{
  font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.3px;
  color:var(--txt);margin-bottom:4px;line-height:1.3;
}
.ic-desc{font-size:11px;color:var(--muted);margin-bottom:6px;}
.ic-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);}
.ic-etat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;font-family:'Oswald',sans-serif;letter-spacing:.5px;}
.ic-etat.bon{color:var(--green);background:rgba(39,174,96,.12);}
.ic-etat.warn{color:var(--orange);background:rgba(230,126,34,.12);}
.ic-etat.bad{color:var(--red);background:rgba(192,57,43,.12);}
body.light .ic-etat.bon{background:rgba(5,150,105,.08);}
body.light .ic-etat.warn{background:rgba(217,119,6,.08);}
body.light .ic-etat.bad{background:rgba(220,38,38,.08);}
.ic-qty{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

/* ── BACK ROW ── */
.back-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;margin-bottom:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;transition:all .15s;
}
.back-row:hover{border-color:rgba(230,81,0,.35);background:var(--card2);}
body.light .back-row{background:#fff;}
.back-row-title{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--txt);}
.back-row-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* ── SELECTION BAR ── */
.sel-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:rgba(28,16,18,.97);
  border-top:1px solid rgba(230,81,0,.3);
  backdrop-filter:blur(20px);
  padding:12px 20px;
  transform:translateY(100%);
  transition:transform .2s ease;
}
.sel-bar.visible{transform:translateY(0);}
body.light .sel-bar{background:rgba(248,250,252,.98);}
.sel-bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.sel-count{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;
  color:var(--rescueL);flex:1;
}
.sel-actions{display:flex;gap:8px;}

/* ── ADD MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--card2);
  border:1px solid rgba(230,81,0,.25);
  border-radius:var(--radius-lg);
  padding:24px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(230,81,0,.08);
}
body.light .modal{background:#fff;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-title{
  font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:.8px;
  color:var(--txt);margin-bottom:18px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:11px;font-weight:600;letter-spacing:1px;
  color:var(--muted);font-family:'Oswald',sans-serif;margin-bottom:6px;text-transform:uppercase;
}
.field input,.field select{
  width:100%;height:38px;padding:0 12px;
  background:rgba(12,6,8,.6);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--txt);
  font-family:'Inter',sans-serif;font-size:13px;outline:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--rescue);}
body.light .field input,body.light .field select{background:#F8FAFC;color:#0F172A;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}

/* ── LEXIQUE MODAL ── */
.lex-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(12,6,8,.99);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
}
.lex-modal.open{transform:translateX(0);}
body.light .lex-modal{background:rgba(248,250,252,.99);}
.lex-inner{flex:1;overflow-y:auto;padding:0 20px 40px;max-width:900px;margin:0 auto;width:100%;}
.lex-header{
  position:sticky;top:0;z-index:10;
  background:rgba(12,6,8,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  max-width:100%;
}
body.light .lex-header{background:rgba(248,250,252,.97);}
.lex-title{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;
  color:var(--txt);
}
.lex-title span{color:var(--gold);}
.lex-entries{display:grid;gap:8px;margin-top:16px;}
.lex-entry{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 16px;
  display:flex;align-items:flex-start;gap:14px;
  transition:border-color .15s;
}
.lex-entry:hover{border-color:rgba(230,81,0,.3);}
.lex-prefix{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  color:var(--gold);
  background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);
  border-radius:6px;padding:4px 10px;
  white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center;
  letter-spacing:.5px;
}
body.light .lex-prefix{background:rgba(212,160,23,.06);border-color:rgba(212,160,23,.25);}
.lex-info{flex:1;}
.lex-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px;letter-spacing:.3px;}
.lex-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.lex-cat{
  font-size:10px;font-weight:600;letter-spacing:.8px;
  color:var(--rescueL);font-family:'Oswald',sans-serif;
  background:rgba(230,81,0,.08);border-radius:4px;padding:2px 7px;
  margin-left:auto;flex-shrink:0;align-self:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid rgba(230,81,0,.3);
  border-radius:var(--radius-sm);
  padding:10px 20px;font-size:13px;font-weight:600;color:var(--txt);
  box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:300;

.theme-pill{

  .caisse-card,.item-card{background:#fff!important;border:1px solid #ccc!important;break-inside:avoid;}
  .gold-bar{display:none!important;}
  @page{margin:1cm;}
}

      qty:1, etat:mapEtat(it.etat||'Bon'),

      {id:'EPI-COMBI-001',nom:'Combinaison Tyvek M',desc:'DuPont Tyvek, blanc, M',fab:'DuPont',qty:3,etat:'bon'},
      {id:'EPI-COMBI-002',nom:'Combinaison Tyvek L',desc:'DuPont Tyvek, blanc, L',fab:'DuPont',qty:3,etat:'bon'},
      {id:'EPI-GANTS-001',nom:'Gants cuir T10',desc:'Gants sauvetage cuir, taille 10',fab:'Honeywell',qty:4,etat:'bon'},
      {id:'EPI-GANTS-002',nom:'Gants nitrile',desc:'Gants nitrile 8mil, boîte 50',fab:'Kimberly-Clark',qty:50,etat:'bon'},
    ]
  },
];

// ── QR URL BASE ──
const QR_BASE = 'https://voloinv7.netlify.app/?id=';

// ── STATE ──
let CAISSES = [];
let currentView = 'caisses'; // 'caisses' | 'items'
let currentCaisse = null;
let selected = new Set();
let searchQ = '';
let activeTab = '';
let allItems = [];

// Build CAISSES + allItems depuis data.js au load
function initData(){
  CAISSES = (typeof ITEMS!=='undefined'&&ITEMS.length) ? buildCaisses() : CAISSES_PLACEHOLDER;
  allItems = [];
  CAISSES.forEach(c=>{
    c.items.forEach(it=>{
      allItems.push({...it, caisse:c.id, caisseName:c.nom, cat:c.cat});
    });
  });
}



// ── INIT ──
function init(){
  initData();
  applyTheme();
  buildTabs();
  renderView();
  buildLexique();
  bindEvents();
}

function applyTheme(){
  const t = localStorage.getItem('volo_theme_main') || 'dark';
  document.body.classList.toggle('light', t==='light');
  document.getElementById('th-dark').classList.toggle('active', t!=='light');
  document.getElementById('th-light').classList.toggle('active', t==='light');
}

function buildTabs(){
  const cats = ['', ...new Set(CAISSES.map(c=>c.cat))];
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = cats.map(c=>`
    <button class="tab${c===activeTab?' active':''}" data-cat="${c}">
      ${c || 'TOUT'}
    </button>`).join('');
  wrap.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeTab = btn.dataset.cat;
      wrap.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderView();
    });
  });
}

function getFilteredCaisses(){
  let list = CAISSES;
  if(activeTab) list = list.filter(c=>c.cat===activeTab);
  if(searchQ){
    const q = searchQ.toLowerCase();
    list = list.filter(c=>{
      const nameMatch = c.nom.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q);
      const itemMatch = c.items.some(it=>it.nom.toLowerCase().includes(q)||it.id.toLowerCase().includes(q));
      return nameMatch || itemMatch;
    });
  }
  return list;
}

function renderView(){
  if(currentView==='caisses') renderCaisses();
  else renderItems(currentCaisse);
}

function renderCaisses(){
  const list = getFilteredCaisses();
  const main = document.getElementById('main');
  if(!list.length){
    main.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">Aucune caisse trouvée</div><div class="empty-sub">Essayez un autre terme de recherche</div></div>`;
    return;
  }
  main.innerHTML=`
    <div class="section-header">
      <span class="section-label">Caisses d'équipement</span>
      <span class="count-pill">${list.length} caisse${list.length>1?'s':''}</span>
    </div>
    <div class="caisse-grid" id="caisse-grid"></div>`;
  const grid = document.getElementById('caisse-grid');
  list.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'caisse-card'+(selected.has(c.id)?' selected':'');
    el.dataset.id = c.id;
    const preview = c.items.slice(0,4).map(it=>`<span>${it.nom.split(' ').slice(0,3).join(' ')}</span>`).join('');
    el.innerHTML=`
      <div class="cc-top">
        <div class="cc-qr-wrap" id="qr-${c.id}" onclick="event.stopPropagation();openQrZoom('${c.id}','${c.nom}')"></div>
        <div class="cc-id">${c.id}</div>
      </div>
      <div class="cc-icons">${c.icons}</div>
      <div class="cc-name">${c.nom}</div>
      <div class="cc-preview">${preview}</div>
      <div class="cc-footer">
        <span class="cc-count">${c.items.length} items</span>
        <span class="cc-drill">Voir ›</span>
      </div>`;
    el.addEventListener('click',e=>{
      if(e.target.closest('.cc-drill')||e.target.textContent==='Voir ›') return drillDown(c);
      toggleSelect(c.id);
      el.classList.toggle('selected', selected.has(c.id));
      updateSelBar();
    });
    el.querySelector('.cc-drill').parentElement.querySelector('.cc-drill').addEventListener('click',()=>drillDown(c));
    grid.appendChild(el);
    setTimeout(()=>genQR(`qr-${c.id}`, QR_BASE+c.id, 150), 50);
  });
}

function drillDown(caisse){
  currentView='items'; currentCaisse=caisse;
  selected.clear(); updateSelBar();
  renderItems(caisse);
}

function renderItems(caisse){
  const main = document.getElementById('main');
  let items = caisse.items;
  if(searchQ){
    const q=searchQ.toLowerCase();
    items=items.filter(it=>it.nom.toLowerCase().includes(q)||it.id.toLowerCase().includes(q)||it.desc.toLowerCase().includes(q));
  }
  main.innerHTML=`
    <div class="back-row" id="back-row">
      <span style="font-size:18px">←</span>
      <div>
        <div class="back-row-title">← ${caisse.nom}</div>
        <div class="back-row-sub">${caisse.id} · ${caisse.items.length} items</div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-label">Items</span>
      <span class="count-pill">${items.length} item${items.length>1?'s':''}</span>
    </div>
    <div class="items-grid" id="items-grid"></div>`;
  document.getElementById('back-row').addEventListener('click',()=>{
    currentView='caisses'; currentCaisse=null;
    selected.clear(); updateSelBar();
    renderCaisses();
  });
  const grid = document.getElementById('items-grid');
  items.forEach(it=>{
    const el = document.createElement('div');
    el.className='item-card'+(selected.has(it.id)?' selected':'');
    el.innerHTML=`
      <div class="ic-top">
        <div class="ic-qr-wrap" id="qr-${it.id}" onclick="event.stopPropagation();openQrZoom('${it.id}','${it.nom}')"></div>
        <div class="ic-id">${it.id}</div>
      </div>
      <div class="ic-name">${it.nom}</div>
      <div class="ic-desc">${it.desc}</div>
      <div class="ic-footer">
        <span class="ic-etat ${it.etat}">${it.etat==='bon'?'✓ BON':it.etat==='warn'?'⚠ VÉRIF':'✗ DÉFAUT'}</span>
        <span class="ic-qty">×${it.qty}</span>
      </div>`;
    el.addEventListener('click',()=>{
      toggleSelect(it.id);
      el.classList.toggle('selected', selected.has(it.id));
      updateSelBar();
    });
    grid.appendChild(el);
    setTimeout(()=>genQR(`qr-${it.id}`, QR_BASE+it.id, 150), 50);
  });
}

function genQR(containerId, text, size){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML='';
  try{
    new QRCode(el,{text, width:size, height:size, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.L});
  }catch(e){console.warn('QR error',e);}
}

function toggleSelect(id){ if(selected.has(id)) selected.delete(id); else selected.add(id); }

function updateSelBar(){
  const bar = document.getElementById('sel-bar');
  const n = selected.size;
  document.getElementById('sel-count').textContent = `${n} sélectionné${n>1?'s':''}`;
  bar.classList.toggle('visible', n>0);
}

function buildLexique(){
  const entries = document.getElementById('lex-entries');
  renderLexique(LEXIQUE);
  document.getElementById('lex-search').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    renderLexique(LEXIQUE.filter(l=>l.prefix.toLowerCase().includes(q)||l.nom.toLowerCase().includes(q)||l.desc.toLowerCase().includes(q)||l.cat.toLowerCase().includes(q)));
  });
}

function renderLexique(list){
  const entries = document.getElementById('lex-entries');
  if(!list.length){entries.innerHTML='<div class="empty"><div class="empty-title">Aucun préfixe trouvé</div></div>';return;}
  entries.innerHTML = list.map(l=>`
    <div class="lex-entry">
      <span class="lex-prefix">${l.prefix}</span>
      <div class="lex-info">
        <div class="lex-name">${l.nom}</div>
        <div class="lex-desc">${l.desc}</div>
      </div>
      <span class="lex-cat">${l.cat}</span>
    </div>`).join('');
}

function toast(msg, dur=2200){
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function playSound(){ try{document.getElementById('snd').cloneNode().play();}catch(e){} }

function openQrZoom(id, label){
  const modal = document.getElementById('qr-zoom-modal');
  const box = document.getElementById('qr-zoom-box');
  const lbl = document.getElementById('qr-zoom-label');
  const idEl = document.getElementById('qr-zoom-id');
  box.innerHTML = '';
  lbl.textContent = label || id;
  idEl.textContent = id;
  const size = Math.min(window.innerWidth - 80, 280);
  try{
    new QRCode(box,{text:QR_BASE+id, width:size, height:size, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.L});
  }catch(e){}
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeQrZoom(){
  document.getElementById('qr-zoom-modal').style.display = 'none';
  document.body.style.overflow = '';
}

// ── BIND EVENTS ──
function bindEvents(){
  // Search
  const inp = document.getElementById('search');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input',e=>{
    searchQ=e.target.value.trim();
    clr.classList.toggle('visible', !!searchQ);
    renderView();
  });
  clr.addEventListener('click',()=>{inp.value='';searchQ='';clr.classList.remove('visible');renderView();inp.focus();});

  // Theme
  document.getElementById('th-dark').addEventListener('click',()=>setTheme('dark'));
  document.getElementById('th-light').addEventListener('click',()=>setTheme('light'));

  // Lexique
  document.getElementById('btn-lexique').addEventListener('click',()=>document.getElementById('lex-modal').classList.add('open'));

  // Print
  document.getElementById('btn-print').addEventListener('click',()=>window.print());

  // Export
  document.getElementById('btn-export').addEventListener('click',()=>{
    const exportData = (typeof ITEMS!=='undefined') ? ITEMS : CAISSES;
    const blob = new Blob([JSON.stringify(exportData, null, 2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`inventaire_golden_eagles_${Date.now()}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast('✓ Export JSON téléchargé');
    playSound();
  });

  // Add modal
  document.getElementById('btn-add').addEventListener('click',()=>{
    const sel=document.getElementById('inp-cat');
    sel.innerHTML=CAISSES.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
    document.getElementById('modal').classList.add('open');
  });
  document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
  document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
  document.getElementById('btn-save').addEventListener('click',()=>{
    const name=document.getElementById('inp-name').value.trim();
    if(!name){toast('⚠ Nom requis');return;}
    const cat=document.getElementById('inp-cat').value;
    const desc=document.getElementById('inp-desc').value.trim();
    const fab=document.getElementById('inp-fab').value.trim();
    const qty=parseInt(document.getElementById('inp-qty').value)||1;
    const caisse=CAISSES.find(c=>c.id===cat);
    if(!caisse) return;
    const prefix=caisse.id.replace('CAISSE-','');
    const newId=`${prefix}-${String(caisse.items.length+1).padStart(3,'0')}`;
    caisse.items.push({id:newId,nom:name,desc,fab,qty,etat:'bon'});
    allItems.push({id:newId,nom:name,desc,fab,qty,etat:'bon',caisse:caisse.id,caisseName:caisse.nom,cat:caisse.cat});
    document.getElementById('modal').classList.remove('open');
    document.getElementById('inp-name').value='';
    renderView();
    toast(`✓ ${name} ajouté`);
    playSound();
  });

  // Selection bar
  document.getElementById('btn-clear-sel').addEventListener('click',()=>{selected.clear();updateSelBar();renderView();});
  document.getElementById('btn-print-sel').addEventListener('click',()=>{
    if(!selected.size) return;
    toast(`🖨 Impression de ${selected.size} QR code${selected.size>1?'s':''}…`);
    setTimeout(()=>window.print(), 500);
  });
}

function setTheme(t){
  localStorage.setItem('volo_theme_main',t);
  document.body.classList.toggle('light',t==='light');
  document.getElementById('th-dark').classList.toggle('active',t!=='light');
  document.getElementById('th-light').classList.toggle('active',t==='light');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
