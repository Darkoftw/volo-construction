<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0C0608">
<title>VOLO SST — Inventaire Golden Eagles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0C0608;--card:rgba(28,16,18,.90);--card2:rgba(38,22,26,.94);--cardSolid:#1C1012;
--gold:#D4A017;--goldL:#E8C547;
--rescue:#E65100;--rescueL:#FF6D00;--rescueD:#BF360C;--rescueGlow:rgba(230,81,0,.15);
--red:#C0392B;--green:#27AE60;--orange:#E67E22;
--txt:#F5F0EB;--muted:#B8A99A;--border:rgba(68,40,46,.55);--blue:#3B82F6;
--glow:0 0 30px rgba(230,81,0,.08);
--radius:14px;--radius-sm:10px;--radius-lg:18px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}
.app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;z-index:1}
.gold-bar{height:4px;background:linear-gradient(90deg,var(--rescueD),var(--rescue),var(--rescueL),var(--rescue),var(--rescueD));background-size:300% 100%;animation:shimmer 4s ease infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Ripple effect */
.ripple{position:absolute;border-radius:50%;background:rgba(230,81,0,.25);transform:scale(0);animation:rippleAnim .6s ease-out;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
.header{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:sticky;top:0;z-index:50;background:rgba(12,6,8,.94)}
.header img{width:44px;height:44px;border-radius:50%;border:2px solid var(--rescue);box-shadow:0 0 16px rgba(230,81,0,.2);transition:all .3s cubic-bezier(.4,0,.2,1)}
.header img:hover{transform:scale(1.12) rotate(3deg);box-shadow:0 0 24px rgba(230,81,0,.35)}
.header .title{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:3px;color:var(--rescue);text-shadow:0 0 20px rgba(230,81,0,.15)}
.header .step-label{font-size:13px;color:var(--muted);letter-spacing:1px}
.screen{padding:20px;min-height:calc(100vh - 76px);animation:fadeSlide .4s cubic-bezier(.22,1,.36,1)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,81,0,.4)}50%{box-shadow:0 0 20px 10px rgba(230,81,0,.1)}}
@keyframes scanLine{0%{top:10%}100%{top:90%}}
@keyframes stagger1{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
h2{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:3px;color:var(--rescue);margin-bottom:14px;text-align:center}
h3{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px;color:var(--goldL);margin-bottom:10px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:all .3s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(230,81,0,.15),transparent);opacity:0;transition:opacity .3s}
.card:hover,.card.selected{border-color:var(--rescue);background:var(--card2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(230,81,0,.08),0 0 0 1px rgba(230,81,0,.1)}
.card:hover::before,.card.selected::before{opacity:1}
.card.selected{border-color:var(--green);box-shadow:0 8px 32px rgba(39,174,96,.08)}
.card:active{transform:scale(.98);transition-duration:.1s}
.card .name{font-weight:600;font-size:16px}
.card .sub{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.card .role{font-size:12px;color:var(--gold);letter-spacing:1px;font-weight:600}
.btn{width:100%;padding:16px;border:none;border-radius:var(--radius);font-family:'Oswald',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1);font-weight:600;position:relative;overflow:hidden}
.btn-gold{background:linear-gradient(135deg,var(--rescue),var(--rescueD));color:#fff;box-shadow:0 4px 16px rgba(230,81,0,.2)}
.btn-gold:hover{box-shadow:0 6px 24px rgba(230,81,0,.35);transform:translateY(-1px)}
.btn-blue{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.2)}
.btn-blue:hover{box-shadow:0 6px 24px rgba(59,130,246,.35);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,#2ecc71,#1a8a47);color:#fff;box-shadow:0 4px 16px rgba(39,174,96,.2)}
.btn-green:hover{box-shadow:0 6px 24px rgba(39,174,96,.35);transform:translateY(-1px)}
.btn-orange{background:linear-gradient(135deg,var(--rescueL),var(--rescue));color:#fff;box-shadow:0 4px 16px rgba(255,109,0,.2)}
.btn-orange:hover{box-shadow:0 6px 24px rgba(255,109,0,.35);transform:translateY(-1px)}
.btn-red{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 4px 16px rgba(192,57,43,.2)}
.btn-outline{background:transparent;border:1px dashed var(--rescue);color:var(--rescue);padding:12px;font-size:14px;box-shadow:none}
.btn-outline:hover{background:var(--rescueGlow);border-style:solid}
.btn:active{transform:scale(.97);transition-duration:.1s}
.btn-filter{flex:1;padding:8px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .25s}
.btn-filter.active{border-color:var(--rescue);color:var(--rescue);background:var(--rescueGlow)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100%);padding:12px 24px;border-radius:14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;max-width:90%;text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:toastIn .4s cubic-bezier(.4,0,.2,1) forwards}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-100%)}to{transform:translateX(-50%) translateY(0)}}
.toast-ok{background:rgba(39,174,96,.92);color:#fff}
.toast-err{background:rgba(192,57,43,.92);color:#fff}
.toast-off{background:rgba(230,126,34,.92);color:#fff}
.toast-info{background:rgba(59,130,246,.92);color:#fff}
.net-badge{position:fixed;top:8px;right:12px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;z-index:9998;font-family:'Inter',sans-serif}
.net-on{background:var(--green);color:#fff}
.net-off{background:var(--red);color:#fff;animation:pulse 2s infinite}
.btn-sm{padding:14px;font-size:15px}
.btn-nav{display:flex;gap:10px;margin-top:16px}
.btn-nav .btn{flex:1}
.stats-row{display:flex;gap:12px;margin:20px 0}
.stat{flex:1;text-align:center;padding:16px 10px;border-radius:12px;background:var(--card)}
.stat .num{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700}
.stat .label{font-size:11px;letter-spacing:2px;color:var(--muted);margin-top:4px}
.check{color:var(--green);font-weight:700;font-size:18px}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:1px}
.badge-green{background:rgba(39,174,96,.12);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.badge-red{background:rgba(192,57,43,.12);color:var(--red);border:1px solid rgba(192,57,43,.2)}
.badge-gold{background:var(--rescueGlow);color:var(--rescue);border:1px solid rgba(230,81,0,.2)}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.badge-orange{background:rgba(255,109,0,.12);color:var(--rescueL);border:1px solid rgba(255,109,0,.2)}
.pin-row{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:52px;height:60px;border-radius:12px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--rescue);font-weight:700;transition:all .25s cubic-bezier(.22,1,.36,1);background:var(--card)}
.pin-dot.filled{border-color:var(--rescue);box-shadow:0 0 16px rgba(230,81,0,.2)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:12px auto}
.numpad button{height:54px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--txt);font-size:22px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.numpad button:active{background:var(--rescueGlow);transform:scale(.95);border-color:var(--rescue)}
.scan-area{background:#000;border-radius:var(--radius);border:2px solid var(--rescue);padding:24px;text-align:center;position:relative;overflow:hidden;margin-bottom:14px;animation:glowPulse 3s ease infinite}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--rescue),transparent);animation:scanLine 2s linear infinite;opacity:.7}
.item-scanned{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);border-radius:10px;margin-bottom:8px;font-size:15px}
.item-scanned .id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.item-btn{padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .3s cubic-bezier(.22,1,.36,1)}
.item-btn:hover{border-color:var(--rescue);transform:translateX(4px);box-shadow:0 4px 16px rgba(230,81,0,.06)}
.item-btn:active{transform:scale(.98)}
.item-btn .cat{margin-right:8px;font-size:18px}
.confirm-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;backdrop-filter:blur(12px)}
.confirm-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.confirm-label{color:var(--muted);font-size:12px;letter-spacing:1px;margin-bottom:4px;margin-top:12px;text-align:center}
.confirm-label:first-child{margin-top:0}
.splash-logo{width:160px;height:160px;border-radius:50%;border:3px solid var(--rescue);display:block;margin:0 auto;box-shadow:0 0 40px rgba(230,81,0,.15),0 0 80px rgba(230,81,0,.05)}
.remorque-tabs{display:flex;gap:10px;margin-bottom:14px}
.remorque-tab{flex:1;padding:16px;border-radius:var(--radius-sm);text-align:center;font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;border:2px solid var(--border);background:var(--card);color:var(--muted);transition:all .25s}
.remorque-tab.active{border-color:var(--rescue);color:var(--rescue);background:var(--rescueGlow)}
.urgence-btn{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(192,57,43,.4);z-index:100;animation:pulse 2s infinite}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);animation:fadeSlide .2s ease}
.modal{background:var(--cardSolid);border:2px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;animation:fadeIn .3s ease}
.modal h3{color:var(--red);margin-bottom:14px;font-size:18px}
.modal input,.modal select,.modal textarea{width:100%;padding:12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--txt);font-family:'Inter',sans-serif;font-size:15px;margin-bottom:12px;transition:border-color .2s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--rescue);outline:none;box-shadow:0 0 0 3px rgba(230,81,0,.1)}
.hidden{display:none}
/* Lock screen */
.lock-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(12,6,8,.97);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(20px)}
.lock-overlay .lock-icon{font-size:64px;animation:float 3s ease-in-out infinite}
.lock-overlay .lock-text{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:3px;color:var(--rescue)}
.lock-overlay .lock-sub{font-size:14px;color:var(--muted);text-align:center;max-width:280px}
/* Dashboard */
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;backdrop-filter:blur(12px)}
.dash-item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(58,36,40,.3)}
.dash-item-row:last-child{border-bottom:none}
.time-ago{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 8px;border-radius:6px}
.time-ok{background:rgba(39,174,96,.12);color:var(--green)}
.time-warn{background:rgba(230,126,34,.12);color:var(--orange)}
.time-alert{background:rgba(192,57,43,.12);color:var(--red)}
/* History */
.history-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;backdrop-filter:blur(12px);transition:all .25s}
.history-item:hover{border-color:rgba(230,81,0,.2);background:var(--card2)}
.h-mode{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;padding:3px 10px;border-radius:8px;display:inline-block}
.h-pickon{background:rgba(39,174,96,.15);color:var(--green)}
.h-pickoff{background:rgba(230,126,34,.15);color:var(--orange)}
.h-cancelled{background:rgba(192,57,43,.15);color:var(--red)}
/* Nav grid accueil */
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.nav-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(12px)}
.nav-card:hover,.nav-card:active{border-color:var(--rescue);background:var(--card2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(230,81,0,.1)}
.nav-card .nav-icon{font-size:28px;margin-bottom:8px;display:block}
.nav-card .nav-label{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted)}
/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rescue);border-radius:4px}
@keyframes slideInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 15px rgba(230,81,0,.15)}50%{box-shadow:0 0 30px rgba(230,81,0,.3)}}
/* Photos */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--card)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(192,57,43,.9);color:#fff;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:transform .15s}
.photo-thumb .del:active{transform:scale(.9)}
.photo-add{aspect-ratio:1;border-radius:10px;border:2px dashed var(--rescue);background:rgba(230,81,0,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;color:var(--rescue);gap:4px}
.photo-add:hover,.photo-add:active{background:rgba(230,81,0,.1);border-style:solid}
.photo-add .ico{font-size:28px}
.photo-add .lbl{font-size:11px;letter-spacing:1px;font-family:'Oswald',sans-serif}
.photo-count{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;color:var(--rescue);text-align:center;margin-bottom:6px}
</style>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<audio id="eaglecry" preload="auto" src="eagle.mp3"></audio>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
<div class="app" id="app"></div>
<div id="lock-screen" class="lock-overlay" style="display:none">
  <div class="lock-icon">🔒</div>
  <div class="lock-text">SESSION VERROUILLÉE</div>
  <div class="lock-sub">Inactivité détectée — touche l'écran pour revenir</div>
  <button class="btn btn-gold" onclick="unlockScreen()" style="max-width:280px;margin-top:12px">🦅 DÉVERROUILLER</button>
</div>

// ── Helper: current user is SURVEILLANT? ──
function isUserSurv(){
  const r=localStorage.getItem('volo_last_role');
  return r==='SURVEILLANT';
}

// ===== LOCK SCREEN (2 min inactivity) =====
let lockTimeout=null;
const LOCK_DELAY=300000; // 5 minutes
function resetLockTimer(){
  if(lockTimeout)clearTimeout(lockTimeout);
  if(state.step>0){
    lockTimeout=setTimeout(()=>{
      if(state.loggedIn){
        // Lock to accueil after inactivity (PIN stays saved)
        state.step=0;
        render();
        lockScreen();
      }
    },LOCK_DELAY);
  }
}
function lockScreen(){
  document.getElementById('lock-screen').style.display='flex';
  try{navigator.vibrate&&navigator.vibrate([100,50,100])}catch(e){}
}
function unlockScreen(){
  document.getElementById('lock-screen').style.display='none';
  // Go to PIN if session expired
  if(!state.loggedIn){render();}
  resetLockTimer();
}
['click','touchstart','keydown','scroll'].forEach(evt=>{
  document.addEventListener(evt,resetLockTimer,{passive:true});
});

// ===== TRANSACTION HISTORY =====
function getHistory(){
  try{return JSON.parse(localStorage.getItem('volo_history')||'[]')}catch(e){return[]}
}
function saveToHistory(payload){
  const h=getHistory();
  h.unshift({...payload,id:'TX-'+Date.now()});
  if(h.length>100)h.length=100;
  localStorage.setItem('volo_history',JSON.stringify(h));
}
function getActiveItems(){
  const h=getHistory();
  const active=[];
  // === V7.1 PICK-OFF FIX — use original_timestamp for cancel/return key matching ===
  const closed=new Set();
  h.forEach(tx=>{
    if(tx.statut==='ANNULÉ'||tx.statut==='RETOURNÉ'){
      const key=(tx.original_timestamp||tx.timestamp)+tx.sauveteur_id;
      closed.add(key);
    }
  });
  h.forEach(tx=>{
    if(tx.statut==='ACTIF'&&tx.mode==='PICK-ON'&&!closed.has(tx.timestamp+tx.sauveteur_id)){
      try{
        const items=JSON.parse(tx.items||'[]');
        items.forEach(item=>{
          active.push({...item,sauveteur:tx.sauveteur_nom,destination:tx.destination,num_projet:tx.num_projet||'',personne_ressource:tx.personne_ressource||'',timestamp:tx.timestamp,txId:tx.id});
        });
      }catch(e){}
    }
  });
  return active;
}

// ===== PICK-OFF INTELLIGENT =====
// === V7.1 PICK-OFF FIX — getActiveDeployments uses original_timestamp for key matching ===
function getActiveDeployments(){
  const h=getHistory();
  const closed=new Set();
  h.forEach(tx=>{
    if(tx.statut==='ANNULÉ'||tx.statut==='RETOURNÉ'){
      // Use original_timestamp if present (cancel/return), else tx.timestamp
      const key=(tx.original_timestamp||tx.timestamp)+tx.sauveteur_id;
      closed.add(key);
    }
  });
  return h.filter(tx=>tx.statut==='ACTIF'&&tx.mode==='PICK-ON'&&!closed.has(tx.timestamp+tx.sauveteur_id));
}

  const depotMatch=DEPOTS.find(d=>d.name===tx.depot);
  const destMatch=DESTINATIONS.find(d=>d.name===tx.destination);
  const remIds=tx.remorque&&tx.remorque!=='Aucun'?tx.remorque.split(' + ').map(n=>{const r=REMORQUES.find(x=>x.name===n);return r?r.id:null}).filter(Boolean):[];

  const sauvMatch=SAUVETEURS.find(s=>s.name===tx.sauveteur_nom);

}

function checkOverdueItems(){
  const active=getActiveItems();
  const now=Date.now();
  let overdueCount=0;
  active.forEach(item=>{
    const ts=new Date(item.timestamp).getTime();
    if(now-ts>86400000)overdueCount++;
  });
  if(overdueCount>0){
    showToast('⚠️ '+overdueCount+' item(s) sorti(s) depuis +24h!','info');
  }
}

function timeAgo(timestamp){
  const diff=Date.now()-new Date(timestamp).getTime();
  const mins=Math.floor(diff/60000);
  if(mins<60)return mins+'min';
  const hrs=Math.floor(mins/60);
  if(hrs<24)return hrs+'h'+String(mins%60).padStart(2,'0');
  const days=Math.floor(hrs/24);
  return days+'j '+hrs%24+'h';
}
function timeClass(timestamp){
  const diff=Date.now()-new Date(timestamp).getTime();
  if(diff>86400000)return 'time-alert';
  if(diff>28800000)return 'time-warn';
  return 'time-ok';
}

// V9: Terrain contacts auto-fill
function getTerrainContacts(){try{return JSON.parse(localStorage.getItem('volo_terrain_contacts')||'{}')}catch(e){return{}}}
function saveTerrainContact(){
  if(!state.dest)return;
  const contacts=getTerrainContacts();
  const data={};
  if(state.personneRessource)data.nom=state.personneRessource;
  if(state.personneRessourceTel)data.tel=state.personneRessourceTel;
  if(state.personneRessourceEmail)data.email=state.personneRessourceEmail;
  if(Object.keys(data).length>0){contacts[state.dest]=data;localStorage.setItem('volo_terrain_contacts',JSON.stringify(contacts));}
}
function loadTerrainContact(destId){
  const contacts=getTerrainContacts();
  const c=contacts[destId];
  if(c){
    if(c.nom&&!state.personneRessource)state.personneRessource=c.nom;
    if(c.tel&&!state.personneRessourceTel)state.personneRessourceTel=c.tel;
    if(c.email&&!state.personneRessourceEmail)state.personneRessourceEmail=c.email;
  }
}

  if(q) list=list.filter(s=>s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q)||s.volo.toLowerCase().includes(q)||s.ville.toLowerCase().includes(q));

    <div class="btn-nav">
      <button class="btn btn-outline btn-sm" onclick="setState({step:4})">◀ RETOUR</button>
      ${state.sauvs.length?`<button class="btn btn-green btn-sm" onclick="setState({step:6})">CONTINUER (${state.sauvs.length}) ▶</button>`:''}
    </div>`;
}

  const scannedIds=state.scanned.map(s=>s.id);

  let available=ITEMS.filter(i=>!scannedIds.includes(i.id));

  if(state.catFilter && state.catFilter!=='all') available=available.filter(i=>i.cat===state.catFilter);
  const isPickoff=state.mode==='pickoff';

  const expectedIds=expected.map(e=>e.id);
  if(isPickoff&&expectedIds.length){
    available.sort((a,b)=>{const aExp=expectedIds.includes(a.id)?0:1;const bExp=expectedIds.includes(b.id)?0:1;return aExp-bExp;});
  }

  return `<h2>${isPickoff?'◀ RETOUR ITEMS':'SCAN RAFALE UNIFIÉ'}</h2>

        <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:${expectedScanned===expected.length?'var(--green)':'var(--orange)'}">${expectedScanned}/${expected.length}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${expected.map(e=>`<span style="font-size:11px;padding:3px 8px;border-radius:6px;${scannedIds.includes(e.id)?'background:rgba(39,174,96,.2);color:var(--green)':'background:var(--card2);color:var(--muted)'}">${scannedIds.includes(e.id)?'✓ ':''}${e.name||e.id}</span>`).join('')}
      </div>
      ${expectedScanned===expected.length?'<div style="text-align:center;margin-top:8px;color:var(--green);font-weight:700;font-size:14px">✅ TOUS LES ITEMS SCANNÉS</div>':''}
    </div>`:''}
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <button class="btn btn-sm ${camMode?'btn-green':''}" style="flex:1;${camMode?'':'background:var(--card);border:1px solid var(--border);color:var(--muted)'}" onclick="toggleCam(true)">📷 CAMÉRA</button>
      <button class="btn btn-sm ${!camMode?'btn-gold':''}" style="flex:1;${!camMode?'':'background:var(--card);border:1px solid var(--border);color:var(--muted)'}" onclick="toggleCam(false)">✋ MANUEL</button>

      <p style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:14px">Pointe la caméra vers le QR code de l'item</p>`
    :`<div class="scan-area" style="padding:16px;text-align:center">
      <div style="color:var(--gold);font-size:15px;margin-bottom:6px">✋ MODE MANUEL</div>
      <div style="color:var(--muted);font-size:13px">Touche un item dans la liste ci-dessous</div>
    </div>`}
    ${state.scanned.length?`<div style="background:var(--card);border:1px solid var(--green);border-radius:12px;padding:12px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;color:var(--green)">📋 DERNIERS SCANS</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:700">${state.scanned.length} item${state.scanned.length>1?'s':''}</div>
      </div>
      <div style="max-height:140px;overflow-y:auto;-webkit-overflow-scrolling:touch">

        const t=item.scanTime?new Date(item.scanTime):new Date();
        const ts=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px">

function renderConfirm(){
  const depot=DEPOTS.find(d=>d.id===state.depot);
  const dest=DESTINATIONS.find(d=>d.id===state.dest);
  const remNames=state.remorques&&state.remorques.length?state.remorques.map(id=>{const r=REMORQUES.find(x=>x.id===id);return r?r.name:id}).join(' + '):'Aucun';
  const sauvNames=state.sauvs.map(id=>{const s=SAUVETEURS.find(x=>x.id===id);return s?s.name:id}).join(', ');
  const isPickoff=state.mode==='pickoff';
  const expected=isPickoff&&window._pickoffExpected?window._pickoffExpected:[];
  const expectedIds=expected.map(e=>e.id);
  const scannedIds=state.scanned.map(s=>s.id);
  const expectedScanned=expected.filter(e=>scannedIds.includes(e.id)).length;
  return `<h2>${isPickoff?'◀ CONFIRMATION RETOUR':'CONFIRMATION'}</h2>
    ${isPickoff?`<div style="background:rgba(230,126,34,.1);border:1px solid var(--orange);border-radius:12px;padding:12px;margin-bottom:14px;text-align:center">
      <div style="font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px;color:var(--orange);margin-bottom:4px">📦 RETOUR MATÉRIEL (PICK-OFF)</div>
      <div style="font-size:13px;color:var(--muted)">${expectedScanned}/${expected.length} items attendus scannés${expectedScanned<expected.length?' — <span style="color:var(--red)">⚠️ incomplet</span>':' — <span style="color:var(--green)">✅ complet</span>'}</div>
    </div>`:''}
    <div class="confirm-block">
      <div class="confirm-label">VÉHICULE</div><div style="font-weight:600;font-size:16px">${remNames||'Aucun véhicule'}</div>
      <div class="confirm-label">DÉPÔT</div><div style="font-weight:600;font-size:16px">${depot?depot.name:'—'}</div>
      <div class="confirm-label">DESTINATION</div><div style="font-weight:600;font-size:16px">${dest?dest.name:'—'}</div>
      ${state.numProjet?`<div class="confirm-label">N° PROJET</div><div style="font-weight:600;font-size:15px;color:var(--rescue)">${state.numProjet}</div>`:''}
      ${state.personneRessource?`<div class="confirm-label">CONTACT TERRAIN</div><div style="font-size:15px">${state.personneRessource}${state.personneRessourceTel?' • 📞 '+state.personneRessourceTel:''}</div>`:''}
      ${state.detailsJob?`<div class="confirm-label">DÉTAILS JOB</div><div style="font-size:14px;color:var(--muted);white-space:pre-wrap">${state.detailsJob}</div>`:''}
      <div class="confirm-label">SAUVETEUR(S)</div><div style="font-size:15px">${sauvNames}</div>
      <div class="confirm-label">ITEMS (${state.scanned.length})</div>
      ${state.scanned.map((i,idx)=>{
        const wasExpected=isPickoff&&expectedIds.includes(i.id);
        return `<div class="confirm-row" style="display:flex;justify-content:space-between;align-items:center"><span>${i.icon} ${i.name}${wasExpected?' <span style="font-size:10px;color:var(--green)">✓ ATTENDU</span>':''}</span><span style="display:flex;align-items:center;gap:8px"><span style="font-family:'JetBrains Mono';color:var(--muted);font-size:12px">${i.id}</span><button onclick="removeScannedItem(${idx})" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--red);background:rgba(192,57,43,.1);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">✕</button></span></div>`;
      }).join('')}
    </div>
    <button class="btn ${isPickoff?'btn-orange':'btn-green'}" onclick="doValidation()" style="font-size:20px;padding:18px">🦅 ${isPickoff?'CONFIRMER LE RETOUR':'ENREGISTRER'}</button>

// V9: Remove scanned item from confirmation
function removeScannedItem(idx){
  state.scanned.splice(idx,1);
  if(state.scanned.length===0){setState({step:6});showToast('⚠️ Aucun item — retour au scan','err');}
  else{render();}
}

function renderValidation(){
  const depot=DEPOTS.find(d=>d.id===state.depot);
  const dest=DESTINATIONS.find(d=>d.id===state.dest);
  const remNames=state.remorques&&state.remorques.length?state.remorques.map(id=>{const r=REMORQUES.find(x=>x.id===id);return r?r.name:id}).join(' + '):'Aucun';
  const sauvNames=state.sauvs.map(id=>{const s=SAUVETEURS.find(x=>x.id===id);return s?s.name:id});
  const canCancel=cancelSeconds>0&&lastPayload;
  const m=Math.floor(cancelSeconds/60);const s=cancelSeconds%60;

// ===== QR SCANNER =====
let qrScanner=null;
let qrCooldown=false;

function startQrScanner(){
  if(qrScanner)return;
  const el=document.getElementById('qr-reader');
  if(!el)return;
  if(typeof Html5Qrcode==='undefined'){
    el.innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">Librairie QR non chargée.<br>Vérifie ta connexion internet.</div>';
    return;
  }
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--gold)">Activation caméra...</div>';
  qrScanner=new Html5Qrcode('qr-reader');
  qrScanner.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:220,height:220},aspectRatio:1.0},
    onQrSuccess,
    ()=>{}
  ).catch(e=>{
    qrScanner=null;
    el.innerHTML='<div style="padding:30px;text-align:center"><div style="color:var(--red);font-size:15px;margin-bottom:10px">⚠️ Caméra non disponible</div><div style="color:var(--muted);font-size:13px">Autorise la caméra dans ton navigateur<br>ou utilise le mode manuel</div></div>';
  });
}

function stopQrScanner(){
  if(qrScanner){
    try{qrScanner.stop().then(()=>{qrScanner.clear();qrScanner=null}).catch(()=>{qrScanner=null})}catch(e){qrScanner=null}
  }
}

function onQrSuccess(decoded){
  if(qrCooldown)return;
  qrCooldown=true;
  setTimeout(()=>{qrCooldown=false},1500);
  let itemId=decoded.trim();
  if(itemId.startsWith('VOLO|ITEM|'))itemId=itemId.split('|')[2];
  const item=ITEMS.find(i=>i.id===itemId);
  if(item&&!state.scanned.find(s=>s.id===itemId)){
    const sceaux={...state.sceaux};
    if(item.sceau)sceaux[itemId]='INTACT';
    const stamped={...item,scanTime:new Date()};
    try{navigator.vibrate&&navigator.vibrate(100)}catch(e){}
    showToast('✓ '+item.name,'ok');
    stopQrScanner();
    setState({scanned:[...state.scanned,stamped],sceaux});
  }
}

function toggleCam(on){
  stopQrScanner();
  state.camMode=on;
  render();
  if(on)setTimeout(()=>startQrScanner(),500);
}

// PHOTO DROP — Compression + Preview
function triggerPhoto(){document.getElementById('photoInput').click();}
function handlePhoto(input){
  if(!input.files||!input.files[0])return;
  if(state.setupPhotos.length>=10){showToast('⚠️ Maximum 10 photos','err');return;}
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX=600;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.35);
      state.setupPhotos.push({data:compressed,ts:Date.now()});
      render();
      showToast('📷 Photo ajoutée ('+state.setupPhotos.length+'/10)','ok');
      if(navigator.vibrate)navigator.vibrate(50);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

function hasPointageToday(){
  const ptg=JSON.parse(localStorage.getItem('volo-ptg-history')||'[]');
  const today=new Date().toISOString().slice(0,10);
  const user=PERSONNEL.find(p=>p.volo==='V'+state.pin);
  if(!user)return false;
  return ptg.some(e=>(e.sauveteur_id===user.id||e.sauveteur_id===user.volo) && e.timestamp && e.timestamp.startsWith(today));
}

function hasKmToday(){
  const logs=getKmLogs();
  const today=new Date().toISOString().slice(0,10);
  const user=PERSONNEL.find(p=>p.volo==='V'+state.pin);
  if(!user)return false;
  return logs.some(l=>(l.sauveteur_id===user.id||l.sauveteur_id===user.volo||l.sauveteur_volo===user.volo) && l.timestamp && l.timestamp.startsWith(today));
}

function getOpenDeployment(){
  const logs=getKmLogs();
  const user=PERSONNEL.find(p=>p.volo==='V'+state.pin);
  if(!user)return null;
  const myLogs=logs.filter(l=>l.sauveteur_id===user.id||l.sauveteur_volo===user.volo||l.sauveteur===user.name);
  for(const l of myLogs){
    if(l.type_trajet==='RETOUR')return null;
    if(l.type_trajet==='ALLER SIMPLE')return l;
  }
  return null;
}

function submitOdoRetour(){
  const odoEnd=parseInt(state.kmOdoEnd);
  if(isNaN(odoEnd)||odoEnd<=0){showToast('⚠️ Entrez le kilométrage au compteur','err');return;}
  const openOdo=getOpenOdo();
  if(!openOdo){showToast('⚠️ Aucun trajet ouvert','err');return;}
  if(odoEnd<=openOdo.odo_depart){showToast('⚠️ Le KM final doit être supérieur au départ ('+openOdo.odo_depart+')','err');return;}
  const kmParcouru=odoEnd-openOdo.odo_depart;
  if(kmParcouru>1500){if(!confirm('⚠️ '+kmParcouru+' km parcouru — c\'est beaucoup! Confirmer?'))return;}
  // Update the open log
  const logs=getOdoLogs();
  const s=PERSONNEL.find(p=>p.volo==='V'+state.pin);
  const idx=logs.findIndex(l=>(l.sauveteur_id===(s?s.id:''))&&l.statut==='OUVERT');
  if(idx>=0){
    logs[idx].odo_fin=odoEnd;
    logs[idx].km_parcouru=kmParcouru;
    logs[idx].statut='FERMÉ';
    logs[idx].timestamp_retour=tsNow();
    localStorage.setItem('volo_odo_logs',JSON.stringify(logs));
  }
  const payload={type:'ODO_LOG',statut:'FERMÉ',vehicule:openOdo.vehicule,odo_depart:openOdo.odo_depart,odo_fin:odoEnd,km_parcouru:kmParcouru,destination:openOdo.destination,projet:openOdo.projet,sauveteur:s?s.name:'',sauveteur_id:s?s.id:'',sauveteur_volo:s?s.volo:'',timestamp:tsNow()};
  fetch('https://hook.us2.make.com/wm4fvbqy87nfcuf111azq02l3w2a87sh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(()=>{try{const q=JSON.parse(localStorage.getItem('volo_queue')||'[]');q.push(payload);localStorage.setItem('volo_queue',JSON.stringify(q))}catch(e){}});
  playEagleCry();
  if(navigator.vibrate)navigator.vibrate([100,50,100]);
  showToast('✅ Retour — '+openOdo.vehicule+' : '+kmParcouru+' km parcourus','ok');
  state.kmOdoEnd='';
  render();
}

function getCertData(userId){return JSON.parse(localStorage.getItem('volo_certs_'+userId)||'{}')}
function setCertData(userId,data){localStorage.setItem('volo_certs_'+userId,JSON.stringify(data))}

function certStatus(certId,userId){
  const data=getCertData(userId);
  const cert=CERTS_LIST.find(c=>c.id===certId);
  if(!cert)return{status:'missing',label:'—',color:'var(--muted)'};
  const d=data[certId];
  if(!d)return{status:'missing',label:'NON ENREGISTRÉ',color:'var(--muted)'};
  const obtained=new Date(d);
  const exp=new Date(d);exp.setMonth(exp.getMonth()+cert.dur);
  const now=new Date();
  const days=Math.ceil((exp-now)/(86400000));
  if(days<0)return{status:'expired',label:'EXPIRÉ ('+Math.abs(days)+'j)',color:'var(--red)',exp:exp.toISOString().slice(0,10)};
  if(days<60)return{status:'warning',label:days+'j restants',color:'var(--gold)',exp:exp.toISOString().slice(0,10)};
  return{status:'valid',label:'OK → '+exp.toISOString().slice(0,10),color:'var(--green)',exp:exp.toISOString().slice(0,10)};
}

  if(myActive.length>0){
    const items=myActive.reduce((n,tx)=>{try{return n+JSON.parse(tx.items||'[]').length}catch(e){return n}},0);
    if(!confirm('⚠️ Tu as déjà '+myActive.length+' déploiement'+(myActive.length>1?'s':'')+' actif'+(myActive.length>1?'s':'')+' ('+items+' items dehors).\n\nVeux-tu quand même lancer un nouveau PICK-ON?'))return;
  }
  setState({step:2,mode:'pickon'});
}
function startPickOff(){

  window._pickoffExpected=null;

  const sauvNames=state.sauvs.map(id=>{const s=SAUVETEURS.find(x=>x.id===id);return s?s.name:id});
  const payload={
    mode:state.mode==='pickon'?'PICK-ON':'PICK-OFF',

    sauveteur_nom:sauvNames[0]||'',

    nb_items:state.scanned.length,
    statut:'ACTIF',
    timestamp:tsNow()
  };
  lastPayload=payload;
  cancelSeconds=300;
  saveToHistory(payload);
  // === V7.1 PICK-OFF FIX — Mark original PICK-ON as RETOURNÉ when PICK-OFF completes ===
  if(state.mode==='pickoff'&&window._pickoffOriginalTx){
    const origTx=window._pickoffOriginalTx;
    const closurePayload={
      mode:'PICK-ON',
      sauveteur_id:origTx.sauveteur_id||'',
      sauveteur_nom:origTx.sauveteur_nom||'',
      remorque:origTx.remorque||'Aucun',
      depot:origTx.depot||'',
      destination:origTx.destination||'',
      num_projet:origTx.num_projet||'',
      personne_ressource:origTx.personne_ressource||'',
      items:origTx.items||'[]',
      nb_items:origTx.nb_items||0,
      statut:'RETOURNÉ',
      original_timestamp:origTx.timestamp,
      timestamp:tsNow()
    };
    saveToHistory(closurePayload);
    // Clean up global reference
    window._pickoffOriginalTx=null;
    window._pickoffExpected=null;
  }
  fetch('https://hook.us2.make.com/wm4fvbqy87nfcuf111azq02l3w2a87sh',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
  }).then(r=>{if(r.ok)showToast('✅ Transaction envoyée','ok');else showToast('⚠️ Erreur serveur','err')})
  .catch(()=>{
    try{const q=JSON.parse(localStorage.getItem('volo_queue')||'[]');q.push(payload);localStorage.setItem('volo_queue',JSON.stringify(q))}catch(e){}
    showToast('📴 Hors-ligne — sauvegardé localement','off');
  });
  // V9.1: Envoie 1 seul webhook ITEM_LOG avec items_array JSON (au lieu de 1 par item)
  const itemsArray = state.scanned.map(item => {
    const itemDef = ITEMS.find(x => x.id === item.id);
    return {
      item_id: item.id || '',
      item_name: item.name || '',
      item_cat: itemDef ? itemDef.cat : '',
      item_icon: itemDef ? itemDef.icon : '📦',
      sceau: state.sceaux[item.id] || 'N/A'
    };
  });
  const itemBatchPayload = {
    type: 'ITEM_LOG',
    items_array: JSON.stringify(itemsArray),
    nb_items: itemsArray.length,
    mode: payload.mode,
    sauveteur_nom: payload.sauveteur_nom,
    sauveteur_id: payload.sauveteur_id,
    destination: payload.destination,
    depot: payload.depot,
    num_projet: payload.num_projet,
    remorque: payload.remorque,
    timestamp: payload.timestamp
  };
  fetch('https://hook.us2.make.com/wm4fvbqy87nfcuf111azq02l3w2a87sh', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(itemBatchPayload)
  }).catch(() => { try { const q = JSON.parse(localStorage.getItem('volo_queue') || '[]'); q.push(itemBatchPayload); localStorage.setItem('volo_queue', JSON.stringify(q)) } catch(e) {} });
  setState({step:8});setTimeout(()=>playEagleCry(),300);
  startCancelTimer();
}
function startCancelTimer(){
  if(cancelTimer)clearInterval(cancelTimer);
  cancelTimer=setInterval(()=>{
    cancelSeconds--;
    const el=document.getElementById('cancel-btn');
    if(el){
      if(cancelSeconds<=0){clearInterval(cancelTimer);cancelTimer=null;el.style.display='none';return}
      const m=Math.floor(cancelSeconds/60);const s=cancelSeconds%60;
      el.textContent=`ANNULER (${m}:${String(s).padStart(2,'0')} restant)`;
    }
  },1000);
}
function cancelTransaction(){
  if(!lastPayload||cancelSeconds<=0)return;
  if(cancelTimer){clearInterval(cancelTimer);cancelTimer=null;}
  // === V7.1 PICK-OFF FIX — Preserve original_timestamp for key matching ===
  const cancelPayload={...lastPayload,statut:'ANNULÉ',original_timestamp:lastPayload.timestamp,timestamp:tsNow()};
  saveToHistory(cancelPayload);
  fetch('https://hook.us2.make.com/wm4fvbqy87nfcuf111azq02l3w2a87sh',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cancelPayload)
  }).then(r=>{if(r.ok)showToast('✅ Transaction annulée','ok');else showToast('⚠️ Erreur annulation','err')})
  .catch(()=>showToast('📴 Annulation hors-ligne','off'));
  lastPayload=null;cancelSeconds=0;
  render();
}

let gainsView='overview'; // overview|history
let gainsHistPeriod='current'; // current|prev|all

function getGainsUser(){
  return PERSONNEL.find(p=>p.volo==='V'+state.pin)||null;
}

function getPayPeriods(){
  // Weekly: Monday to Sunday, payday Thursday
  const now=new Date();
  const day=now.getDay(); // 0=Sun,1=Mon,...6=Sat
  const diffToMon=day===0?-6:1-day; // days to subtract to get Monday
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const prevMon=new Date(mon);prevMon.setDate(mon.getDate()-7);
  const prevSun=new Date(mon);prevSun.setDate(mon.getDate()-1);
  const fmt=d=>d.toISOString().slice(0,10);
  const label=d=>{const j=d.getDate();const m=d.toLocaleString('fr-CA',{month:'short'});return j+' '+m;};
  return {
    current:{label:label(mon)+' → '+label(sun),from:fmt(mon),to:fmt(sun)},
    prev:{label:label(prevMon)+' → '+label(prevSun),from:fmt(prevMon),to:fmt(prevSun)},
    payday:'Jeudi'
  };
}

// ── AUTO-CALCULATE GAINS FROM POINTAGE + KM ──
function getAutoGains(user){
  const ptgHist=JSON.parse(localStorage.getItem('volo-ptg-history')||'[]');
  const kmLogs=getKmLogs();
  const role=user.type||'SAUVETEUR';
  const b=BAREMES[role]||BAREMES.SAUVETEUR;
  const myArrivals=ptgHist.filter(e=>e.sauveteur_id===user.id&&e.mode==='ARRIVÉE');
  const myDeparts=ptgHist.filter(e=>e.sauveteur_id===user.id&&e.mode==='DÉPART');
  const dateMap={};
  myArrivals.forEach(a=>{
    const date=a.timestamp?a.timestamp.slice(0,10):'';
    if(!date)return;
    if(!dateMap[date]) dateMap[date]={type:a.mission_type||'STANDARD',lieu:a.lieu||'',region:a.region||''};
  });
  myDeparts.forEach(d=>{
    const date=d.timestamp?d.timestamp.slice(0,10):'';
    if(date&&dateMap[date]) dateMap[date].heures=d.heures||'';
  });
  // km_logs = véhicule personnel (remboursé) — 1 entrée max par jour (anti-fraude)
  const myKm={};
  kmLogs.filter(l=>l.sauveteur_id===user.id||l.sauveteur_volo===user.volo||l.sauveteur===user.name).forEach(l=>{
    const date=l.timestamp?l.timestamp.slice(0,10):'';
    if(!date)return;
    // Prend le MAX au lieu d'additionner — empêche accumulation frauduleuse
    myKm[date]=Math.max(myKm[date]||0, l.km_total||0);
  });
  const entries=[];
  Object.keys(dateMap).sort().reverse().forEach(date=>{
    const d=dateMap[date];
    const type=d.type||'STANDARD';
    const km=(myKm[date]||0);
    const kmMontant=km*b.km_rate;
    let perdiemJour=0,urgMontant=0;
    if(type==='STANDARD') perdiemJour=b.perdiem_standard;
    else if(type==='LOCAL') perdiemJour=0;
    else if(type==='URGENCE'){perdiemJour=b.perdiem_standard+b.urgence_perdiem;}
    const perdiem=perdiemJour;
    const total=kmMontant+perdiem+urgMontant;
    entries.push({date,type,lieu:d.lieu,region:d.region,heures:d.heures||'',km,kmMontant,perdiem,perdiemJour,urgMontant,total});
  });
  return entries;
}

function renderGainsHistory(user,role){
  const entries=getAutoGains(user);
  const periods=getPayPeriods();
  const b=BAREMES[role]||BAREMES.SAUVETEUR;
  let filtered=entries;
  if(gainsHistPeriod==='current') filtered=entries.filter(e=>e.date>=periods.current.from&&e.date<=periods.current.to);
  else if(gainsHistPeriod==='prev') filtered=entries.filter(e=>e.date>=periods.prev.from&&e.date<=periods.prev.to);
  const total=filtered.reduce((s,e)=>s+e.total,0);
  return `
    <div style="padding-top:10px">
      <h2 style="text-align:center;margin:0;font-size:20px">📜 DÉTAILS PAR JOUR</h2>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:14px">${user.name} • ${role}</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        ${['current','prev','all'].map(p=>`<button class="btn ${gainsHistPeriod===p?'btn-gold':'btn-outline'}" onclick="gainsHistPeriod='${p}';render()" style="flex:1;font-size:11px;padding:10px">${p==='current'?'Cette sem.':p==='prev'?'Sem. dernière':'Historique'}</button>`).join('')}
      </div>
      <div style="padding:14px;background:linear-gradient(135deg,rgba(212,160,23,.12),rgba(230,81,0,.06));border:2px solid rgba(212,160,23,.3);border-radius:16px;text-align:center;margin-bottom:14px">
        <div style="font-size:11px;color:var(--muted);letter-spacing:1px">${filtered.length} JOUR${filtered.length!==1?'S':''}</div>
        <div style="font-family:Oswald,sans-serif;font-size:36px;font-weight:800;color:var(--gold)">${total.toFixed(2)}$</div>
      </div>
      ${filtered.length>0?filtered.map(e=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px">
          <div>
            <div style="font-size:13px;font-weight:600">${{STANDARD:'📋',LOCAL:'🏢',URGENCE:'🚨',NEGOCIATION:'🤝'}[e.type]||'📋'} ${e.type}</div>
            <div style="font-size:10px;color:var(--muted)">${e.date} • ${e.lieu}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${e.heures?'⏱ '+e.heures+' travaillées':''}${e.km>0?' • 🚗 '+e.km+'km perso':''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:Oswald,sans-serif;font-size:18px;font-weight:700;color:var(--gold)">${e.total.toFixed(2)}$</div>
            <div style="font-size:9px;color:var(--muted)">${e.perdiem>0?e.perdiem+'$ pd':''}${e.kmMontant>0?' + '+e.kmMontant.toFixed(0)+'$ km':''}</div>
          </div>
        </div>`).join(''):'<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">Aucun pointage pour cette période.</div>'}
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-outline" onclick="exportAutoGainsCSV()" style="flex:1;font-size:12px;padding:12px">📁 EXPORT CSV</button>
        <button class="btn btn-gold" onclick="gainsView='overview';render()" style="flex:1;font-size:12px;padding:12px">◀ RÉSUMÉ</button>
      </div>
    </div>`;
}

function exportAutoGainsCSV(){
  const user=getGainsUser();
  if(!user)return;
  const entries=getAutoGains(user);
  const periods=getPayPeriods();
  let filtered=entries;
  if(gainsHistPeriod==='current') filtered=entries.filter(e=>e.date>=periods.current.from&&e.date<=periods.current.to);
  else if(gainsHistPeriod==='prev') filtered=entries.filter(e=>e.date>=periods.prev.from&&e.date<=periods.prev.to);
  let csv='GAINS AUTO — '+user.name+'\nPériode:,'+gainsHistPeriod+'\n\n';
  csv+='Date,Type,Lieu,Heures,KM_AR,KM$,Per_Diem$,Urgence$,Total$\n';
  let grand=0;
  filtered.forEach(e=>{
    grand+=e.total;
    csv+='"'+[e.date,e.type,e.lieu,e.heures,e.km,e.kmMontant.toFixed(2),e.perdiem.toFixed(2),e.urgMontant.toFixed(2),e.total.toFixed(2)].join('","')+'"\n';
  });
  csv+='\nTOTAL:,,,,,,,,'+grand.toFixed(2)+'\n';
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='VOLO-Gains-'+user.name.replace(/\s/g,'_')+'-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
  showToast('📁 CSV exporté','ok');
}

// Offline queue auto-retry
function flushQueue(){
  let q;try{q=JSON.parse(localStorage.getItem('volo_queue')||'[]')}catch(e){return}
  if(!q.length)return;
  showToast('🔄 Envoi de '+q.length+' transaction(s) en attente...','ok');
  const send=async()=>{
    const remaining=[];
    for(const p of q){
      try{
        const r=await fetch('https://hook.us2.make.com/wm4fvbqy87nfcuf111azq02l3w2a87sh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
        if(!r.ok)remaining.push(p);
      }catch(e){remaining.push(p)}
    }
    localStorage.setItem('volo_queue',JSON.stringify(remaining));
    if(remaining.length===0)showToast('✅ Toutes les transactions envoyées','ok');
    else showToast('⚠️ '+remaining.length+' transaction(s) en échec','err');
  };
  send();
}
