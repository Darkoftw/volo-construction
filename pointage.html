<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOLO SST — Pointage</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--bg:#0C0608;--card:#1C1012;--card2:#231518;--gold:#D4A017;--gold-l:#E8C547;--rescue:#E65100;--rescueL:#FF6D00;--rescueD:#BF360C;--red:#C0392B;--green:#27AE60;--blue:#3498DB;--orange:#E67E22;--muted:#8B7355;--muted2:#A89880;--txt:#F5F0EB;--crimson:#6B1C2A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.gold-bar{height:4px;background:linear-gradient(90deg,var(--rescueD),var(--rescue),var(--rescueL),var(--rescue),var(--rescueD));background-size:300% 100%;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
.container{max-width:480px;margin:0 auto;padding:12px 16px;min-height:100vh;min-height:100dvh}
.header{text-align:center;padding:12px 0 8px;position:relative}
.header h1{font-family:'Oswald',sans-serif;font-size:1.4em;color:var(--rescue);letter-spacing:3px;font-weight:600;text-shadow:0 0 20px rgba(230,81,0,.15)}
.header .sub{font-size:.7em;color:var(--muted);letter-spacing:2px;margin-top:2px}
.back-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--muted);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:.75em;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.back-btn:hover{border-color:var(--rescue);color:var(--rescue)}

/* Network */
.net-badge{position:fixed;top:8px;right:12px;display:flex;align-items:center;gap:5px;font-size:.65em;font-family:'JetBrains Mono',monospace;z-index:100;padding:4px 10px;background:rgba(28,16,18,.9);border-radius:20px;backdrop-filter:blur(8px)}

/* QR Scanner */
.qr-scan-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px auto 0;padding:12px 24px;background:transparent;border:2px solid var(--rescue);color:var(--rescue);border-radius:12px;font-family:'Oswald',sans-serif;font-size:.95em;letter-spacing:2px;cursor:pointer;transition:all .3s;width:80%;max-width:280px}
.qr-scan-btn:hover,.qr-scan-btn:active{background:var(--rescue);color:#fff;transform:scale(1.02)}
.qr-scan-btn svg{width:22px;height:22px}
.qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px}
.qr-overlay .qr-title{font-family:'Oswald',sans-serif;color:var(--rescue);font-size:1.2em;letter-spacing:2px;margin-bottom:12px}
.qr-overlay .qr-close{position:absolute;top:16px;right:16px;background:none;border:2px solid var(--red);color:var(--red);width:40px;height:40px;border-radius:50%;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qr-overlay .qr-close:hover{background:var(--red);color:#fff}
#qr-reader{width:100%;max-width:350px;border-radius:12px;overflow:hidden;border:2px solid var(--rescue);margin-top:10px}
#qr-reader video{border-radius:12px}
.qr-hint{color:var(--muted);font-size:.8em;margin-top:14px;text-align:center;max-width:300px;line-height:1.5}
.net-dot{width:7px;height:7px;border-radius:50%}
.net-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.net-dot.off{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse-d 1.5s infinite}
@keyframes pulse-d{0%,100%{opacity:1}50%{opacity:.3}}

/* Card */
.card{background:var(--card);border:1px solid rgba(230,81,0,.1);border-radius:14px;padding:20px;margin-bottom:14px;transition:all .3s;backdrop-filter:blur(12px)}
.card-glow{box-shadow:0 0 20px rgba(230,81,0,.1)}

/* Buttons */
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-family:'Oswald',sans-serif;font-size:1.1em;letter-spacing:2px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);font-weight:600}
.btn-gold{background:linear-gradient(135deg,var(--rescue),var(--rescueD));color:#fff;box-shadow:0 4px 16px rgba(230,81,0,.2)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(230,81,0,.35)}
.btn-green{background:linear-gradient(135deg,var(--green),#2ECC71);color:#fff}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(39,174,96,.3)}
.btn-red{background:linear-gradient(135deg,var(--red),#E74C3C);color:#fff}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(192,57,43,.3)}
.btn-outline{background:transparent;border:2px solid var(--muted);color:var(--muted)}
.btn-outline:hover{border-color:var(--rescue);color:var(--rescue)}
.btn-disabled{opacity:.4;pointer-events:none}
.btn:active{transform:translateY(0)!important}

/* PIN */
.pin-row{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:52px;height:60px;border-radius:12px;border:2px solid rgba(230,81,0,.12);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--rescue);font-weight:700;transition:all .25s;background:var(--card)}
.pin-dot.filled{border-color:var(--rescue);box-shadow:0 0 16px rgba(230,81,0,.2)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:0 auto}
.numpad button{padding:16px;border:1px solid rgba(230,81,0,.1);border-radius:12px;background:var(--card);color:var(--txt);font-family:'Oswald',sans-serif;font-size:1.4em;cursor:pointer;transition:all .2s}
.numpad button:hover{background:var(--card2);border-color:var(--rescue)}
.numpad button:active{background:rgba(230,81,0,.15);color:var(--rescue);border-color:var(--rescue)}

/* Clock */
.clock-display{text-align:center;margin:12px 0}
.clock-display .time{font-family:'JetBrains Mono',monospace;font-size:2.5em;color:var(--rescue);text-shadow:0 0 20px rgba(230,81,0,.15)}
.clock-display .date{font-size:.8em;color:var(--muted);margin-top:4px}

/* User badge */
.user-badge{text-align:center;padding:12px;background:rgba(230,81,0,.06);border-radius:12px;border:1px solid rgba(230,81,0,.15);margin:12px 0}
.user-badge .name{font-family:'Oswald',sans-serif;font-size:1.3em;color:var(--rescue);letter-spacing:2px}
.user-badge .role{font-size:.8em;color:var(--muted2);margin-top:2px}
.user-badge .uid{font-family:'JetBrains Mono',monospace;font-size:.75em;color:var(--muted);margin-top:4px}

/* Status badge */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.75em;font-weight:600}
.status-badge.on-site{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.status-badge.off-site{background:rgba(168,152,128,.15);color:var(--muted2);border:1px solid rgba(168,152,128,.2)}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.stat-card{text-align:center;padding:14px 10px;background:var(--card);border-radius:10px;border:1px solid rgba(230,81,0,.1)}
.stat-card .num{font-family:'Oswald',sans-serif;font-size:1.6em;font-weight:600}
.stat-card .lbl{font-size:.65em;color:var(--muted);letter-spacing:1px;margin-top:2px}

/* Lieu list */
.search-box{width:100%;padding:12px 16px;background:var(--card);border:1px solid rgba(230,81,0,.12);border-radius:10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:.9em;outline:none;margin-bottom:10px}
.search-box:focus{border-color:var(--rescue);box-shadow:0 0 0 3px rgba(230,81,0,.08)}
.search-box::placeholder{color:var(--muted)}
.lieu-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;padding-right:4px}
.lieu-item{padding:14px 16px;background:var(--card);border:1px solid rgba(230,81,0,.08);border-radius:10px;cursor:pointer;transition:all .25s;display:flex;justify-content:space-between;align-items:center}
.lieu-item:hover{background:var(--card2);border-color:rgba(230,81,0,.3);transform:translateX(3px)}
.lieu-item.sel{background:rgba(230,81,0,.08);border-color:var(--rescue)}
.lieu-item .ln{font-weight:500}.lieu-item .lr{font-size:.75em;color:var(--muted)}

/* Receipt */
.receipt{background:var(--card);border:2px solid var(--rescue);border-radius:14px;padding:20px;margin:16px 0;box-shadow:0 0 20px rgba(230,81,0,.06)}
.receipt-header{text-align:center;padding-bottom:12px;border-bottom:1px dashed var(--muted);margin-bottom:12px}
.receipt-header .mode{font-family:'Oswald',sans-serif;font-size:1.3em;letter-spacing:3px}
.rrow{display:flex;justify-content:space-between;padding:6px 0;font-size:.9em}
.rrow .rl{color:var(--muted2)}.rrow .rv{color:var(--txt);font-weight:500;text-align:right;max-width:60%}
.receipt-hours{text-align:center;padding:16px 0;margin:12px 0;background:rgba(39,174,96,.1);border-radius:10px}
.receipt-hours .big{font-family:'Oswald',sans-serif;font-size:2em;color:var(--green)}
.receipt-hours .lbl{font-size:.75em;color:var(--muted);letter-spacing:2px}

/* On-site list */
.onsite-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card);border-radius:8px;margin-bottom:4px;font-size:.85em}
.onsite-item .on-name{color:var(--txt)}.onsite-item .on-lieu{color:var(--muted);font-size:.75em}
.onsite-item .on-time{font-family:'JetBrains Mono',monospace;font-size:.8em}

/* History */
.hist-item{padding:10px 12px;background:var(--card);border-radius:8px;margin-bottom:4px;font-size:.85em;display:flex;justify-content:space-between;align-items:center}
.hist-item .h-mode{font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:.85em}
.hist-item .h-info{text-align:right;font-size:.75em;color:var(--muted)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:12px;font-size:.85em;font-weight:600;z-index:1000;transition:transform .4s cubic-bezier(.4,0,.2,1);white-space:nowrap;backdrop-filter:blur(10px)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-ok{background:rgba(39,174,96,.95);color:#fff}
.toast-err{background:rgba(192,57,43,.95);color:#fff}
.toast-warn{background:rgba(230,126,34,.95);color:#fff}
.toast-info{background:rgba(52,152,219,.95);color:#fff}

/* Step label */
.step-label{font-family:'Oswald',sans-serif;font-size:.7em;color:var(--muted);letter-spacing:3px;text-align:center;margin-bottom:6px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--rescue);border-radius:4px}
.hidden{display:none!important}

/* Custom lieu input */
.custom-input{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--rescue);border-radius:10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:.9em;outline:none;margin-top:10px}
</style>
</head>
<body>
<div class="gold-bar"></div>
<div class="net-badge"><div class="net-dot on" id="netDot"></div><span id="netText" style="color:var(--green)">EN LIGNE</span></div>
<div class="toast" id="toast"></div>
<div class="container" id="app"></div>
<audio id="eagleAudio" preload="auto"><source src="eagle.mp3" type="audio/mpeg"></audio>

<script src="data.js"></script>
<script>
// ══════════════════════════════════════════════════
//  VOLO SST — MODULE POINTAGE D'HEURES
//  156 membres | PIN = VOLO sans le V
//  Webhook → Make.com → Google Sheets (onglet Pointage)
// ══════════════════════════════════════════════════

// ── PERSONNEL loaded from data.js ──


// ── LIEUX / CHANTIERS ──
const LIEUX = [
  {id:"L01",nom:"Bureau Sherbrooke",region:"Estrie"},
  {id:"L02",nom:"Dépôt Sherbrooke",region:"Estrie"},
  {id:"L03",nom:"Chantier Magog",region:"Estrie"},
  {id:"L04",nom:"Chantier Orford",region:"Estrie"},
  {id:"L05",nom:"Bureau Québec",region:"Capitale-Nationale"},
  {id:"L06",nom:"Chantier Lévis",region:"Capitale-Nationale"},
  {id:"L07",nom:"Kruger Trois-Rivières",region:"Mauricie"},
  {id:"L08",nom:"Chantier Shawinigan",region:"Mauricie"},
  {id:"L09",nom:"Chantier Rimouski",region:"Bas-St-Laurent"},
  {id:"L10",nom:"Chantier Rivière-du-Loup",region:"Bas-St-Laurent"},
  {id:"L11",nom:"Bureau Montréal",region:"Montréal"},
  {id:"L12",nom:"Chantier Longueuil",region:"Montérégie"},
  {id:"L13",nom:"Chantier Saguenay",region:"Saguenay"},
  {id:"L14",nom:"Chantier Drummondville",region:"Mauricie"},
  {id:"L15",nom:"Chantier Terrebonne",region:"Lanaudière"},
  {id:"L16",nom:"Formation / Entraînement",region:"Formation"},
  {id:"LAUTRE",nom:"⊕ Autre (préciser)",region:"—"},
];

// ── WEBHOOK ──
// ⚠️ CRÉE UN NOUVEAU WEBHOOK DANS MAKE.COM POUR LE POINTAGE
// Puis colle l'URL ici:
const WEBHOOK_POINTAGE = "https://hook.us2.make.com/h9ge1vspi5yexta3u1wi26m2wh7dm8ic";

// ══════════════════════════════════════
//  STATE + STORAGE
// ══════════════════════════════════════
let state = { step:'pin', pin:'', user:null, mode:null, lieu:null, lieuCustom:'', missionType:'STANDARD', ts:null, _h:'', _m:0 };
let clockInt;

// On-site tracking (localStorage persists)
const LS_ONSITE = 'volo-ptg-onsite';
const LS_HIST = 'volo-ptg-history';
const LS_QUEUE = 'volo-ptg-queue';

function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v))}

function getOnSite(){return lsGet(LS_ONSITE,[])}
function setOnSite(d){lsSet(LS_ONSITE,d)}
function getHistory(){return lsGet(LS_HIST,[])}
function addHistory(e){const h=getHistory();h.unshift(e);if(h.length>200)h.length=200;lsSet(LS_HIST,h)}
function getQueue(){return lsGet(LS_QUEUE,[])}
function setQueue(q){lsSet(LS_QUEUE,q)}

// ══════════════════════════════════════
//  NETWORK
// ══════════════════════════════════════
function updateNet(){
  const on=navigator.onLine;
  document.getElementById('netDot').className='net-dot '+(on?'on':'off');
  document.getElementById('netText').textContent=on?'EN LIGNE':'HORS-LIGNE';
  document.getElementById('netText').style.color=on?'var(--green)':'var(--red)';
  if(on)flushQueue();
}
window.addEventListener('online',updateNet);
window.addEventListener('offline',updateNet);

async function flushQueue(){
  const q=getQueue();if(!q.length)return;
  toast(`🔄 Envoi de ${q.length} pointage(s)...`,'info');
  const fail=[];
  for(const e of q){
    try{const r=await fetch(WEBHOOK_POINTAGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});if(!r.ok)fail.push(e);}
    catch{fail.push(e);}
  }
  setQueue(fail);
  if(!fail.length)toast('✅ Tous les pointages envoyés','ok');
}

// ══════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast toast-'+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}
function fmtTime(d){return d.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
function fmtDate(d){return d.toLocaleDateString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function fmtTS(d){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function calcH(iso){
  const diff=Date.now()-new Date(iso).getTime();
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  return{h,m,display:`${h}h${String(m).padStart(2,'0')}`,totalMin:h*60+m};
}
function startClock(){
  clearInterval(clockInt);
  clockInt=setInterval(()=>{const el=document.getElementById('liveClock');if(el)el.textContent=fmtTime(new Date());},1000);
}
function vibrate(ms=30){try{navigator.vibrate(ms)}catch{}}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  switch(state.step){
    case 'pin':return rPIN(app);
    case 'accueil':return rAccueil(app);
    case 'lieu':return rLieu(app);
    case 'custom':return rCustom(app);
    case 'mission':return rMission(app);
    case 'confirm':return rConfirm(app);
    case 'receipt':return rReceipt(app);
    case 'onsite':return rOnSite(app);
    case 'history':return rHistory(app);
  }
}

// ── PIN ──
function rPIN(app){
  const dots=Array.from({length:4},(_,i)=>`<div class="pin-dot ${state.pin.length>i?'filled':''}">${state.pin[i]?'●':''}</div>`).join('');
  const nums=['1','2','3','4','5','6','7','8','9','⌫','0','✕'].map(d=>{
    if(d==='⌫')return `<button onclick="pinKey('back')">⌫</button>`;
    if(d==='✕')return `<button onclick="pinKey('clear')" style="color:var(--red)">✕</button>`;
    return `<button onclick="pinKey('${d}')">${d}</button>`;
  }).join('');

  // Check if PIN matches
  let identified='';
  if(state.pin.length===4){
    const u=PERSONNEL.find(p=>p.volo==='V'+state.pin);
    if(u)identified=`<div class="user-badge" style="margin-top:14px"><div class="name">${u.name}</div><div class="role">${u.role} — ${u.region}</div><div class="uid">${u.id} | ${u.volo}</div></div>`;
    else identified=`<div style="text-align:center;margin-top:14px;color:var(--red);font-weight:600">✗ Code ${state.pin} non reconnu</div>`;

function pinKey(k){
  vibrate();
  if(qrScanner)closeQRScanner();
  if(k==='clear'){state.pin='';render();return;}
  if(k==='back'){state.pin=state.pin.slice(0,-1);render();return;}
  if(state.pin.length>=4)return;
  state.pin+=k;render();
}

function doLogin(){
  const u=PERSONNEL.find(p=>p.volo==='V'+state.pin);
  if(!u)return;
  state.user=u;state.step='accueil';render();
}

function logout(){
  state={step:'pin',pin:'',user:null,mode:null,lieu:null,lieuCustom:'',missionType:'STANDARD',ts:null,_h:'',_m:0};
  render();
}

function startMode(mode){
  state.mode=mode;
  if(mode==='DÉPART'){
    const me=getOnSite().find(e=>e.id===state.user.id);
    if(me)state.lieu={id:'auto',nom:me.lieu,region:me.region||''};
    state.step='confirm';
  }else{
    state.lieu=null;state.lieuCustom='';state.missionType='STANDARD';
    state.step='lieu';
  }
  render();
}

// ── LIEU SELECTION ──
function rLieu(app){
  const items=LIEUX.map(l=>`
    <div class="lieu-item ${state.lieu&&state.lieu.id===l.id?'sel':''}" onclick="pickLieu('${l.id}')">
      <div><div class="ln">${l.nom}</div><div class="lr">${l.region}</div></div>
      ${state.lieu&&state.lieu.id===l.id?'<span style="color:var(--gold)">✓</span>':''}
    </div>`).join('');

  app.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="state.step='accueil';render()">← RETOUR</button>
      <h1>📍 LIEU</h1><div class="sub">OÙ TRAVAILLEZ-VOUS?</div>
    </div>
    <input class="search-box" id="lieuQ" placeholder="🔍 Rechercher un lieu..." oninput="filterLieux()">
    <div class="lieu-list" id="lieuList">${items}</div>
    <button class="btn btn-gold ${!state.lieu?'btn-disabled':''}" onclick="if(state.lieu){if(state.lieu.id==='LAUTRE'){state.step='custom';}else{state.step='mission';}render();}" style="margin-top:14px">CONTINUER →</button>
  `;
}

function filterLieux(){
  const q=document.getElementById('lieuQ').value.toLowerCase();
  document.querySelectorAll('.lieu-item').forEach(el=>{
    const t=(el.querySelector('.ln').textContent+' '+el.querySelector('.lr').textContent).toLowerCase();
    el.style.display=t.includes(q)?'flex':'none';
  });
}

function pickLieu(id){
  state.lieu=LIEUX.find(l=>l.id===id);vibrate();render();
}

// ── CUSTOM LIEU ──
function rCustom(app){
  app.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="state.step='lieu';render()">← RETOUR</button>
      <h1>📍 LIEU PERSONNALISÉ</h1><div class="sub">PRÉCISEZ LE LIEU</div>
    </div>
    <div class="card">
      <div class="step-label">NOM DU CHANTIER / LIEU</div>
      <input class="custom-input" id="customLieu" placeholder="Ex: Chantier Hydro-Québec Lac-Mégantic" value="${state.lieuCustom}" autofocus>
    </div>
    <button class="btn btn-gold btn-disabled" id="btnCustomGo" onclick="submitCustomLieu()">CONTINUER →</button>
  `;
  const inp=document.getElementById('customLieu');
  const btn=document.getElementById('btnCustomGo');
  // Update state + button on every keystroke without re-rendering
  inp.addEventListener('input',function(){
    state.lieuCustom=this.value;
    if(this.value.trim()){btn.classList.remove('btn-disabled');}
    else{btn.classList.add('btn-disabled');}
  });
  // Enable button if already has value
  if(state.lieuCustom.trim()) btn.classList.remove('btn-disabled');
  // Focus after render
  setTimeout(()=>inp.focus(),50);
}

function submitCustomLieu(){
  if(!state.lieuCustom.trim())return;
  state.lieu={id:'CUSTOM',nom:state.lieuCustom.trim(),region:'Autre'};
  state.step='mission';
  render();
}

// ── TYPE MISSION ──
function getMissionTypes(){
  const surv=state.user&&state.user.type==='SURVEILLANT';
  const types=[
    {id:'STANDARD', label:'STANDARD', desc:'Mission régulière hors local', icon:'📋', perdiem:surv?'150$/j':'200$/j (sauv.) · 150$/j (surv.)'},
    {id:'LOCAL', label:'LOCAL', desc:'Travail au bureau / local', icon:'🏢', perdiem:'0$/j (pas de per diem)'},
  ];
  if(!surv) types.push({id:'URGENCE', label:'URGENCE', desc:'Intervention urgente / rappel', icon:'🚨', perdiem:'285$/j + 64$/h transport'});
  return types;
}

function rMission(app){
  const items = getMissionTypes().map(m=>`
    <div class="lieu-item ${state.missionType===m.id?'sel':''}" onclick="state.missionType='${m.id}';vibrate();render()" style="cursor:pointer">
      <div>
        <div class="ln">${m.icon} ${m.label}</div>
        <div class="lr">${m.desc}</div>
        <div style="font-size:.65em;color:var(--gold);margin-top:2px">${m.perdiem}</div>
      </div>
      ${state.missionType===m.id?'<span style="color:var(--gold);font-size:1.2em">✓</span>':''}
    </div>`).join('');

  app.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="state.step='lieu';render()">← RETOUR</button>
      <h1>💰 TYPE MISSION</h1><div class="sub">QUEL TYPE DE JOURNÉE?</div>
    </div>
    <div class="lieu-list">${items}</div>
    <button class="btn btn-gold" onclick="state.step='confirm';render()" style="margin-top:14px">CONTINUER →</button>
  `;
}

// ── CONFIRM ──
function rConfirm(app){
  const now=new Date();
  const isDep=state.mode==='DÉPART';
  const me=getOnSite().find(e=>e.id===state.user.id);
  let hBlock='';
  if(isDep&&me){const c=calcH(me.arrival);hBlock=`<div class="receipt-hours"><div class="lbl">HEURES TRAVAILLÉES</div><div class="big">${c.display}</div></div>`;}

  app.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="state.step=${isDep?"'accueil'":"'mission'"};render()">← RETOUR</button>
      <h1>✓ CONFIRMER</h1><div class="sub">${state.mode}</div>
    </div>
    <div class="receipt">
      <div class="receipt-header"><div class="mode" style="color:${isDep?'var(--red)':'var(--green)'}">${isDep?'🔴':'🟢'} ${state.mode}</div></div>
      <div class="rrow"><span class="rl">Nom</span><span class="rv">${state.user.name}</span></div>
      <div class="rrow"><span class="rl">ID</span><span class="rv" style="font-family:'JetBrains Mono',monospace;font-size:.85em">${state.user.id}</span></div>
      <div class="rrow"><span class="rl">Lieu</span><span class="rv">${state.lieu?state.lieu.nom:'—'}</span></div>
      ${!isDep?`<div class="rrow"><span class="rl">Type</span><span class="rv" style="color:var(--gold);font-weight:600">${state.missionType}</span></div>`:''}
      <div class="rrow"><span class="rl">Date/Heure</span><span class="rv">${fmtTS(now)}</span></div>
      ${hBlock}
    </div>
    <button class="btn ${isDep?'btn-red':'btn-green'}" onclick="doPointage()">${isDep?'🔴 CONFIRMER DÉPART':'🟢 CONFIRMER ARRIVÉE'}</button>
    <button class="btn btn-outline" onclick="state.step='accueil';render()" style="margin-top:10px">ANNULER</button>
  `;
}

// ── EXECUTE POINTAGE ──
async function doPointage(){
  const now=new Date();
  const ts=fmtTS(now);
  const isDep=state.mode==='DÉPART';
  let hDisp='',hMin=0;

  let onSite=getOnSite();
  if(isDep){
    const me=onSite.find(e=>e.id===state.user.id);
    if(me){const c=calcH(me.arrival);hDisp=c.display;hMin=c.totalMin;}
    onSite=onSite.filter(e=>e.id!==state.user.id);
  }else{
    onSite=onSite.filter(e=>e.id!==state.user.id);
    onSite.push({id:state.user.id,nom:state.user.name,role:state.user.role,lieu:state.lieu.nom,region:state.lieu.region,missionType:state.missionType,arrival:now.toISOString()});
  }
  setOnSite(onSite);

  const payload={
    type:'POINTAGE',
    mode:state.mode,
    sauveteur_id:state.user.id,
    sauveteur_nom:state.user.name,
    sauveteur_volo:state.user.volo,
    role:state.user.role,
    lieu:state.lieu?state.lieu.nom:'',
    region:state.lieu?state.lieu.region:'',
    mission_type:state.mode==='ARRIVÉE'?state.missionType:'',
    heures:hDisp,
    heures_minutes:hMin,
    timestamp:ts
  };

  addHistory(payload);

  if(navigator.onLine){
    try{
      const r=await fetch(WEBHOOK_POINTAGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(r.ok){toast(isDep?`🔴 Départ — ${hDisp}`:'🟢 Arrivée enregistrée','ok');}
      else{toast('⚠️ Erreur serveur — sauvé local','err');const q=getQueue();q.push(payload);setQueue(q);}
    }catch{toast('⚠️ Erreur réseau — sauvé local','err');const q=getQueue();q.push(payload);setQueue(q);}
  }else{
    toast('📴 Hors-ligne — sauvé local','warn');
    const q=getQueue();q.push(payload);setQueue(q);
  }

  try{document.getElementById('eagleAudio').currentTime=0;document.getElementById('eagleAudio').play();}catch{}
  vibrate(100);

  state.ts=ts;state._h=hDisp;state._m=hMin;
  state.step='receipt';render();
}

// ── RECEIPT ──
function rReceipt(app){
  const isDep=state.mode==='DÉPART';
  app.innerHTML=`
    <div class="header"><h1>${isDep?'🔴':'🟢'} ${state.mode}</h1><div class="sub">POINTAGE ENREGISTRÉ</div></div>
    <div class="receipt card-glow">
      <div class="receipt-header"><div class="mode" style="color:${isDep?'var(--red)':'var(--green)'}">✓ ${state.mode} CONFIRMÉ${isDep?'':'E'}</div></div>
      <div class="rrow"><span class="rl">Nom</span><span class="rv">${state.user.name}</span></div>
      <div class="rrow"><span class="rl">ID</span><span class="rv" style="font-family:'JetBrains Mono',monospace">${state.user.id}</span></div>
      <div class="rrow"><span class="rl">Lieu</span><span class="rv">${state.lieu?state.lieu.nom:'—'}</span></div>
      <div class="rrow"><span class="rl">Heure</span><span class="rv">${state.ts}</span></div>
      ${!isDep?`<div class="rrow"><span class="rl">Type</span><span class="rv" style="color:var(--gold);font-weight:600">${state.missionType}</span></div>`:''}
      ${isDep&&state._h?`<div class="receipt-hours"><div class="lbl">HEURES TRAVAILLÉES</div><div class="big">${state._h}</div></div>`:''}
    </div>
    <button class="btn btn-gold" onclick="window.open('index.html','_self')">← RETOUR À L'APP</button>
    <button class="btn btn-outline" onclick="state.step='accueil';state.mode=null;state.lieu=null;render()" style="margin-top:10px">NOUVEAU POINTAGE</button>
  `;
}

// ── QUI EST LÀ ──
function rOnSite(app){
  const onSite=getOnSite();
  const items=onSite.length?onSite.map(e=>{
    const c=calcH(e.arrival);
    const col=c.h>=10?'var(--red)':c.h>=8?'var(--orange)':'var(--green)';
    return `<div class="onsite-item" data-n="${e.nom.toLowerCase()}">
      <div><div class="on-name">${e.nom}</div><div class="on-lieu">📍 ${e.lieu}${e.region?' — '+e.region:''}</div>${e.missionType?`<div style="font-size:.6em;color:var(--gold);margin-top:2px">💰 ${e.missionType}</div>`:''}</div>
      <div style="text-align:right"><div class="on-time" style="color:${col}">${c.display}</div>
      <div style="font-size:.65em;color:var(--muted)">depuis ${new Date(e.arrival).toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit',hour12:false})}</div></div>
    </div>`;
  }).join(''):'<div class="card" style="text-align:center;color:var(--muted)">Personne n\'est pointé actuellement</div>';

  app.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="state.step='accueil';render()">← RETOUR</button>
      <h1>👥 SUR LE TERRAIN</h1><div class="sub">${onSite.length} PERSONNE${onSite.length>1?'S':''}</div>
    </div>
    <input class="search-box" placeholder="🔍 Rechercher..." oninput="document.querySelectorAll('.onsite-item').forEach(e=>e.style.display=e.dataset.n.includes(this.value.toLowerCase())?'flex':'none')">
    <div id="onSiteList">${items}</div>
  `;
}

// ── HISTORIQUE ──
function rHistory(app){
  const hist=getHistory().slice(0,50);
  const items=hist.length?hist.map(e=>{
    const isDep=e.mode==='DÉPART';
    return `<div class="hist-item">
      <div><div class="h-mode" style="color:${isDep?'var(--red)':'var(--green)'}">${isDep?'🔴':'🟢'} ${e.mode}</div>
      <div style="font-size:.75em;color:var(--muted)">${e.sauveteur_nom} — ${e.lieu}</div></div>
      <div class="h-info"><div>${e.timestamp.split(' ')[1]||''}</div><div>${e.timestamp.split(' ')[0]||''}</div>
      ${isDep&&e.heures?`<div style="color:var(--green);font-weight:600">${e.heures}</div>`:''}</div>
    </div>`;
  }).join(''):'<div class="card" style="text-align:center;color:var(--muted)">Aucun historique</div>';

  app.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="state.step='accueil';render()">← RETOUR</button>
      <h1>📜 HISTORIQUE</h1><div class="sub">DERNIERS POINTAGES</div>
    </div>
    ${items}
    ${hist.length?`<button class="btn btn-outline" onclick="if(confirm('Effacer tout l\\'historique local?')){localStorage.removeItem('${LS_HIST}');render();}" style="margin-top:14px;font-size:.8em">🗑 EFFACER L'HISTORIQUE</button>`:''}
  `;
}

// ── QR SCANNER ──
let qrScanner=null;

function openQRScanner(){
  vibrate();
  const overlay=document.createElement('div');
  overlay.className='qr-overlay';
  overlay.id='qr-overlay';
  overlay.innerHTML=`
    <button class="qr-close" onclick="closeQRScanner()" style="position:fixed;top:16px;right:16px;z-index:1001;background:var(--red);border:none;color:#fff;width:50px;height:50px;border-radius:50%;font-size:1.5em;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(192,57,43,.5)">✕</button>
    <div class="qr-title">📷 SCANNER VOTRE BADGE</div>
    <div id="qr-reader"></div>
    <div class="qr-hint">Placez le QR code de votre badge devant la caméra.<br>La connexion sera automatique.</div>
  `;
  document.body.appendChild(overlay);

  qrScanner=new Html5Qrcode("qr-reader");
  qrScanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:{width:250,height:250},aspectRatio:1},
    (decodedText)=>{onQRSuccess(decodedText);},
    ()=>{}
  ).catch(err=>{
    // No camera / permission denied → close overlay after 1.5s
    closeQRScanner();
    toast('📷 Caméra non disponible — utilisez le PIN','warn');
  });
}

function closeQRScanner(){
  const ov=document.getElementById('qr-overlay');
  if(ov)ov.remove();
  if(qrScanner){
    try{qrScanner.stop().then(()=>{try{qrScanner.clear();}catch(e){}qrScanner=null;}).catch(()=>{qrScanner=null;});}
    catch(e){qrScanner=null;}
  }
}

function onQRSuccess(data){
  // Format: VOLO|SAUV-JM-205|0205
  const parts=data.split('|');
  if(parts.length>=3&&parts[0]==='VOLO'){
    const pin=parts[2];
    const user=PERSONNEL.find(p=>p.volo==='V'+pin);
    if(user){
      closeQRScanner();
      vibrate();
      state.pin=pin;
      state.user=user;
      state.step='accueil';
      toast('✅ Badge scanné — '+user.name,'green');
      render();
      return;
    }
  }
  // QR invalide
  toast('❌ Badge non reconnu','red');
}

// ── AUTO-LOCK (2 min inactivité) ──
let lockTimer;
function resetLock(){
  clearTimeout(lockTimer);
  if(state.step!=='pin'){
    lockTimer=setTimeout(()=>{toast('🔒 Session expirée','warn');logout();},120000);
  }
}
['click','touchstart','keydown'].forEach(e=>document.addEventListener(e,resetLock));

// ── INIT ──
updateNet();
// Auto-login: URL param first, then localStorage fallback
const urlPin = new URLSearchParams(window.location.search).get('pin');
const savedPin = urlPin || localStorage.getItem('volo_pin');
if(savedPin && savedPin.length === 4){
  const u = PERSONNEL.find(p => p.volo === 'V' + savedPin);
  if(u){ state.pin = savedPin; state.user = u; state.step = 'accueil'; }
}
render();
</script>
