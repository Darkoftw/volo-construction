<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="view-transition" content="same-origin">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VOLO SST — QR Inventaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="error-monitor.js?v=20"></script>
<script src="data.js?v=20"></script>
<script src="volo-icons.js?v=20"></script>
<script src="king-logo.js"></script>
<style>
/* ── DESIGN SYSTEM: TACTICAL EAGLE ── */
:root{
  --bg:#04040A;
  --card:rgba(18,18,26,.90);
  --card2:rgba(26,26,36,.94);
  --cardSolid:#12121A;
  --gold:#C9A84C; --goldL:#E8C84A; --goldD:#9A8230;
  --rescue:#D4650E; --rescueL:#E8811E; --rescueD:#B54D08; --rescueGlow:rgba(212,101,14,.15);
  --red:#C0392B; --green:#27AE60; --orange:#E67E22;
  --txt:#EBE6DF; --muted:#C9BAA9;
  --border:rgba(201,168,76,.15);
  --blue:#3B82F6;
  --glow:0 0 30px rgba(201,168,76,.08);
  --radius:14px; --radius-sm:10px; --radius-lg:18px;
}
body.light{
  --bg:#F8FAFC; --card:rgba(255,255,255,.96); --card2:rgba(241,245,249,.98); --cardSolid:#fff;
  --gold:#9A8230; --goldL:#B8A040;
  --rescue:#D4650E; --rescueL:#E8811E; --rescueD:#B54D08; --rescueGlow:rgba(212,101,14,.09);
  --txt:#0F172A; --muted:#64748B; --border:rgba(203,213,225,.9);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{overflow-x:hidden;}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .2s;
}
@view-transition{navigation:auto}
::view-transition-old(root){animation:vt-fade-out .2s ease-out}
::view-transition-new(root){animation:vt-fade-in .3s ease-in}
@keyframes vt-fade-out{from{opacity:1}to{opacity:0}}
@keyframes vt-fade-in{from{opacity:0}to{opacity:1}}

/* ── GOLD BAR ── */
.gold-bar{
  height:3px;
  background:linear-gradient(90deg,transparent 0%,var(--goldD) 20%,var(--gold) 50%,var(--goldD) 80%,transparent 100%);
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  position:relative;z-index:200;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── HEADER ── */
.header{
  background:rgba(4,4,10,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
  padding:0 20px;
  transition:background .3s,border-color .3s;
}
body.light .header{background:rgba(248,250,252,.97);box-shadow:0 1px 0 var(--border);}
.header-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
  height:56px;
}
.logo-img{
  width:36px;height:36px;
  max-width:60px;max-height:60px;
  border-radius:50%;
  border:1.5px solid rgba(201,168,76,.35);
  object-fit:cover;
  flex-shrink:0;
  margin-right:8px;
  filter:drop-shadow(0 0 6px rgba(201,168,76,.3));
}
.logo-fallback{
  width:36px;height:36px;
  max-width:60px;max-height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  margin-right:8px;
  border:1.5px solid rgba(201,168,76,.35);
  box-shadow:0 0 10px rgba(201,168,76,.2);
}
.header-titles{flex:1;min-width:0;}
.header-title{
  font-family:'Oswald',sans-serif;
  font-size:15px;font-weight:600;
  letter-spacing:1px;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-sub{
  font-size:10px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.5px;margin-top:1px;
}
.header-actions{
  display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;
}

/* ── BUTTONS ── */
.btn{
  height:34px;padding:0 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.4px;
  cursor:pointer;
  transition:all .15s ease;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
  position:relative;z-index:1;
}
.btn:hover{background:var(--card2);color:var(--txt);border-color:rgba(201,168,76,.35);}
.btn:active{transform:scale(.97);}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  border-color:var(--gold);color:#04040A;
  box-shadow:0 2px 10px rgba(201,168,76,.25);
}
.btn-primary:hover{background:linear-gradient(135deg,var(--goldL),var(--gold));color:#04040A;}
.btn-ghost-gold{border-color:rgba(212,160,23,.35);color:var(--gold);}
.btn-ghost-gold:hover{background:rgba(212,160,23,.08);border-color:var(--gold);}
.btn-ghost-rescue{border-color:rgba(201,168,76,.35);color:var(--gold);}
.btn-ghost-rescue:hover{background:rgba(201,168,76,.1);border-color:var(--gold);color:var(--goldL);}
.btn-icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.btn-round{
  width:36px;height:36px;padding:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  border:none;color:#04040A;cursor:pointer;
  transition:all .15s;
  box-shadow:0 2px 10px rgba(201,168,76,.3);
}
.btn-round:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(201,168,76,.4);}
body.light .btn{background:rgba(255,255,255,.9);color:#64748B;border-color:var(--border);}
body.light .btn:hover{background:#F1F5F9;color:#0F172A;}
body.light .btn-primary{background:linear-gradient(135deg,var(--gold),var(--goldD));color:#04040A;border-color:var(--gold);}

/* ── SEARCH BAR ── */
.search-bar{
  padding:12px 20px;
  background:rgba(4,4,10,.6);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
  transition:background .3s;
}
body.light .search-bar{background:rgba(241,245,249,.98);}
.search-inner{max-width:1200px;margin:0 auto;}
.search-input-wrap{position:relative;}
.search-input-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;
}
.search-input{
  width:100%;height:40px;padding:0 38px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--txt);
  font-family:'Inter',sans-serif;font-size:13px;
  outline:none;transition:border-color .15s,background .3s;
}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--muted);}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:16px;padding:4px;display:none;
}
.search-clear.visible{display:block;}
body.light .search-input{background:#fff;color:#0F172A;}

/* ── TABS ── */
.tabs-wrap{
  padding:0 20px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  transition:background .3s;
}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{
  max-width:1200px;margin:0 auto;
  display:flex;gap:4px;padding:8px 0;white-space:nowrap;
}
.tab{
  padding:5px 14px;
  border-radius:20px;
  border:1px solid transparent;
  background:transparent;
  color:var(--muted);
  font-family:'Oswald',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.8px;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.tab:hover{background:var(--card2);color:var(--txt);}
.tab.active{
  background:rgba(201,168,76,.12);
  border-color:rgba(201,168,76,.4);
  color:var(--goldL);
}
body.light .tab{color:var(--muted);}
body.light .tab:hover{background:var(--card2);color:var(--txt);}

/* ── MAIN ── */
.main{max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1;overflow-x:hidden;}

/* ── QR SIZE SELECTOR ── */
.qr-size-bar,.print-format-bar{
  padding:8px 20px;
  background:rgba(4,4,10,.6);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
  transition:background .3s;
}
body.light .qr-size-bar,body.light .print-format-bar{background:rgba(241,245,249,.98);}
.qr-size-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:8px;}
.qr-size-label{
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1.5px;color:var(--muted);margin-right:4px;
}
.qr-size-btn{
  padding:8px 16px;
  border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'Oswald',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:.8px;
  cursor:pointer;transition:all .15s;
  min-height:40px;
  display:flex;align-items:center;justify-content:center;
}
.qr-size-btn:hover{background:var(--card2);color:var(--txt);border-color:rgba(201,168,76,.35);}
.qr-size-btn.active{
  background:rgba(201,168,76,.12);
  border-color:rgba(201,168,76,.5);
  color:var(--goldL);
}
body.light .qr-size-btn{color:var(--muted);background:rgba(255,255,255,.9);}
body.light .qr-size-btn.active{background:rgba(201,168,76,.1);color:var(--gold);}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-label{
  font-family:'Oswald',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:2.5px;
  color:var(--muted);text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.section-label::before,.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--gold),transparent);
}
.section-label::before{max-width:30px;}
.section-label::after{max-width:60px;background:linear-gradient(90deg,transparent,var(--gold),transparent);flex:none;width:30px;}
.count-pill{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--goldL);
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);
  border-radius:20px;padding:2px 10px;
}

/* ── CAISSE GRID ── */
.caisse-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));
  gap:14px;margin-bottom:24px;
  max-width:100%;overflow:hidden;
}

/* ── CAISSE CARD ── */
.caisse-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;cursor:pointer;
  transition:all .15s ease;position:relative;overflow:hidden;
  min-width:0;max-width:100%;word-break:break-word;
}
.caisse-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--goldD),var(--gold));
  transform:scaleX(0);transform-origin:left;transition:transform .2s ease;
}
.caisse-card:hover{
  background:var(--card2);border-color:rgba(201,168,76,.35);
  transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,.1);
}
.caisse-card:hover::before{transform:scaleX(1);}
.caisse-card.selected{border-color:var(--gold);background:rgba(201,168,76,.06);}
.caisse-card.selected::before{transform:scaleX(1);}
body.light .caisse-card{box-shadow:0 1px 4px rgba(0,0,0,.06);}

.cc-top{display:flex;flex-direction:column;align-items:center;margin-bottom:12px;gap:10px;}
.cc-id{
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  color:var(--muted);letter-spacing:.5px;text-align:center;
}
.cc-qr-wrap{
  width:calc(var(--qr-size,150px) + 40px);height:calc(var(--qr-size,150px) + 40px);
  border-radius:8px;background:#fff;cursor:pointer;
  box-shadow:0 0 0 2px rgba(212,160,23,.3);
  display:flex;align-items:center;justify-content:center;padding:20px;
  flex-shrink:0;overflow:hidden;
}
.cc-qr-wrap canvas,.cc-qr-wrap img{
  width:100%!important;height:100%!important;
  max-width:none!important;max-height:none!important;
  display:block;object-fit:contain;
}

.cc-name{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:.5px;
  color:var(--txt);margin-bottom:6px;line-height:1.25;text-align:center;
}
.cc-icons{font-size:14px;margin-bottom:6px;letter-spacing:2px;text-align:center;}
.cc-preview{font-size:13px;color:var(--muted);line-height:1.6;}
.cc-preview span{
  display:inline-block;
  background:rgba(201,168,76,.45);border-radius:4px;
  padding:2px 7px;margin:2px 3px 2px 0;font-size:11px;color:var(--txt);
}
body.light .cc-preview span{background:rgba(100,116,139,.1);color:#475569;}
.cc-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:8px;border-top:1px solid var(--border);
}
.cc-count{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--muted);}
.cc-drill{font-size:11px;color:var(--goldL);font-weight:600;display:flex;align-items:center;gap:3px;}

/* ── ITEMS (drill-down) ── */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:14px;max-width:100%;overflow:hidden;}
.item-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .15s;
  min-width:0;max-width:100%;word-break:break-word;overflow:hidden;
}
.item-card:hover{background:var(--card2);border-color:rgba(201,168,76,.3);}
.item-card.selected{border-color:var(--gold);background:rgba(201,168,76,.05);}
body.light .item-card{box-shadow:0 1px 4px rgba(0,0,0,.06);}
.ic-top{display:flex;flex-direction:column;align-items:center;margin-bottom:10px;gap:10px;}
.ic-icon{font-size:22px;align-self:flex-start;}
.ic-qr-wrap{
  width:calc(var(--qr-size,150px) + 40px);height:calc(var(--qr-size,150px) + 40px);
  border-radius:8px;background:#fff;cursor:pointer;
  box-shadow:0 0 0 2px rgba(212,160,23,.3);
  display:flex;align-items:center;justify-content:center;padding:20px;
  flex-shrink:0;overflow:hidden;
}
.ic-qr-wrap canvas,.ic-qr-wrap img{
  width:100%!important;height:100%!important;
  max-width:none!important;max-height:none!important;
  display:block;object-fit:contain;
}

/* ── GLASS EFFECT SÉLECTION ── */
.caisse-card.selected{
  border-color:var(--gold);
  background:rgba(201,168,76,.08);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 0 2px var(--gold),0 8px 32px rgba(201,168,76,.2),inset 0 1px 0 rgba(255,255,255,.08);
}
.item-card.selected{
  border-color:var(--gold);
  background:rgba(201,168,76,.07);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 0 2px var(--gold),0 4px 20px rgba(201,168,76,.15),inset 0 1px 0 rgba(255,255,255,.06);
}
.ic-id{
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  color:var(--muted);letter-spacing:.5px;margin-bottom:4px;text-align:center;
}
.ic-name{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:.3px;
  color:var(--txt);margin-bottom:4px;line-height:1.3;text-align:center;
}
.ic-desc{font-size:13px;color:var(--muted);margin-bottom:6px;text-align:center;}
.ic-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);}
.ic-etat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;font-family:'Oswald',sans-serif;letter-spacing:.5px;}
.ic-etat.bon{color:var(--green);background:rgba(39,174,96,.12);}
.ic-etat.warn{color:var(--orange);background:rgba(230,126,34,.12);}
.ic-etat.bad{color:var(--red);background:rgba(192,57,43,.12);}
body.light .ic-etat.bon{background:rgba(5,150,105,.08);}
body.light .ic-etat.warn{background:rgba(217,119,6,.08);}
body.light .ic-etat.bad{background:rgba(220,38,38,.08);}
.ic-qty{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

/* ── BACK ROW ── */
.back-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;margin-bottom:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;transition:all .15s;
}
.back-row:hover{border-color:rgba(201,168,76,.35);background:var(--card2);}
body.light .back-row{background:#fff;}
.back-row-title{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--txt);}
.back-row-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* ── SELECTION BAR ── */
.sel-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:rgba(18,18,26,.97);
  border-top:1px solid rgba(201,168,76,.3);
  backdrop-filter:blur(20px);
  padding:12px 20px;
  transform:translateY(100%);
  transition:transform .2s ease;
  overflow-x:hidden;
}
.sel-bar.visible{transform:translateY(0);}
body.light .sel-bar{background:rgba(248,250,252,.98);}
.sel-bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.sel-count{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;
  color:var(--goldL);flex:1;
}
.sel-actions{display:flex;gap:8px;}

/* ── ADD MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--card2);
  border:1px solid rgba(201,168,76,.25);
  border-radius:var(--radius-lg);
  padding:24px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(201,168,76,.08);
}
body.light .modal{background:#fff;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-title{
  font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:.8px;
  color:var(--txt);margin-bottom:18px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:11px;font-weight:600;letter-spacing:1px;
  color:var(--muted);font-family:'Oswald',sans-serif;margin-bottom:6px;text-transform:uppercase;
}
.field input,.field select{
  width:100%;height:38px;padding:0 12px;
  background:rgba(4,4,10,.6);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--txt);
  font-family:'Inter',sans-serif;font-size:13px;outline:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--gold);}
body.light .field input,body.light .field select{background:#F8FAFC;color:#0F172A;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}

/* ── LEXIQUE MODAL ── */
.lex-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(4,4,10,.99);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
}
.lex-modal.open{transform:translateX(0);}
body.light .lex-modal{background:rgba(248,250,252,.99);}
.lex-inner{flex:1;overflow-y:auto;padding:0 20px 40px;max-width:900px;margin:0 auto;width:100%;}
.lex-header{
  position:sticky;top:0;z-index:10;
  background:rgba(4,4,10,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  max-width:100%;
}
body.light .lex-header{background:rgba(248,250,252,.97);}
.lex-title{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;
  color:var(--txt);
}
.lex-title span{color:var(--gold);}
.lex-entries{display:grid;gap:8px;margin-top:16px;}
.lex-entry{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 16px;
  display:flex;align-items:flex-start;gap:14px;
  transition:border-color .15s;
}
.lex-entry:hover{border-color:rgba(201,168,76,.3);}
.lex-prefix{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  color:var(--gold);
  background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);
  border-radius:6px;padding:4px 10px;
  white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center;
  letter-spacing:.5px;
}
body.light .lex-prefix{background:rgba(212,160,23,.06);border-color:rgba(212,160,23,.25);}
.lex-info{flex:1;}
.lex-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px;letter-spacing:.3px;}
.lex-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.lex-cat{
  font-size:10px;font-weight:600;letter-spacing:.8px;
  color:var(--goldL);font-family:'Oswald',sans-serif;
  background:rgba(201,168,76,.08);border-radius:4px;padding:2px 7px;
  margin-left:auto;flex-shrink:0;align-self:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid rgba(201,168,76,.3);
  border-radius:var(--radius-sm);
  padding:10px 20px;font-size:13px;font-weight:600;color:var(--txt);
  box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:300;
  opacity:0;transition:all .2s ease;pointer-events:none;
  font-family:'Inter',sans-serif;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body.light .toast{background:#fff;color:#0F172A;box-shadow:0 4px 20px rgba(0,0,0,.12);}

/* ── THEME TOGGLE ── */
.theme-pill{
  position:fixed;bottom:20px;right:20px;z-index:160;
  background:var(--card2);border:1px solid var(--border);
  border-radius:30px;
  display:flex;align-items:center;gap:0;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.theme-pill button{
  padding:8px 14px;background:none;border:none;cursor:pointer;
  font-size:14px;color:var(--muted);transition:all .15s;
}
.theme-pill button.active{background:rgba(201,168,76,.15);color:var(--goldL);}
.theme-pill button:hover:not(.active){color:var(--txt);}

/* ── SCANNER MODAL ── */
.scan-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(4,4,10,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.scan-overlay.open{display:flex;}
.scan-header{
  width:100%;max-width:500px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.scan-title{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;
  letter-spacing:.04em;color:var(--goldL);
}
.scan-close{
  background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);
  color:var(--red);border-radius:var(--radius-sm);
  padding:8px 16px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.scan-close:hover{background:rgba(192,57,43,.25);color:#fff;}
#scan-reader{
  width:100%;max-width:500px;
  border-radius:var(--radius);overflow:hidden;
  border:2px solid var(--border);
  min-height:300px;
}
#scan-reader video{width:100%!important;height:auto!important;border-radius:var(--radius);}
#scan-reader img[alt="Info icon"]{display:none!important;}
#scan-reader #qr-shaded-region{border-color:rgba(201,168,76,.5)!important;}
#scan-reader div[style*="border-width"]{border-color:var(--gold)!important;}
.scan-result{
  width:100%;max-width:500px;margin-top:16px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:none;
}
.scan-result.visible{display:block;}
.scan-result-title{
  font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;
  color:var(--txt);margin-bottom:6px;
}
.scan-result-meta{font-size:13px;color:var(--muted);line-height:1.6;}
.scan-result-meta span{
  display:inline-block;padding:2px 8px;border-radius:6px;
  background:rgba(201,168,76,.12);color:var(--goldL);
  font-weight:600;margin-right:6px;
}
.scan-result-warn{
  color:var(--gold);font-weight:600;font-size:14px;
  text-align:center;margin-top:12px;display:none;
}
.scan-result-warn.visible{display:block;}
.scan-again{
  margin-top:12px;width:100%;max-width:500px;
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  border:none;color:#04040A;border-radius:var(--radius-sm);
  padding:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;display:none;transition:all .15s;
}
.scan-again.visible{display:block;}
.scan-again:hover{filter:brightness(1.1);}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:640px){
  /* Safe area */
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}

  /* Header stacking */
  .header{padding:0 12px;}
  .header-inner{
    flex-wrap:wrap;height:auto;padding:8px 0;gap:8px;
  }
  .header-titles{order:1;flex:1;min-width:0;}
  .header-actions{
    order:2;width:100%;justify-content:flex-start;gap:6px;
    padding-top:4px;flex-wrap:wrap;
  }
  .logo-img,.logo-fallback{width:32px;height:32px;margin-right:4px;}
  .header-title{font-size:13px;}

  /* Touch-friendly buttons & inputs */
  .btn{min-height:48px;padding:0 16px;font-size:12px;}
  .btn-icon{width:48px;height:48px;font-size:16px;}
  .btn-round{width:48px;height:48px;font-size:22px;}
  .search-input{height:48px;font-size:16px;padding:0 42px;}
  .field input,.field select{height:48px;font-size:16px;}
  .tab{padding:8px 14px;min-height:44px;display:flex;align-items:center;font-size:12px;}
  .qr-size-btn{min-height:48px;padding:10px 14px;font-size:12px;}
  .scan-close{padding:12px 20px;font-size:15px;min-height:48px;}
  .scan-again{padding:14px;font-size:15px;min-height:48px;}

  /* Search bar */
  .search-bar{padding:10px 12px;}

  /* Tabs scroll */
  .tabs-wrap{padding:0 12px;}
  .tabs{gap:6px;padding:6px 0;}

  /* QR size bar */
  .qr-size-bar,.print-format-bar{padding:8px 12px;}
  .qr-size-inner{flex-wrap:wrap;gap:6px;}
  .qr-size-label{width:100%;margin-bottom:2px;}

  /* Main content */
  .main{padding:12px;}

  /* Card grids: single column on mobile */
  .caisse-grid{grid-template-columns:1fr!important;gap:12px;}
  .items-grid{grid-template-columns:1fr!important;gap:12px;}

  /* Cards */
  .caisse-card{padding:14px;}
  .item-card{padding:14px;}
  .cc-name,.ic-name{font-size:18px;}

  /* Selection bar */
  .sel-bar{padding:12px 12px calc(12px + env(safe-area-inset-bottom));}
  .sel-bar-inner{flex-wrap:wrap;gap:8px;}
  .sel-count{width:100%;text-align:center;}
  .sel-actions{width:100%;justify-content:center;}
  .sel-actions .btn{flex:1;justify-content:center;min-height:48px;}

  /* Modal */
  .modal-overlay{padding:12px;align-items:flex-end;}
  .modal{max-width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));}

  /* Lexique modal */
  .lex-header{padding:12px 14px;}
  .lex-inner{padding:0 14px 40px;}
  .lex-title{font-size:17px;}
  .lex-entry{padding:10px 12px;gap:10px;flex-wrap:wrap;}
  .lex-prefix{min-width:70px;font-size:11px;}
  .lex-cat{margin-left:0;margin-top:6px;}

  /* Scanner */
  .scan-overlay{padding:12px;}
  #scan-reader{min-height:250px;}

  /* Back row */
  .back-row{padding:12px 14px;}
  .back-row-title{font-size:13px;}

  /* Section header */
  .section-header{flex-wrap:wrap;gap:8px;}

  /* Toast */
  .toast{bottom:100px;max-width:calc(100vw - 32px);font-size:12px;padding:10px 16px;}

  /* Theme pill */
  .theme-pill{bottom:12px;right:12px;}
  .theme-pill button{padding:10px 14px;min-height:44px;}
}

/* ── PRINT ── */
@media print{
  .header,.search-bar,.tabs-wrap,.qr-size-bar,.sel-bar,.modal-overlay,.lex-modal,.theme-pill,.btn,.back-row,.gold-bar,.theme-pill,.section-header,.print-format-bar,.scan-overlay{display:none!important;}
  body{background:#fff!important;color:#000!important;overflow:visible!important;}
  body::before{display:none!important;}
  .main{padding:5px!important;max-width:100%!important;overflow:visible!important;}
  .caisse-grid,.items-grid{
    display:grid!important;
    gap:8px!important;
    max-width:100%!important;
    overflow:visible!important;
  }
  /* Print format classes */
  .print-2col .caisse-grid,.print-2col .items-grid{grid-template-columns:1fr 1fr!important;gap:12px!important;}
  .print-3col .caisse-grid,.print-3col .items-grid{grid-template-columns:1fr 1fr 1fr!important;gap:6px!important;}
  .print-4col .caisse-grid,.print-4col .items-grid{grid-template-columns:1fr 1fr 1fr 1fr!important;gap:4px!important;}
  /* Default to 3 columns */
  .caisse-grid,.items-grid{grid-template-columns:1fr 1fr 1fr!important;}
  .caisse-card,.item-card{
    background:#fff!important;border:1px solid #ccc!important;
    break-inside:avoid!important;
    page-break-inside:avoid!important;
    padding:8px!important;
    overflow:visible!important;
    min-height:0!important;
  }
  .item-card[data-sac-color]{
    border-left:4px solid var(--sac-border)!important;
  }
  .cc-qr-wrap,.ic-qr-wrap{
    background:#fff!important;
    padding:6px!important;
    box-shadow:none!important;
    border:1px solid #ddd!important;
    overflow:visible!important;
    width:auto!important;height:auto!important;
    max-width:80px!important;max-height:80px!important;
  }
  .cc-qr-wrap canvas,.cc-qr-wrap img,
  .ic-qr-wrap canvas,.ic-qr-wrap img{
    width:60px!important;height:60px!important;
    max-width:60px!important;max-height:60px!important;
  }
  /* 2col = bigger QR */
  .print-2col .cc-qr-wrap,.print-2col .ic-qr-wrap{max-width:100px!important;max-height:100px!important;padding:8px!important;}
  .print-2col .cc-qr-wrap canvas,.print-2col .cc-qr-wrap img,
  .print-2col .ic-qr-wrap canvas,.print-2col .ic-qr-wrap img{width:80px!important;height:80px!important;max-width:80px!important;max-height:80px!important;}
  /* 4col = tiny QR */
  .print-4col .cc-qr-wrap,.print-4col .ic-qr-wrap{max-width:50px!important;max-height:50px!important;padding:3px!important;}
  .print-4col .cc-qr-wrap canvas,.print-4col .cc-qr-wrap img,
  .print-4col .ic-qr-wrap canvas,.print-4col .ic-qr-wrap img{width:42px!important;height:42px!important;max-width:42px!important;max-height:42px!important;}
  .print-4col .cc-name,.print-4col .ic-name{font-size:9px!important;}
  .print-4col .cc-id,.print-4col .ic-id{font-size:8px!important;}
  .print-4col .cc-icons,.print-4col .cc-preview,.print-4col .ic-desc,.print-4col .cc-footer,.print-4col .ic-footer{font-size:7px!important;}
  .cc-name,.ic-name{font-size:13px!important;font-weight:700!important;color:#000!important;}
  .cc-id,.ic-id{font-size:9px!important;color:#333!important;}
  .cc-icons,.cc-preview,.ic-desc{font-size:9px!important;}
  .cc-footer,.ic-footer{font-size:8px!important;}
  .ic-top{gap:4px!important;margin-bottom:4px!important;}
  .ic-icon{font-size:14px!important;}
  @page{margin:1cm;size:letter portrait;}
}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:60px 20px;
  color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.5px;
}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4;}
.empty-title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--muted);}
.empty-sub{font-size:12px;}

/* ── SMOOTH TRANSITIONS ── */
.header,.search-bar,.tabs-wrap,.search-input,.modal,.sel-bar,.lex-modal,.lex-entry,
.caisse-card,.item-card,.back-row,.toast,.tab,.btn,.field input,.field select,.cc-preview span{
  transition:background-color .22s ease,border-color .22s ease,color .15s ease,box-shadow .22s ease;
}

  }
  const map = {};

    const cat = it.cat||'Autre';
    if(!map[cat]){
      const realId = caisseIdByName[cat.toUpperCase()] || ('CAT-'+cat.replace(/[^A-Z0-9]/gi,'-').toUpperCase());
      map[cat]={
        id:realId,
        nom:cat, cat:cat,
        icons:getCatIcon(cat)+' '+getCatIcon(cat),
        items:[]
      };
    }
    // Priority: item.couleur → SAC_COLORS by category → null
    const itemHex = it.couleur ? COULEUR_HEX[it.couleur] : null;
    const itemColorName = it.couleur || null;
    const sc = (typeof SAC_COLORS!=='undefined') ? SAC_COLORS[cat] : null;
    map[cat].items.push({
      id:it.id, nom:it.name||it.nom||it.id,
      desc:it.desc||'', fab:it.fab||'',
      qty:1, etat:mapEtat(it.etat||'Bon'),

      sacColor: itemHex || (sc ? sc.hex : null),
      sacColorName: itemColorName || (sc ? sc.name : null)
    });
  });
  return Object.values(map);
}

// ── QR URL BASE ──
const QR_BASE = 'https://voloinv7.netlify.app/?id=';

// ── STATE ──
let QR_CAISSES = [];
let currentView = 'caisses'; // 'caisses' | 'items'
let currentCaisse = null;
let selected = new Set();
let searchQ = '';
let activeTab = '';
let allItems = [];
let qrSize = 90; // PETIT default (reduced 40%)

// Build CAISSES + allItems depuis data.js au load
function initData(){
  QR_CAISSES = (typeof ITEMS!=='undefined'&&ITEMS.length) ? buildCaisses() : CAISSES_PLACEHOLDER;
  allItems = [];
  QR_CAISSES.forEach(c=>{
    c.items.forEach(it=>{
      allItems.push({...it, caisse:c.id, caisseName:c.nom, cat:c.cat});
    });
  });
}



// ── QR ID FORMAT ──
var qrIdFormat = 'volo_id';
function setQrIdFormat(fmt){
  qrIdFormat = fmt;
  renderView();
}

// ── INIT ──
function init(){
  initData();
  applyTheme();
  document.documentElement.style.setProperty('--qr-size', qrSize + 'px');
  buildTabs();
  document.body.classList.add('print-3col');
  renderView();
  buildLexique();
  bindEvents();
}

function applyTheme(){
  const t = localStorage.getItem('volo_theme_main') || 'dark';
  document.body.classList.toggle('light', t==='light');
  document.getElementById('th-dark').classList.toggle('active', t!=='light');
  document.getElementById('th-light').classList.toggle('active', t==='light');
}

function buildTabs(){
  const cats = ['', ...new Set(QR_CAISSES.map(c=>c.cat))];
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = cats.map(c=>`
    <button class="tab${c===activeTab?' active':''}" data-cat="${c}">
      ${c || 'TOUT'}
    </button>`).join('');
  wrap.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeTab = btn.dataset.cat;
      wrap.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderView();
    });
  });
}

function getFilteredCaisses(){
  let list = QR_CAISSES;
  if(activeTab) list = list.filter(c=>c.cat===activeTab);
  if(searchQ){
    const q = searchQ.toLowerCase();
    list = list.filter(c=>{
      const nameMatch = c.nom.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q);
      const itemMatch = c.items.some(it=>it.nom.toLowerCase().includes(q)||it.id.toLowerCase().includes(q));
      return nameMatch || itemMatch;
    });
  }
  return list;
}

function renderView(){
  if(currentView==='caisses') renderCaisses();
  else renderItems(currentCaisse);
}

function renderCaisses(){
  const list = getFilteredCaisses();
  const main = document.getElementById('main');
  if(!list.length){
    main.innerHTML=`<div class="empty"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div><div class="empty-title">Aucune caisse trouvée</div><div class="empty-sub">Essayez un autre terme de recherche</div></div>`;
    return;
  }
  main.innerHTML=`
    <div class="section-header">
      <span class="section-label">Caisses d'équipement</span>
      <span class="count-pill">${list.length} caisse${list.length>1?'s':''}</span>
    </div>
    <div class="caisse-grid" id="caisse-grid"></div>`;
  const grid = document.getElementById('caisse-grid');
  list.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'caisse-card'+(selected.has(c.id)?' selected':'');
    el.dataset.id = c.id;
    const preview = c.items.slice(0,4).map(it=>`<span>${it.nom.split(' ').slice(0,3).join(' ')}</span>`).join('');
    const cSac = (typeof SAC_COLORS!=='undefined') ? SAC_COLORS[c.cat] : null;
    const cBadge = cSac ? `<span style="display:inline-block;background:${cSac.hex};color:#000;font-weight:700;font-size:11px;padding:2px 10px;border-radius:10px;margin-top:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;margin-right:4px"></span>Tape ${cSac.name}</span>` : '';
    if(cSac) el.style.borderLeft = `4px solid ${cSac.hex}`;
    el.innerHTML=`
      <div class="cc-top">
        <div class="cc-qr-wrap" id="qr-${c.id}" onclick="event.stopPropagation();openQrZoom('${c.id}','${c.nom}')"></div>
        <div class="cc-id">${c.id}</div>
      </div>
      <div class="cc-icons">${c.icons}</div>
      <div class="cc-name">${displayName(c.nom)}</div>
      ${cBadge}
      <div class="cc-preview">${preview}</div>
      <div class="cc-footer">
        <span class="cc-count">${c.items.length} items</span>
        <span class="cc-drill">Voir ›</span>
      </div>`;
    el.addEventListener('click',e=>{
      if(e.target.closest('.cc-drill')||e.target.textContent==='Voir ›') return drillDown(c);
      toggleSelect(c.id);
      el.classList.toggle('selected', selected.has(c.id));
      updateSelBar();
    });
    el.querySelector('.cc-drill').parentElement.querySelector('.cc-drill').addEventListener('click',()=>drillDown(c));
    grid.appendChild(el);
    setTimeout(()=>genQR(`qr-${c.id}`, QR_BASE+c.id, qrSize), 50);
  });
}

function drillDown(caisse){
  currentView='items'; currentCaisse=caisse;
  selected.clear(); updateSelBar();
  renderItems(caisse);
}

function renderItems(caisse){
  const main = document.getElementById('main');
  let items = caisse.items;
  if(searchQ){
    const q=searchQ.toLowerCase();
    items=items.filter(it=>it.nom.toLowerCase().includes(q)||it.id.toLowerCase().includes(q)||it.desc.toLowerCase().includes(q));
  }
  main.innerHTML=`
    <div class="back-row" id="back-row">
      <span style="font-size:18px">←</span>
      <div>
        <div class="back-row-title">← ${displayName(caisse.nom)}</div>
        <div class="back-row-sub">${caisse.id} · ${caisse.items.length} items</div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-label">Items</span>
      <span class="count-pill">${items.length} item${items.length>1?'s':''}</span>
    </div>
    <div class="items-grid" id="items-grid"></div>`;
  document.getElementById('back-row').addEventListener('click',()=>{
    currentView='caisses'; currentCaisse=null;
    selected.clear(); updateSelBar();
    renderCaisses();
  });
  const grid = document.getElementById('items-grid');
  items.forEach(it=>{
    const el = document.createElement('div');
    el.className='item-card'+(selected.has(it.id)?' selected':'');
    const colorEmoji = it.sacColorName ? (COULEUR_EMOJI[it.sacColorName]||'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:currentColor"></span>') : '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:currentColor"></span>';
    const colorBadge = it.sacColor
      ? `<span style="display:inline-block;background:${it.sacColor}22;color:${it.sacColor};font-weight:700;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:4px;border:1px solid ${it.sacColor}44;">${colorEmoji} ${it.sacColorName}</span>`
      : '';
    if(it.sacColor){
      el.setAttribute('data-sac-color', it.sacColorName);
      el.style.setProperty('--sac-border', it.sacColor);
      el.style.borderLeft = '4px solid ' + it.sacColor;
    }
    var displayId = (qrIdFormat === 'volo_id' && it.volo_id) ? it.volo_id : it.id;
    el.innerHTML=`
      <div class="ic-top">
        <div class="ic-qr-wrap" id="qr-${it.id}" onclick="event.stopPropagation();openQrZoom('${it.id}','${it.nom}')"></div>
        <div class="ic-id">${displayId}</div>
      </div>
      <div class="ic-name">${it.nom}</div>
      <div class="ic-desc">${it.desc}</div>
      ${colorBadge}
      <div class="ic-footer">
        <span class="ic-etat ${it.etat}">${it.etat==='bon'?'OK':it.etat==='warn'?'VERIF':'DEFAUT'}</span>
        <span class="ic-qty">×${it.qty}</span>
      </div>`;
    el.addEventListener('click',()=>{
      toggleSelect(it.id);
      el.classList.toggle('selected', selected.has(it.id));
      updateSelBar();
    });
    grid.appendChild(el);
    setTimeout(()=>genQR(`qr-${it.id}`, QR_BASE+it.id, qrSize), 50);
  });
}

function genQR(containerId, text, size){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML='';
  try{
    new QRCode(el,{text, width:size, height:size, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.L});
  }catch(e){console.warn('QR error',e);}
}

function toggleSelect(id){ if(selected.has(id)) selected.delete(id); else selected.add(id); }

function updateSelBar(){
  const bar = document.getElementById('sel-bar');
  const n = selected.size;
  document.getElementById('sel-count').textContent = `${n} sélectionné${n>1?'s':''}`;
  bar.classList.toggle('visible', n>0);
}

function buildLexique(){
  const entries = document.getElementById('lex-entries');
  renderLexique(LEXIQUE);
  document.getElementById('lex-search').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    renderLexique(LEXIQUE.filter(l=>l.prefix.toLowerCase().includes(q)||l.nom.toLowerCase().includes(q)||l.desc.toLowerCase().includes(q)||l.cat.toLowerCase().includes(q)));
  });
}

function renderLexique(list){
  const entries = document.getElementById('lex-entries');
  if(!list.length){entries.innerHTML='<div class="empty"><div class="empty-title">Aucun préfixe trouvé</div></div>';return;}
  entries.innerHTML = list.map(l=>`
    <div class="lex-entry">
      <span class="lex-prefix">${l.prefix}</span>
      <div class="lex-info">
        <div class="lex-name">${l.nom}</div>
        <div class="lex-desc">${l.desc}</div>
      </div>
      <span class="lex-cat">${l.cat}</span>
    </div>`).join('');
}

function toast(msg, dur=2200){
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function playSound(){ try{document.getElementById('snd').cloneNode().play();}catch(e){} }

function openQrZoom(id, label){
  const modal = document.getElementById('qr-zoom-modal');
  const box = document.getElementById('qr-zoom-box');
  const lbl = document.getElementById('qr-zoom-label');
  const idEl = document.getElementById('qr-zoom-id');
  box.innerHTML = '';
  lbl.textContent = label || id;
  idEl.textContent = id;
  const size = Math.min(window.innerWidth - 80, 280);
  try{
    new QRCode(box,{text:QR_BASE+id, width:size, height:size, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.L});
  }catch(e){}
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeQrZoom(){
  document.getElementById('qr-zoom-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function applyQrSize(size){
  qrSize = size;
  document.documentElement.style.setProperty('--qr-size', size + 'px');
  document.querySelectorAll('[data-qr-size]').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.qrSize) === size);
  });
  // Adjust item name font size based on QR size
  var nameFontSize = size <= 90 ? '16px' : size >= 150 ? '22px' : '20px';
  document.documentElement.style.setProperty('--qr-name-size', nameFontSize);
  renderView();
}

let currentPrintFmt = 'print-3col';
function applyPrintFmt(fmt){
  document.body.classList.remove('print-2col','print-3col','print-4col');
  document.body.classList.add(fmt);
  currentPrintFmt = fmt;
  document.querySelectorAll('[data-print-fmt]').forEach(b=>{
    b.classList.toggle('active', b.dataset.printFmt === fmt);
  });
}

// ── BIND EVENTS ──
function bindEvents(){
  // QR Size selector
  document.querySelectorAll('[data-qr-size]').forEach(btn=>{
    btn.addEventListener('click',()=>applyQrSize(parseInt(btn.dataset.qrSize)));
  });

  // Print format selector
  document.querySelectorAll('[data-print-fmt]').forEach(btn=>{
    btn.addEventListener('click',()=>applyPrintFmt(btn.dataset.printFmt));
  });

  // Search
  const inp = document.getElementById('search');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input',e=>{
    searchQ=e.target.value.trim();
    clr.classList.toggle('visible', !!searchQ);
    renderView();
  });
  clr.addEventListener('click',()=>{inp.value='';searchQ='';clr.classList.remove('visible');renderView();inp.focus();});

  // Theme
  document.getElementById('th-dark').addEventListener('click',()=>setTheme('dark'));
  document.getElementById('th-light').addEventListener('click',()=>setTheme('light'));

  // Lexique
  document.getElementById('btn-lexique').addEventListener('click',()=>document.getElementById('lex-modal').classList.add('open'));

  // Print
  document.getElementById('btn-print').addEventListener('click',()=>window.print());

  // Export
  document.getElementById('btn-export').addEventListener('click',()=>{
    const exportData = (typeof ITEMS!=='undefined') ? ITEMS : QR_CAISSES;
    const blob = new Blob([JSON.stringify(exportData, null, 2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`inventaire_golden_eagles_${Date.now()}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast('Export JSON telecharge');
    playSound();
  });

  // Add modal
  document.getElementById('btn-add').addEventListener('click',()=>{
    const sel=document.getElementById('inp-cat');
    sel.innerHTML=QR_CAISSES.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
    document.getElementById('modal').classList.add('open');
  });
  document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
  document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
  document.getElementById('btn-save').addEventListener('click',()=>{
    const name=document.getElementById('inp-name').value.trim();
    if(!name){toast('Nom requis');return;}
    const cat=document.getElementById('inp-cat').value;
    const desc=document.getElementById('inp-desc').value.trim();
    const fab=document.getElementById('inp-fab').value.trim();
    const qty=parseInt(document.getElementById('inp-qty').value)||1;
    const caisse=QR_CAISSES.find(c=>c.id===cat);
    if(!caisse) return;
    const prefix=caisse.id.replace('CAISSE-','');
    const newId=`${prefix}-${String(caisse.items.length+1).padStart(3,'0')}`;
    caisse.items.push({id:newId,nom:name,desc,fab,qty,etat:'bon'});
    allItems.push({id:newId,nom:name,desc,fab,qty,etat:'bon',caisse:caisse.id,caisseName:caisse.nom,cat:caisse.cat});
    document.getElementById('modal').classList.remove('open');
    document.getElementById('inp-name').value='';
    renderView();
    toast(`${name} ajoute`);
    playSound();
  });

  // Selection bar
  document.getElementById('btn-clear-sel').addEventListener('click',()=>{selected.clear();updateSelBar();renderView();});
  document.getElementById('btn-print-sel').addEventListener('click',()=>{
    if(!selected.size) return;
    toast(`Impression de ${selected.size} QR code${selected.size>1?'s':''}…`);
    setTimeout(()=>window.print(), 500);
  });
}

function setTheme(t){
  localStorage.setItem('volo_theme_main',t);
  document.body.classList.toggle('light',t==='light');
  document.getElementById('th-dark').classList.toggle('active',t!=='light');
  document.getElementById('th-light').classList.toggle('active',t==='light');
}

// ── QR SCANNER (getUserMedia + jsQR) ──
let _scanStream = null;
let _scanVideo = null;
let _scanAnim = null;
let _scanFound = false;

function openScanModal(){
  document.getElementById('scan-overlay').classList.add('open');
  document.getElementById('scan-result').classList.remove('visible');
  document.getElementById('scan-result-warn').classList.remove('visible');
  document.getElementById('scan-again').classList.remove('visible');
  _scanFound = false;
  startScanner();
}

function closeScanModal(){
  document.getElementById('scan-overlay').classList.remove('open');
  stopScanner();
}

async function startScanner(){
  stopScanner();
  _scanFound = false;
  var reader = document.getElementById('scan-reader');
  reader.innerHTML =
    '<div style="position:relative;width:100%;aspect-ratio:1;background:#000;border-radius:12px;overflow:hidden">' +
      '<video id="scan-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;display:block"></video>' +
      '<canvas id="scan-canvas" style="display:none"></canvas>' +
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">' +
        '<div id="scan-box" style="width:72%;max-width:260px;aspect-ratio:1;border:3px solid var(--gold);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.4);position:relative">' +
          '<div style="position:absolute;top:-3px;left:-3px;width:24px;height:24px;border-top:4px solid var(--gold);border-left:4px solid var(--gold);border-radius:4px 0 0 0"></div>' +
          '<div style="position:absolute;top:-3px;right:-3px;width:24px;height:24px;border-top:4px solid var(--gold);border-right:4px solid var(--gold);border-radius:0 4px 0 0"></div>' +
          '<div style="position:absolute;bottom:-3px;left:-3px;width:24px;height:24px;border-bottom:4px solid var(--gold);border-left:4px solid var(--gold);border-radius:0 0 0 4px"></div>' +
          '<div style="position:absolute;bottom:-3px;right:-3px;width:24px;height:24px;border-bottom:4px solid var(--gold);border-right:4px solid var(--gold);border-radius:0 0 4px 0"></div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div id="scan-status" style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">Activation caméra…</div>';

  var video = document.getElementById('scan-video');
  var status = document.getElementById('scan-status');
  _scanVideo = video;

  try {
    var stream;
    var constraints = [
      {video:{facingMode:{exact:'environment'},width:{ideal:1280},height:{ideal:720}}},
      {video:{facingMode:'environment'}},
      {video:true}
    ];
    for(var i=0;i<constraints.length;i++){
      try{ stream = await navigator.mediaDevices.getUserMedia(constraints[i]); break; }catch(e){}
    }
    if(!stream) throw new Error('no stream');
    _scanStream = stream;
    video.srcObject = stream;
    await video.play();
    var jsqrOk = typeof jsQR !== 'undefined';
    if(status) status.textContent = jsqrOk ? '' : 'ERREUR : jsQR non charge — vide le cache';

    var canvas = document.getElementById('scan-canvas');
    var ctx = canvas.getContext('2d',{willReadFrequently:true});
    function scanLoop(){
      if(_scanFound || !_scanStream || !video || video.readyState < 2){
        if(!_scanFound) _scanAnim = requestAnimationFrame(scanLoop);
        return;
      }
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0);
      if(typeof jsQR !== 'undefined'){
        var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var code = jsQR(img.data, img.width, img.height, {inversionAttempts:'attemptBoth'});
        if(code && code.data){
          var box = document.getElementById('scan-box');
          if(box) box.style.borderColor = 'var(--green)';
          _scanFound = true;
          onScanSuccess(code.data);
          return;
        }
      }
      _scanAnim = requestAnimationFrame(scanLoop);
    }
    _scanAnim = requestAnimationFrame(scanLoop);

  } catch(err){
    reader.innerHTML = '<div style="padding:30px;text-align:center"><div style="color:var(--red);font-size:15px;margin-bottom:10px">ERREUR — Camera non disponible</div><div style="color:var(--muted);font-size:13px">Autorise la caméra dans ton navigateur</div></div>';
  }
}

function stopScanner(){
  if(_scanAnim){ cancelAnimationFrame(_scanAnim); _scanAnim = null; }
  if(_scanStream){ _scanStream.getTracks().forEach(function(t){t.stop();}); _scanStream = null; }
  if(_scanVideo){ _scanVideo.srcObject = null; _scanVideo = null; }
}

var _lastScannedQr = '';
var _scanCooldown = false;

function onScanSuccess(decodedText){
  // Scan rafale — ne PAS stopper le scanner, juste pause 1.5s pour éviter les doublons
  if(_scanCooldown || decodedText === _lastScannedQr) return;
  _scanCooldown = true;
  _lastScannedQr = decodedText;
  setTimeout(function(){ _scanCooldown = false; _lastScannedQr = ''; }, 1500);

  // Extract ID from URL or raw text
  let itemId = decodedText;
  if(decodedText.includes('?id=')){
    itemId = decodedText.split('?id=').pop();
  }
  itemId = decodeURIComponent(itemId).trim();

  // Search in ITEMS
  let found = null;
  if(typeof ITEMS !== 'undefined'){
    found = ITEMS.find(function(it){ return it.id === itemId; });
  }
  // Search in allItems (includes caisse info)
  let caisseInfo = null;
  if(found){
    const ai = allItems.find(function(it){ return it.id === itemId; });
    if(ai) caisseInfo = ai.caisseName;
  }
  // Search in CAISSES
  let foundCaisse = null;
  if(!found && typeof CAISSES !== 'undefined'){
    foundCaisse = CAISSES.find(function(c){ return c.id === itemId; });
  }
  if(!foundCaisse){
    foundCaisse = QR_CAISSES.find(function(c){ return c.id === itemId; });
  }

  const resultEl = document.getElementById('scan-result');
  const titleEl = document.getElementById('scan-result-title');
  const metaEl = document.getElementById('scan-result-meta');
  const warnEl = document.getElementById('scan-result-warn');
  const againBtn = document.getElementById('scan-again');

  if(found){
    titleEl.textContent = found.name || found.id;
    let meta = '<span>' + found.id + '</span>';
    if(found.cat) meta += '<span>' + found.cat + '</span>';
    if(found.etat) meta += '<span>' + found.etat + '</span>';
    if(caisseInfo) meta += '<br>Caisse : ' + caisseInfo;
    if(found.fab) meta += '<br>Fabricant : ' + found.fab;
    if(found.serial) meta += '<br>Serial : ' + found.serial;
    metaEl.innerHTML = meta;
    resultEl.classList.add('visible');
    warnEl.classList.remove('visible');
  } else if(foundCaisse){
    titleEl.textContent = foundCaisse.nom || foundCaisse.name || foundCaisse.id;
    let meta = '<span>' + foundCaisse.id + '</span>';
    if(foundCaisse.cat) meta += '<span>' + foundCaisse.cat + '</span>';
    meta += '<br>Items : ' + (foundCaisse.count || (foundCaisse.items_contenus ? foundCaisse.items_contenus.length : '?'));
    metaEl.innerHTML = meta;
    resultEl.classList.add('visible');
    warnEl.classList.remove('visible');
  } else {
    resultEl.classList.remove('visible');
    warnEl.textContent = 'QR non trouve dans l\'inventaire — ID: ' + itemId;
    warnEl.classList.add('visible');
  }
  againBtn.classList.remove('visible'); // Pas besoin de "scanner encore" en mode rafale
}

function scanAgain(){
  document.getElementById('scan-result').classList.remove('visible');
  document.getElementById('scan-result-warn').classList.remove('visible');
  document.getElementById('scan-again').classList.remove('visible');
  startScanner();
}

document.addEventListener('DOMContentLoaded', init);
</script>
