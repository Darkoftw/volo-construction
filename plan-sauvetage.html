<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="view-transition" content="same-origin">
<meta name="mobile-web-app-capable" content="yes">
<title>VOLO SST — Plan de Sauvetage</title>
<link rel="icon" href="eagle_tactic.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="data.js"></script>
<script src="logo.js"></script>

<style>
:root{
  --bg:#0C0608;--card:#151015;--card2:#1A141A;--txt:#F5F0EB;--muted:#8A8A9A;
  --rescue:#E65100;--gold:#C9A84C;--green:#27AE60;--red:#C0392B;--blue:#3B82F6;
  --purple:#8B5CF6;--border:rgba(201,168,76,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:100px}
@view-transition{navigation:auto}
::view-transition-old(root){animation:vt-fade-out .2s ease-out}
::view-transition-new(root){animation:vt-fade-in .3s ease-in}
@keyframes vt-fade-out{from{opacity:1}to{opacity:0}}
@keyframes vt-fade-in{from{opacity:0}to{opacity:1}}
input,select,textarea{font-size:16px!important}

.top-bar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#0C0608,rgba(12,6,8,.97));backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
.top-bar img{width:32px;height:32px;border-radius:8px;border:2px solid rgba(201,168,76,.35)}
.top-bar h1{font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);flex:1}
.btn-back{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--txt);padding:5px 12px;font-size:12px;cursor:pointer;text-decoration:none}

.hero{text-align:center;padding:24px 20px 16px;background:linear-gradient(180deg,rgba(230,81,0,.06),transparent)}
.hero h2{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:3px;color:var(--rescue);margin-bottom:4px}
.hero p{color:var(--muted);font-size:12px}

/* Templates chooser */
.tpl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 14px}
.tpl-card{background:var(--card);border:2px solid transparent;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tpl-card:active{transform:scale(.97)}
.tpl-card.active{border-color:var(--rescue);background:rgba(230,81,0,.08)}
.tpl-icon{font-size:28px;margin-bottom:6px}
.tpl-name{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;color:var(--txt)}
.tpl-desc{font-size:10px;color:var(--muted);margin-top:2px}

/* Sections */
.section{margin:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.sec-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--rescue),#B33600);color:#fff;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-title{flex:1;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px}
.sec-chev{color:var(--muted);font-size:10px;transition:transform .3s}
.sec-chev.open{transform:rotate(180deg)}
.sec-body{padding:0 14px 14px;display:none}
.sec-body.open{display:block}

/* Form */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:var(--card2);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--txt);padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rescue)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Risk chips */
.risk-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.risk-chip{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.risk-chip.active{border-color:var(--red);background:rgba(192,57,43,.12);color:var(--red)}

/* Steps */
.step-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.step-num{width:24px;height:24px;border-radius:50%;background:rgba(230,81,0,.15);color:var(--rescue);font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-txt{flex:1;font-size:13px;line-height:1.5}
.step-warn{font-weight:700;color:var(--red)}

/* Equipment list */
.equip-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.equip-chk{width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--green);flex-shrink:0;transition:all .2s}
.equip-chk.checked{background:rgba(39,174,96,.2);border-color:var(--green)}
.equip-name{flex:1;font-size:13px}
.equip-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--rescue);font-weight:600}
.equip-match{font-size:10px;color:var(--green)}

/* Photo upload */
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:8px 0}
.photo-slot{aspect-ratio:4/3;background:var(--card2);border:2px dashed rgba(255,255,255,.1);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.photo-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.photo-slot .ph-icon{font-size:24px;color:var(--muted)}
.photo-slot .ph-label{font-size:10px;color:var(--muted);margin-top:4px}

/* Category badge */
.cat-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;font-weight:700}
.cat-I{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.cat-II{background:rgba(243,156,18,.15);color:#F39C12;border:1px solid rgba(243,156,18,.3)}
.cat-III{background:rgba(192,57,43,.15);color:var(--red);border:1px solid rgba(192,57,43,.3)}

/* AI */
.ai-card{background:linear-gradient(135deg,rgba(201,168,76,.06),rgba(230,81,0,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px;margin:10px 12px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--rescue),transparent)}
.ai-btn{width:100%;padding:14px;border-radius:10px;border:1px solid rgba(201,168,76,.3);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(230,81,0,.06));color:var(--gold);font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s}
.ai-btn:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.15)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Generate */
.gen-wrap{padding:20px 16px 40px;text-align:center}
.gen-btn{width:100%;padding:18px;border-radius:14px;border:2px solid var(--rescue);background:linear-gradient(135deg,rgba(230,81,0,.15),rgba(201,168,76,.08));color:var(--rescue);font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s}
.gen-btn:hover{border-color:#FF6D00;box-shadow:0 4px 20px rgba(230,81,0,.2)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
.toast.ok{background:rgba(39,174,96,.9);color:#fff}
.toast.err{background:rgba(192,57,43,.9);color:#fff}
.toast.info{background:rgba(59,130,246,.9);color:#fff}

@media(max-width:480px){.field-row{grid-template-columns:1fr}}
</style>
</head>

<div class="top-bar">

function init() {
  renderTemplates();
  selectTemplate('espace_clos');
  var savedKey = sessionStorage.getItem('_vk');
  if (savedKey) document.getElementById('apiKey').value = atob(savedKey);
}

function renderTemplates() {
  var html = '';
  TEMPLATES.forEach(function(t) {
    html += '<div class="tpl-card" id="tpl_' + t.id + '" onclick="selectTemplate(\'' + t.id + '\')">' +
      '<div class="tpl-icon">' + t.icon + '</div>' +
      '<div class="tpl-name">' + t.name + '</div>' +
      '<div class="tpl-desc">' + t.desc + '</div>' +
    '</div>';
  });
  document.getElementById('tplGrid').innerHTML = html;
}

function selectTemplate(id) {
  PS.template = id;
  var tpl = TEMPLATES.find(function(t){ return t.id === id; });
  if (!tpl) return;
  PS.categorie = tpl.cat;
  PS.risques = tpl.risques.slice();
  PS.equipChecked = {};
  tpl.equipDefault.forEach(function(e){ PS.equipChecked[e] = true; });
  PS.etapes = getDefaultSteps(id);
  PS.procedure = getDefaultProcedure(id);
  PS.communication = getDefaultComm();

  // Update active card
  document.querySelectorAll('.tpl-card').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tpl_' + id).classList.add('active');

  renderSections();
}

      if (items.length > 0) {
        items.forEach(function(item) {
          if (eq.searchId) {
            for (var i = 0; i < eq.searchId.length; i++) {
              if (item.id.indexOf(eq.searchId[i]) === 0) { matchCount++; return; }
            }
          }
          if (eq.searchCat) {
            for (var i = 0; i < eq.searchCat.length; i++) {
              if ((item.cat||'').indexOf(eq.searchCat[i]) !== -1 || (item.name||'').indexOf(eq.searchCat[i]) !== -1) { matchCount++; return; }
            }
          }
        });
      }
      s += '<div class="equip-item">' +
        '<div class="equip-chk ' + (checked?'checked':'') + '" onclick="toggleEquip(\'' + eq.id + '\')">' + (checked?'✓':'') + '</div>' +
        '<span style="font-size:16px">' + eq.icon + '</span>' +
        '<div class="equip-name">' + eq.name + '</div>' +
        (matchCount > 0 ? '<div class="equip-match">×' + matchCount + ' dispo</div>' : '') +
      '</div>';
    });
    s += '<div class="field" style="margin-top:12px"><label>NOMBRE D\'INTERVENANTS REQUIS (RSST art. 309)</label><input type="number" min="1" max="20" value="' + PS.nbIntervenants + '" onchange="PS.nbIntervenants=parseInt(this.value)" style="width:80px"></div>';
    return s;
  });

  // 8 — NOTES
  html += sec(8, '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>', 'NOTES ET OBSERVATIONS', function() {
    return '<div class="field"><label>NOTES SUPPLÉMENTAIRES</label><textarea rows="4" onchange="PS.notes=this.value" placeholder="Conditions particulières, accès, dangers supplémentaires...">' + esc(PS.notes) + '</textarea></div>';
  });

  document.getElementById('sectionsWrap').innerHTML = html;
  // Open first 3 sections by default
  ['sec1','sec2','sec3'].forEach(function(id){ toggleSec(id, true); });
}

function sec(num, icon, title, contentFn) {
  var id = 'sec' + num;
  return '<div class="section"><div class="sec-head" onclick="toggleSec(\'' + id + '\')">' +
    '<div class="sec-num">' + num + '</div><span style="font-size:16px">' + icon + '</span>' +
    '<div class="sec-title">' + title + '</div><div class="sec-chev" id="chev_' + id + '">▼</div>' +
  '</div><div class="sec-body" id="body_' + id + '">' + contentFn() + '</div></div>';
}

function toggleSec(id, forceOpen) {
  var body = document.getElementById('body_' + id);
  var chev = document.getElementById('chev_' + id);
  if (forceOpen) { body.classList.add('open'); chev.classList.add('open'); }
  else { body.classList.toggle('open'); chev.classList.toggle('open'); }
}

function toggleRisk(id) {
  var idx = PS.risques.indexOf(id);
  if (idx === -1) PS.risques.push(id);
  else PS.risques.splice(idx, 1);
  renderSections();
}

function toggleEquip(id) {
  PS.equipChecked[id] = !PS.equipChecked[id];
  renderSections();
}

function addStep() {
  var input = document.getElementById('newStep');
  var txt = input.value.trim();
  if (!txt) return;
  PS.etapes.push({txt: txt, warn: false});
  input.value = '';
  renderSections();
}

function triggerPhoto(slot) {
  PS.currentPhotoSlot = slot;
  document.getElementById('photoInput').click();
}

document.addEventListener('DOMContentLoaded', function() {
  init();
  document.getElementById('photoInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file || PS.currentPhotoSlot < 0) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      PS.photos[PS.currentPhotoSlot] = ev.target.result;
      renderSections();
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });
});

function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'info') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

async function runAI() {
  // Save API key in sessionStorage only (base64, cleared on tab close)
  var apiKeyField = document.getElementById('apiKey').value.trim();
  if (apiKeyField) sessionStorage.setItem('_vk', btoa(apiKeyField));

  var btn = document.getElementById('btnAI');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> GÉNÉRATION EN COURS...';

  var tpl = TEMPLATES.find(function(t){ return t.id === PS.template; });
  var risquesLabels = PS.risques.map(function(id) { var r = RISQUES.find(function(x){ return x.id === id; }); return r ? r.label : id; });

  var prompt = 'Tu es un expert en sauvetage technique et en santé-sécurité au travail (SST) au Québec, spécialisé dans les plans de sauvetage conformes au RSST.\n\n' +
    'Génère un plan de sauvetage complet pour cette situation :\n\n' +
    '## CONTEXTE\n' +
    '- Type : ' + tpl.name + '\n' +
    '- Compagnie : ' + (PS.compagnie || 'Non spécifié') + '\n' +
    '- Installation : ' + (PS.nomEspace || 'Non spécifié') + '\n' +
    '- Adresse : ' + (PS.adresse || 'Non spécifié') + '\n' +
    '- Catégorie : ' + PS.categorie + ' (' + (PS.categorie==='III'?'Risque élevé':PS.categorie==='II'?'Risque modéré':'Risque faible') + ')\n' +
    '- Risques identifiés : ' + (risquesLabels.join(', ') || 'Aucun') + '\n' +
    '- Notes : ' + (PS.notes || 'Aucune') + '\n\n' +
    '## FORMAT DE RÉPONSE\n' +
    'Réponds UNIQUEMENT en JSON valide (pas de markdown) :\n' +
    '{\n' +
    '  "aide_memoire": [{"txt": "string", "warn": boolean}],\n' +
    '  "procedure": ["string"],\n' +
    '  "communication": "string (séparé par \\n)",\n' +
    '  "equipements_supplementaires": ["string"],\n' +
    '  "nb_intervenants": number,\n' +
    '  "notes_securite": ["string"],\n' +
    '  "conditions_arret": ["string — conditions où il faut arrêter l\'intervention"]\n' +
    '}';

  try {
    // Direct browser call — proxy timeout too short for Claude responses
    // Server-side proxy — API key stays on Netlify (env var ANTHROPIC_API_KEY)
    var response = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        messages: [{role: 'user', content: prompt}]
      })
    });

    if (!response.ok) throw new Error('Erreur API ' + response.status);
    var data = await response.json();
    var text = data.content[0].text;
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Réponse invalide');

    var jsonStr = jsonMatch[0];
    // Auto-repair truncated JSON
    var opens = (jsonStr.match(/\[/g)||[]).length;
    var closes = (jsonStr.match(/\]/g)||[]).length;
    var openBraces = (jsonStr.match(/\{/g)||[]).length;
    var closeBraces = (jsonStr.match(/\}/g)||[]).length;
    // Remove trailing comma before closing
    jsonStr = jsonStr.replace(/,\s*$/, '');
    for (var bi = 0; bi < opens - closes; bi++) jsonStr += ']';
    for (var bj = 0; bj < openBraces - closeBraces; bj++) jsonStr += '}';

    var result;
    try {
      result = JSON.parse(jsonStr);
    } catch(parseErr) {
      showToast('Reponse tronquee — relancez l\'IA', 'err');
      return;
    }
    PS.aiResult = result;

    // Apply AI results
    if (result.aide_memoire) PS.etapes = result.aide_memoire;
    if (result.procedure) PS.procedure = result.procedure;
    if (result.communication) PS.communication = result.communication;
    if (result.nb_intervenants) PS.nbIntervenants = result.nb_intervenants;

    renderSections();
    showToast('Eagle SST M — Plan genere', 'ok');
  } catch(e) {
    showToast('Erreur : ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M12 2L9 9l-7 1 5 5-1.5 7L12 18l6.5 4L17 15l5-5-7-1z"/></svg> EAGLE SST M — GENERER';
  }
}

function generatePDF() {
  showToast('Generation du PDF...', 'info');
  setTimeout(function() {
    try {
      var doc = new jspdf.jsPDF('p', 'mm', 'a4');
      var pw = 210, ph = 297, ml = 16, mr = 16, mt = 26, mb = 20;
      var cw = pw - ml - mr;
      var pageNum = 0;
      var totalPages = 0;
      // Dark theme colors
      var C = {
        bg:[12,6,8], bg2:[21,16,21], bg3:[26,20,26], rescue:[230,81,0], gold:[212,160,23],
        txt:[184,169,154], txtLight:[245,240,235], muted:[107,91,78], green:[39,174,96],
        red:[192,57,43], blue:[59,130,246], purple:[139,92,246],
        white:[255,255,255], line:[60,50,45], lineGold:[212,160,23]
      };

      function setC(c,t){ if(t==='fill')doc.setFillColor(c[0],c[1],c[2]);else if(t==='draw')doc.setDrawColor(c[0],c[1],c[2]);else doc.setTextColor(c[0],c[1],c[2]); }

      // Dark page background
      function darkBg(){
        setC(C.bg,'fill'); doc.rect(0,0,pw,ph,'F');
      }

      // Gradient-like band (simulated with 2 rects)
      function gradBand(x,y,w,h,c1,c2){
        setC(c1,'fill'); doc.rect(x,y,w,h/2,'F');
        setC(c2||c1,'fill'); doc.rect(x,y+h/2,w,h/2,'F');
      }

      // Section title bar
      function sectionBar(y,title,color){
        color = color || C.rescue;
        setC(color,'fill'); doc.roundedRect(ml,y,cw,9,2,2,'F');
        // Subtle shine line on top
        doc.setDrawColor(255,255,255); doc.setLineWidth(0.15);
        doc.line(ml+4,y+0.5,ml+cw-4,y+0.5);
        doc.setFont('helvetica','bold');doc.setFontSize(10);setC(C.white,'text');
        doc.text(title,ml+5,y+6.2);
        return y+14;
      }

      // Header bar with king logo
      function header(title) {
        setC(C.bg,'fill'); doc.rect(0,0,pw,18,'F');
        // Gold accent line
        setC(C.gold,'fill'); doc.rect(0,18,pw,0.6,'F');
        // Rescue thin line under gold
        setC(C.rescue,'fill'); doc.rect(0,18.6,pw,0.3,'F');
        // King logo in header — masked corners + gold ring
        var hlx=ml+7,hly=9,hlr=7;
        try{if(typeof KING_LOGO_B64!=='undefined'){doc.addImage(KING_LOGO_B64,'JPEG',hlx-hlr,hly-hlr,hlr*2,hlr*2);}}catch(e){
          try{if(typeof VOLO_LOGO_B64!=='undefined'){var ld=VOLO_LOGO_B64;if(ld.indexOf('data:')===-1)ld='data:image/png;base64,'+ld;doc.addImage(ld,'PNG',ml+1,2.5,12,12);}}catch(e2){}
        }
        // Mask square corners with thick dark ring
        setC(C.bg,'draw');doc.setLineWidth(5);doc.circle(hlx,hly,9.5,'S');
        // Gold ring
        setC(C.gold,'draw');doc.setLineWidth(0.5);doc.circle(hlx,hly,7,'S');
        doc.setFont('helvetica','bold');doc.setFontSize(7.5);setC(C.gold,'text');
        doc.text('VOLO CONSTRUCTION SST',ml+17,7.5);
        doc.setFont('helvetica','normal');doc.setFontSize(6.5);setC(C.muted,'text');
        doc.text('THE GOLDEN EAGLES — SAUVETAGE TECHNIQUE',ml+17,12.5);
        if(title){doc.setFont('helvetica','bold');doc.setFontSize(7);setC(C.rescue,'text');doc.text(title,pw-mr,10,{align:'right'});}
      }

      function footer(){
        setC(C.line,'draw');doc.setLineWidth(0.2);doc.line(ml,ph-13,pw-mr,ph-13);
        setC(C.gold,'fill'); doc.rect(ml,ph-13,30,0.4,'F'); // Gold accent
        doc.setFont('helvetica','normal');doc.setFontSize(5.5);setC(C.muted,'text');
        doc.text('CONFIDENTIEL — '+(PS.compagnie||'VOLO CONSTRUCTION')+' — '+new Date().toLocaleDateString('fr-CA'),ml,ph-8.5);
        doc.text('Page '+pageNum,pw-mr,ph-8.5,{align:'right'});
        // Tiny king logo in footer — masked + blended
        try{if(typeof KING_LOGO_B64!=='undefined'){
          doc.setGState(new doc.GState({opacity:0.35}));
          doc.addImage(KING_LOGO_B64,'JPEG',pw/2-3,ph-14,6,6);
          doc.setGState(new doc.GState({opacity:1}));
          // Mask corners
          setC(C.bg,'draw');doc.setLineWidth(3);doc.circle(pw/2,ph-11,4.5,'S');
          setC(C.gold,'draw');doc.setLineWidth(0.15);doc.circle(pw/2,ph-11,3,'S');
        }}catch(e){}
      }

      function newPage(title){doc.addPage();pageNum++;darkBg();header(title);footer();return mt;}
      function checkY(y,need){if(y+need>ph-mb){return newPage();}return y;}

      // ══════════════════════════════════════════════
      //  PAGE 1 — COUVERTURE ROYALE
      // ══════════════════════════════════════════════
      pageNum++;
      darkBg();

      // Top band dark gradient
      setC([28,16,24],'fill'); doc.rect(0,0,pw,140,'F');
      setC(C.bg,'fill'); doc.rect(0,130,pw,10,'F'); // blend

      // Decorative corner lines
      setC(C.gold,'draw'); doc.setLineWidth(0.3);
      doc.line(12,12,40,12); doc.line(12,12,12,40);
      doc.line(pw-12,12,pw-40,12); doc.line(pw-12,12,pw-12,40);
      doc.line(12,ph-12,40,ph-12); doc.line(12,ph-12,12,ph-40);
      doc.line(pw-12,ph-12,pw-40,ph-12); doc.line(pw-12,ph-12,pw-12,ph-40);

      // King logo — big and centered, corners masked
      var logoX=pw/2, logoY=46, logoR=30;
      var coverBg=[28,16,24]; // top band color
      // 1) Draw image first
      try{if(typeof KING_LOGO_B64!=='undefined'){doc.addImage(KING_LOGO_B64,'JPEG',logoX-logoR,logoY-logoR,logoR*2,logoR*2);}}catch(e){
        try{if(typeof VOLO_LOGO_B64!=='undefined'){var ld=VOLO_LOGO_B64;if(ld.indexOf('data:')===-1)ld='data:image/png;base64,'+ld;doc.addImage(ld,'PNG',logoX-25,logoY-25,50,50);}}catch(e2){}
      }
      // 2) Thick ring OVER corners to mask the square JPEG edges
      doc.setDrawColor(coverBg[0],coverBg[1],coverBg[2]);
      doc.setLineWidth(16);
      doc.circle(logoX,logoY,36,'S');
      // 3) Gold glow rings
      for(var gr=3;gr>=1;gr--){
        doc.setGState(new doc.GState({opacity:gr*0.07}));
        setC(C.gold,'draw');doc.setLineWidth(1);doc.circle(logoX,logoY,28+gr*1.5,'S');
      }
      doc.setGState(new doc.GState({opacity:1}));
      // 4) Gold ring border tight on the badge
      setC(C.gold,'draw');doc.setLineWidth(1.2);doc.circle(logoX,logoY,28.5,'S');
      // 5) Thin inner gold ring
      setC(C.gold,'draw');doc.setLineWidth(0.4);doc.circle(logoX,logoY,26,'S');

      // Gold separator
      setC(C.gold,'draw'); doc.setLineWidth(0.6);
      doc.line(pw/2-45,82,pw/2+45,82);
      setC(C.rescue,'fill'); doc.circle(pw/2,82,1.5,'F');

      // Title
      doc.setFont('helvetica','bold');doc.setFontSize(28);setC(C.txtLight,'text');
      doc.text('PLAN DE SAUVETAGE',pw/2,98,{align:'center'});

      // Template type
      var tpl=TEMPLATES.find(function(t){return t.id===PS.template;});
      doc.setFontSize(14);setC(C.rescue,'text');
      doc.text(tpl?tpl.name:'',pw/2,110,{align:'center'});

      // Subtitle
      doc.setFont('helvetica','normal');doc.setFontSize(8);setC(C.gold,'text');
      doc.text('THE GOLDEN EAGLES — SAUVETAGE TECHNIQUE',pw/2,120,{align:'center'});

      // Gold separator 2
      setC(C.gold,'draw'); doc.setLineWidth(0.4);
      doc.line(pw/2-35,126,pw/2+35,126);

      // Category badge
      var catColor=PS.categorie==='III'?C.red:PS.categorie==='II'?[243,156,18]:C.green;
      var catLabel='CATEGORIE '+PS.categorie+(PS.categorie==='III'?' — RISQUE ELEVE':PS.categorie==='II'?' — RISQUE MODERE':' — RISQUE FAIBLE');
      setC(catColor,'fill'); doc.roundedRect(pw/2-38,134,76,11,3,3,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);setC(C.white,'text');
      doc.text(catLabel,pw/2,141,{align:'center'});

      // Info card (dark card style like QA report)
      var bx=28,by=156,bw=pw-56;
      setC(C.bg2,'fill'); doc.roundedRect(bx,by,bw,58,4,4,'F');
      setC(C.rescue,'fill'); doc.rect(bx,by,bw,1.5,'F'); // Top accent
      setC(C.rescue,'draw'); doc.setLineWidth(0.2); doc.roundedRect(bx,by,bw,58,4,4,'S');

      var infoY=by+14;
      var infoData=[
        ['COMPAGNIE',PS.compagnie||'—'],
        ['INSTALLATION',PS.nomEspace||'—'],
        ['ADRESSE',PS.adresse||'—'],
        ['DATE',new Date().toLocaleDateString('fr-CA')]
      ];
      infoData.forEach(function(pair){
        doc.setFont('helvetica','bold');doc.setFontSize(7);setC(C.muted,'text');
        doc.text(pair[0],bx+8,infoY);
        doc.setFont('helvetica','normal');doc.setFontSize(9);setC(C.txtLight,'text');
        doc.text(pair[1],bx+42,infoY);
        infoY+=11;
      });

      // Risques on cover (dark card)
      if(PS.risques.length>0){
        var ry=222;
        setC(C.bg2,'fill'); doc.roundedRect(bx,ry,bw,22,4,4,'F');
        setC(C.red,'fill'); doc.rect(bx,ry,bw,1.2,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(7);setC(C.red,'text');
        doc.text('RISQUES IDENTIFIES',bx+8,ry+9);
        doc.setFont('helvetica','normal');doc.setFontSize(8);setC(C.txt,'text');
        var rLabels=PS.risques.map(function(id){var r=RISQUES.find(function(x){return x.id===id;});return r?r.label:id;});
        var rText = doc.splitTextToSize(rLabels.join('  |  '),bw-16);
        doc.text(rText,bx+8,ry+16);

        [PS.etapes.length+'','ETAPES',C.rescue],
        [PS.nbIntervenants+'','INTERVENANTS',C.gold],
        [Object.keys(PS.equipChecked).filter(function(k){return PS.equipChecked[k];}).length+'','EQUIPEMENTS',C.green]
      ];
      metrics.forEach(function(m,i){

          setC(C.bg3,'fill'); doc.roundedRect(ml,y-3,cw,8,2,2,'F');
          setC(C.rescue,'fill'); doc.rect(ml,y-3,2,8,'F');
          doc.setFont('helvetica','bold');doc.setFontSize(9);setC(C.rescue,'text');
          doc.text(line,ml+6,y+1.5);
          y+=9;
        }else{
          setC(C.green,'fill');doc.circle(ml+3,y+0.5,1,'F');
          doc.setFont('helvetica','normal');doc.setFontSize(8);setC(C.txt,'text');
          doc.text(line,ml+8,y+1);
          y+=5;
        }
      });

      // ── COMMUNICATION ──
      y=checkY(y,30);y+=4;
      y = sectionBar(y,'PROTOCOLE DE COMMUNICATION',C.blue);

      // Comm in a dark card
      setC(C.bg2,'fill');
      var commLines = PS.communication.split('\n').filter(function(l){return l.trim();});
      var commH = commLines.length * 6 + 10;
      doc.roundedRect(ml,y,cw,commH,3,3,'F');
      setC(C.blue,'draw');doc.setLineWidth(0.15);doc.roundedRect(ml,y,cw,commH,3,3,'S');
      var cy=y+7;
      commLines.forEach(function(line){
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);setC(C.txtLight,'text');
        doc.text('> '+line.trim(),ml+6,cy);
        cy+=6;
      });
      y+=commH+6;

      // ══════════════════════════════════════════════
      //  PAGE 3 — EQUIPEMENTS + INTERVENANTS
      // ══════════════════════════════════════════════
      y=newPage('EQUIPEMENTS');

      y = sectionBar(y,'EQUIPEMENTS ADAPTES',C.green);

      var equipBody=[];
      var equipTotal=0;
      EQUIP_DEFS.forEach(function(eq){
        if(!PS.equipChecked[eq.id])return;
        var count=0;
        if(typeof ITEMS!=='undefined'){
          ITEMS.forEach(function(item){
            if(eq.searchId){for(var i=0;i<eq.searchId.length;i++){if(item.id.indexOf(eq.searchId[i])===0){count++;return;}}}
            if(eq.searchCat){for(var i=0;i<eq.searchCat.length;i++){if((item.cat||'').indexOf(eq.searchCat[i])!==-1||(item.name||'').indexOf(eq.searchCat[i])!==-1){count++;return;}}}
          });
        }
        equipTotal+=count;
        var status=count>0?'EN STOCK':'A VERIFIER';
        equipBody.push([eq.name,count>0?''+count:'—',status]);
      });

      doc.autoTable({
        startY:y,margin:{left:ml,right:mr},
        head:[['Equipement','Inventaire','Statut']],
        body:equipBody,
        theme:'plain',
        headStyles:{fillColor:C.bg2,textColor:C.gold,fontStyle:'bold',fontSize:7.5,lineColor:C.line,lineWidth:0.2},
        styles:{fontSize:8,cellPadding:3,textColor:C.txt,fillColor:C.bg},
        alternateRowStyles:{fillColor:C.bg2},
        columnStyles:{
          0:{cellWidth:100},
          1:{halign:'center',cellWidth:28,fontStyle:'bold'},
          2:{halign:'center',cellWidth:32}
        },
        didParseCell:function(data){
          if(data.section==='body'&&data.column.index===2){
            var val=data.cell.raw;
            if(val==='EN STOCK'){data.cell.styles.textColor=C.green;data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=C.red;data.cell.styles.fontStyle='bold';}
          }
          if(data.section==='body'&&data.column.index===1){
            var cnt=parseInt(data.cell.raw);
            if(cnt>0)data.cell.styles.textColor=C.green;
            else data.cell.styles.textColor=C.muted;
          }
        },
        didDrawCell:function(data){
          if(data.section==='head'){
            setC(C.gold,'fill');
            doc.rect(data.cell.x,data.cell.y+data.cell.height-0.3,data.cell.width,0.3,'F');
          }
        }
      });
      y=doc.lastAutoTable.finalY+8;

      // Intervenants hero card
      y=checkY(y,28);
      setC(C.bg2,'fill'); doc.roundedRect(ml,y,cw,24,4,4,'F');
      setC(C.rescue,'fill'); doc.rect(ml,y,cw,1.5,'F');
      setC(C.rescue,'draw'); doc.setLineWidth(0.2); doc.roundedRect(ml,y,cw,24,4,4,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(22);setC(C.rescue,'text');
      doc.text(''+PS.nbIntervenants,ml+14,y+16,{align:'center'});
      doc.setFont('helvetica','bold');doc.setFontSize(10);setC(C.txtLight,'text');
      doc.text('INTERVENANTS REQUIS (minimum)',ml+26,y+14);
      doc.setFont('helvetica','normal');doc.setFontSize(7);setC(C.muted,'text');
      doc.text('En vertu de la R.S.S.T. art. 309 pour categorie '+PS.categorie,ml+26,y+20);
      y+=30;

      // Stats summary card
      y=checkY(y,22);
      var statW=(cw-6)/3;
      var stats=[
        [equipBody.length+'','Equipements',C.green],
        [equipTotal+'','En inventaire',C.gold],
        [PS.risques.length+'','Risques',C.red]
      ];
      stats.forEach(function(s,i){
        var sx=ml+i*(statW+3);
        setC(C.bg2,'fill'); doc.roundedRect(sx,y,statW,18,3,3,'F');
        setC(s[2],'draw'); doc.setLineWidth(0.15); doc.roundedRect(sx,y,statW,18,3,3,'S');
        doc.setFont('helvetica','bold');doc.setFontSize(14);setC(s[2],'text');
        doc.text(s[0],sx+statW/2,y+10,{align:'center'});
        doc.setFont('helvetica','normal');doc.setFontSize(5.5);setC(C.muted,'text');
        doc.text(s[1],sx+statW/2,y+15,{align:'center'});
      });
      y+=24;

      // ══════════════════════════════════════════════
      //  PAGE 4 — AI + NOTES + SIGNATURES
      // ══════════════════════════════════════════════

      // AI notes if available
      if(PS.aiResult){
        if(PS.aiResult.notes_securite&&PS.aiResult.notes_securite.length>0){
          y=checkY(y,30);
          y = sectionBar(y,'NOTES DE SECURITE — EAGLE SST M',C.gold);
          setC(C.bg2,'fill');
          var aiH=PS.aiResult.notes_securite.length*6+8;
          doc.roundedRect(ml,y,cw,aiH,3,3,'F');
          setC(C.gold,'draw');doc.setLineWidth(0.15);doc.roundedRect(ml,y,cw,aiH,3,3,'S');
          var ay=y+6;
          PS.aiResult.notes_securite.forEach(function(n){
            ay=checkY(ay,6);
            setC([243,156,18],'fill');doc.circle(ml+5,ay,1.2,'F');
            doc.setFont('helvetica','normal');doc.setFontSize(8);setC(C.txt,'text');
            var nl=doc.splitTextToSize(n,cw-14);
            doc.text(nl,ml+9,ay+1);
            ay+=nl.length*4+3;
          });
          y=ay+4;
        }
        if(PS.aiResult.conditions_arret&&PS.aiResult.conditions_arret.length>0){
          y=checkY(y,24);
          y = sectionBar(y,'CONDITIONS D\'ARRET',C.red);
          PS.aiResult.conditions_arret.forEach(function(c){
            y=checkY(y,7);
            setC(C.bg3,'fill');doc.roundedRect(ml,y-2,cw,7,2,2,'F');
            setC(C.red,'fill');doc.rect(ml,y-2,2,7,'F');
            doc.setFont('helvetica','bold');doc.setFontSize(8);setC(C.red,'text');
            doc.text('STOP — '+c,ml+6,y+2);
            y+=9;
          });
          y+=4;
        }
      }

      // Notes
      if(PS.notes){
        y=checkY(y,24);
        y = sectionBar(y,'NOTES ET OBSERVATIONS',C.gold);
        setC(C.bg2,'fill');
        var noteLines=doc.splitTextToSize(PS.notes,cw-12);
        var noteH=noteLines.length*4+10;
        doc.roundedRect(ml,y,cw,noteH,3,3,'F');
        doc.setFont('helvetica','normal');doc.setFontSize(8);setC(C.txt,'text');
        doc.text(noteLines,ml+6,y+7);
        y+=noteH+6;
      }

      // ── SIGNATURES ──
      y=checkY(y,60);
      y = sectionBar(y,'SIGNATURES',C.gold);

      var sigW=(cw-8)/2;
      var sigs=[
        ['Responsable SST','Nom, date et signature'],
        ['Chef d\'equipe','Nom, date et signature'],
        ['Superviseur','Nom, date et signature'],
        ['Direction','Nom, date et signature']
      ];
      for(var si=0;si<sigs.length;si+=2){
        y=checkY(y,28);
        for(var sj=0;sj<2&&(si+sj)<sigs.length;sj++){
          var sx=ml+sj*(sigW+8);
          setC(C.bg2,'fill');doc.roundedRect(sx,y,sigW,24,3,3,'F');
          doc.setFont('helvetica','bold');doc.setFontSize(7);setC(C.gold,'text');
          doc.text(sigs[si+sj][0],sx+4,y+6);
          // Signature line
          setC(C.line,'draw');doc.setLineWidth(0.3);doc.line(sx+4,y+16,sx+sigW-4,y+16);
          doc.setFont('helvetica','normal');doc.setFontSize(5.5);setC(C.muted,'text');
          doc.text(sigs[si+sj][1],sx+4,y+20.5);
        }
        y+=28;
      }

      // Watermark king logo on every content page — gold tinted circle
      var pCount=doc.getNumberOfPages();
      for(var wp=2;wp<=pCount;wp++){
        doc.setPage(wp);
        try{
          if(typeof KING_LOGO_B64!=='undefined'){
            // Faint gold ring around watermark
            doc.setGState(new doc.GState({opacity:0.02}));
            setC(C.gold,'draw');doc.setLineWidth(0.5);doc.circle(pw/2,ph/2,32,'S');
            doc.setGState(new doc.GState({opacity:0.025}));
            doc.addImage(KING_LOGO_B64,'JPEG',pw/2-30,ph/2-30,60,60);
            doc.setGState(new doc.GState({opacity:1}));
          }
        }catch(e){}
      }

      // Save
      var filename='PLAN-SAUVETAGE-'+(PS.nomEspace||PS.template).replace(/[^a-zA-Z0-9]/g,'-').substring(0,30)+'-'+new Date().toISOString().slice(0,10)+'.pdf';
      doc.save(filename);
      showToast('PDF genere : '+filename,'ok');
    }catch(e){
      console.error('[PDF]',e);
      showToast('Erreur PDF : '+e.message,'err');
    }
  },100);
}
</script>
</body>
</html>
