async function analyzeWithClaude(parsed){
  const container = document.getElementById('eagleRecommendations');
  if(!container || (!PT_CONFIG.CLAUDE_PROXY && !PT_CONFIG.CLAUDE_API_KEY)) {
    if(container) container.innerHTML = `<h4 style="color:var(--blue)">RECOMMANDATIONS EAGLE SST</h4><div style="color:var(--muted);font-size:11px;padding:8px">Proxy API requis pour l'analyse Eagle SST</div>`;
    return;
  }
  
  try {
    const data = await callClaude(
      [{role:'user', content: `Analyse ce plan de travail en sauvetage:\n\n${JSON.stringify(parsed, null, 2)}`}],
      { max_tokens: 2000, system: VOLO_SST_PROMPT }
    );
    const raw = extractClaudeText(data);
    const clean = raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const analysis = JSON.parse(clean);
    
    // Render recommendations
    const scoreColor = analysis.score >= 80 ? 'var(--green)' : analysis.score >= 60 ? 'var(--orange)' : 'var(--red)';
    const verdictColor = analysis.verdict === 'BON' ? 'var(--green)' : analysis.verdict === 'ATTENTION' ? 'var(--red)' : 'var(--orange)';
    
    container.innerHTML = `
      <h4 style="color:var(--blue)">RECOMMANDATIONS EAGLE SST</h4>
      
      <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px;padding:10px;background:rgba(28,16,18,.5);border-radius:8px">
        <div>
          <span style="font-family:Oswald;font-size:28px;color:${scoreColor}">${analysis.score}</span>
          <span style="font-size:11px;color:var(--muted)">/100</span>
        </div>
        <div style="font-family:Oswald;font-size:14px;letter-spacing:2px;color:${verdictColor};padding:4px 12px;border:1px solid ${verdictColor};border-radius:6px">
          ${analysis.verdict}
        </div>
      </div>
      
      ${(analysis.critiques||[]).length?`
        <div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px">CRITIQUES</div>
          ${analysis.critiques.map(c=>`
            <div style="padding:6px 10px;margin:3px 0;background:rgba(192,57,43,.08);border-left:3px solid var(--red);border-radius:0 6px 6px 0;font-size:11px">${esc(c)}</div>
          `).join('')}
        </div>
      `:''}
      
      ${(analysis.avertissements||[]).length?`
        <div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--orange);margin-bottom:4px">AVERTISSEMENTS</div>
          ${analysis.avertissements.map(a=>`
            <div style="padding:6px 10px;margin:3px 0;background:rgba(230,126,34,.06);border-left:3px solid var(--orange);border-radius:0 6px 6px 0;font-size:11px">${esc(a)}</div>
          `).join('')}
        </div>
      `:''}
      
      ${(analysis.suggestions||[]).length?`
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px">SUGGESTIONS</div>
          ${analysis.suggestions.map(s=>`
            <div style="padding:6px 10px;margin:3px 0;background:rgba(39,174,96,.06);border-left:3px solid var(--green);border-radius:0 6px 6px 0;font-size:11px">${esc(s)}</div>
          `).join('')}
        </div>
      `:''}
    `;
    
  } catch(e){
    console.error('Safety analysis error:', e);
    container.innerHTML = `
      <h4 style="color:var(--blue)">RECOMMANDATIONS EAGLE SST</h4>
      <div style="color:var(--muted);font-size:11px;padding:8px">Analyse non disponible — ${esc(e.message)}</div>
    `;
  }
}

function applyParsedToPlan(parsed){
  // Apply structured data to plan
  if(parsed.cie) plan.cie = parsed.cie;
  if(parsed.installationType?.length) plan.installationType = parsed.installationType;
  if(parsed.responsable) plan.responsable = parsed.responsable;
  if(parsed.responsableId) plan.responsableId = parsed.responsableId;
  
  // Équipe — map to POSTES structure
  if(parsed.equipe?.length){
    const mapped = POSTES.map(p => ({poste:p.desc, nom:'', id:''}));
    parsed.equipe.forEach((e,i) => {
      if(i < mapped.length){
        mapped[i].nom = e.nom || '';
        mapped[i].id = e.id || '';
        if(e.poste) mapped[i].poste = e.poste;
      }
    });
    plan.equipe = mapped;
  }
  
  // Zones
  if(parsed.zonesRisque?.length){
    plan.zonesRisque = parsed.zonesRisque.map(z => ({
      lieu: z.lieu||'', type: z.type||'', preventif: z.preventif||[], customPrev: z.customPrev||[], autre: z.autre||''
    }));
  }
  if(parsed.zonesChute?.length){
    plan.zonesChute = parsed.zonesChute.map(z => ({
      lieu: z.lieu||'', type: z.type||'', preventif: z.preventif||[], customPrev: z.customPrev||[], autre: z.autre||''
    }));
  }
  
  // EPI, Permis, Équipements — match against known lists
  if(parsed.epi?.length){
    plan.epi = parsed.epi.filter(e => EPI_LIST.includes(e));
    plan.epiCustom = parsed.epi.filter(e => !EPI_LIST.includes(e));
    if(parsed.epiCustom?.length) plan.epiCustom = [...plan.epiCustom, ...parsed.epiCustom];
  }
  if(parsed.permis?.length){
    plan.permis = parsed.permis.filter(e => PERMIS_LIST.includes(e));
    plan.permisCustom = parsed.permis.filter(e => !PERMIS_LIST.includes(e));
    if(parsed.permisCustom?.length) plan.permisCustom = [...plan.permisCustom, ...parsed.permisCustom];
  }
  if(parsed.equipements?.length){
    plan.equipements = parsed.equipements.filter(e => EQUIP_LIST.includes(e));
    plan.equipementsCustom = parsed.equipements.filter(e => !EQUIP_LIST.includes(e));
    if(parsed.equipementsCustom?.length) plan.equipementsCustom = [...plan.equipementsCustom, ...parsed.equipementsCustom];
  }
  
  // Analyse de risque
  if(parsed.dangers) plan.dangers = parsed.dangers;
  if(parsed.mesuresRisques) plan.mesuresRisques = parsed.mesuresRisques;
  if(parsed.meteo){
    plan.meteo.conditions = parsed.meteo.conditions || [];
    plan.meteo.temperature = parsed.meteo.temperature || '';
  }
  if(parsed.travauxAdj) plan.travauxAdj = {...plan.travauxAdj, ...parsed.travauxAdj};
  if(parsed.securiteAncrages) plan.securiteAncrages = {...plan.securiteAncrages, ...parsed.securiteAncrages};
  if(parsed.securitePublic) plan.securitePublic = {...plan.securitePublic, ...parsed.securitePublic};
  if(parsed.cadenassage) plan.cadenassage = parsed.cadenassage;
  if(parsed.matieresInstables) plan.matieresInstables = {...plan.matieresInstables, ...parsed.matieresInstables};
  if(parsed.tempsEstime) plan.tempsEstime = {...plan.tempsEstime, ...parsed.tempsEstime};
  
  // Plan de sauvetage
  if(parsed.endroitsSauvetage) plan.endroitsSauvetage = parsed.endroitsSauvetage;
  if(typeof parsed.debrayable === 'boolean') plan.debrayable = parsed.debrayable;
  if(parsed.procedures) plan.procedures = parsed.procedures;
  if(parsed.communication?.length) plan.communication = parsed.communication;
  
  // Close overlay and go to recap (step 6)
  closeDicteeMode();
  plan.step = 6;
  render();
  showToast(' Plan structuré — vérifiez le récapitulatif','ok');
}

function applyRawDictee(){
  // Fallback: apply raw text to text fields without Claude structuring
  const t = dicteeState.transcripts;
  if(t.site_mission) plan.cie = t.site_mission;
  if(t.type_install){
    const txt = t.type_install.toLowerCase();
    if(txt.includes('vertical') && txt.includes('horizontal')) plan.installationType = ['HORIZONTALE','VERTICALE'];
    else if(txt.includes('vertical')) plan.installationType = ['VERTICALE'];
    else plan.installationType = ['HORIZONTALE'];
  }
  if(t.dangers){
    const parts = t.dangers.split(/mesure|contrôle|on met|on fait/i);
    plan.dangers = (parts[0]||'').trim();
    if(parts[1]) plan.mesuresRisques = parts[1].trim();
  }
  if(t.sauvetage){
    plan.endroitsSauvetage = t.sauvetage;
    if(t.sauvetage.toLowerCase().includes('débrayable')) plan.debrayable = true;
  }
  
  closeDicteeMode();
  plan.step = 1; // Go to step 1 for manual review
  render();
  showToast(' Texte brut appliqué — complétez manuellement','err');
}

// ===== STORAGE =====
function getPlans(){
  try {
    return JSON.parse(localStorage.getItem(PT_CONFIG.LS_KEY)||'[]');
  } catch{ return []; }
}

function savePlan(){
  const plans = getPlans();
  // Check if revision of existing plan
  const existingIdx = plans.findIndex(p=>p.date===plan.date && p.cie===plan.cie && p.responsableId===plan.responsableId);
  const planCopy = JSON.parse(JSON.stringify(plan));
  delete planCopy.step;
  
  if(existingIdx>=0){
    plans[existingIdx] = planCopy;
  } else {
    plans.unshift(planCopy);
  }
  
  // FIFO max 100
  while(plans.length>PT_CONFIG.MAX_PLANS) plans.pop();
  localStorage.setItem(PT_CONFIG.LS_KEY, JSON.stringify(plans));
}

    mesures_risques: plan.mesuresRisques,

    securite_ancrages: plan.securiteAncrages.active ? {risques:[...plan.securiteAncrages.risques,...(plan.securiteAncrages.customRisques||[])], controle:plan.securiteAncrages.comment} : 'N/A',
    securite_public: plan.securitePublic.active ? {quoi:plan.securitePublic.quoi, controle:plan.securitePublic.controle} : 'N/A',
    cadenassage: plan.cadenassage||'N/A',
    matieres_instables: plan.matieresInstables.active ? {quoi:plan.matieresInstables.quoi, controle:plan.matieresInstables.controle} : 'N/A',
    temps_estime: plan.tempsEstime,

      endroits: plan.endroitsSauvetage,
      debrayable: plan.debrayable?'OUI':'NON',
      procedures: plan.procedures
    },
    communication: plan.communication,
    signe_par: plan.signePar,
    signe_par_id: plan.signeParId,
    timestamp: plan.timestamp,
    revisions: plan.revisions,
    rempli_par: currentUser?currentUser.name:'Inconnu',
    rempli_par_id: currentUser?currentUser.id:''
  };
  
  try {
    const r = await fetchWH(PT_CONFIG.WEBHOOK, payload);
    if(r.ok) { /* webhook sent */ }
    else console.error('Webhook error:', r.status);
  } catch(e){
    console.error('Webhook network error:', e);
    _queuePayload(payload);
  }
}

// Flush offline queue
window.addEventListener('online', async ()=>{
  try {
    const q = JSON.parse(localStorage.getItem('volo_pt_queue')||'[]');
    if(!q.length) return;
    const fail = [];
    for(const payload of q){
      try { const r = await fetchWH(PT_CONFIG.WEBHOOK, payload); if(!r.ok) fail.push(payload); }
      catch{ fail.push(payload); }
    }
    if(fail.length) localStorage.setItem('volo_pt_queue', JSON.stringify(fail));
    else localStorage.removeItem('volo_pt_queue');
    showToast(' '+(q.length-fail.length)+' plan(s) envoyé(s)','ok');
  } catch(e){}
});

async function launchStepAssist(stepNum){
  const btn = document.getElementById('eagleBtn'+stepNum);
  const container = document.getElementById('eagleAssist'+stepNum);
  if(!container) return;
  if(btn){ btn.disabled=true; btn.innerHTML='<span style="font-size:14px">GE</span> Analyse en cours...'; }
  
  container.innerHTML = `<div style="padding:10px;text-align:center;border:1px solid rgba(59,130,246,.2);border-radius:10px;margin-top:4px">
    <div class="spinner" style="width:20px;height:20px;border:2px solid var(--border);border-top:2px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 6px"></div>
    <div style="font-size:10px;color:var(--muted)">Eagle analyse l'étape...</div>
  </div>`;

  try{
    const promptFn = EAGLE_STEP_PROMPTS[stepNum];
    if(!promptFn) return;
    const prompt = promptFn(plan);
    const data = await callClaude([{role:'user',content:prompt}],{max_tokens:1200,system:VOLO_SST_PROMPT});
    const raw = extractClaudeText(data);
    const clean = raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const result = JSON.parse(clean);
    renderStepAssistResultV2(container, result.suggestions||[], stepNum);
  } catch(e){
    container.innerHTML = `<div style="padding:8px 12px;border:1px solid rgba(201,168,76,.3);border-radius:8px;font-size:10px;color:var(--gold)">Eagle indisponible: ${e.message}</div>`;
  } finally {
    if(btn){ btn.disabled=false; btn.innerHTML='<span style="font-size:16px">GE</span> EAGLE SST — ACTUALISER SUGGESTIONS'; }
  }
}

function renderStepAssistResult(container, suggestions, stepNum){
  renderStepAssistResultV2(container, suggestions, stepNum);
}

// Apply by index (safe — no JSON in onclick)
function eagleRecapApply(idx){
  const item = window._eagleItems[idx];
  if(!item) return;
  eagleAppendToField(item.texte, item.champ);
}

function eagleRecapEdit(idx){
  const item = window._eagleItems[idx];
  if(!item) return;
  eagleOpenSuggestionEditor(item.texte, item.champ);
}

function eagleRecapApplyGroup(champ){
  (window._eagleItems||[]).filter(i=>i.champ===champ).forEach(i=>eagleAppendToField(i.texte, i.champ));
  showToast(' Appliqué à '+champ,'ok');
}

function eagleRecapApplyAll(){
  (window._eagleItems||[]).forEach(i=>eagleAppendToField(i.texte, i.champ));
  showToast(' Toutes les suggestions appliquées!','ok');
}

// Core: append text to a plan field
function eagleAppendToField(text, champ){
  if(!text||!champ) return;
  if(['zonesRisque','zonesChute'].includes(champ)){
    plan[champ].push({lieu:text,type:'',preventif:[],customPrev:[],autre:''});
    render(true); return;
  }
  if(['epiCustom','permisCustom','equipementsCustom'].includes(champ)){
    if(!plan[champ]) plan[champ]=[];
    if(!plan[champ].includes(text)) plan[champ].push(text);
    render(true); return;
  }
  // Text fields: append
  const cur = plan[champ]||'';
  if(cur.includes(text.slice(0,25))) { showToast('Déjà présent','ok'); return; }
  plan[champ] = cur + (cur.trim()?'\n':'') + text;
  const el = document.getElementById('field_'+champ);
  if(el) el.value = plan[champ];
  showToast(' Ajouté','ok');
}

// === Drawer pour modifier une SUGGESTION avant injection ===
function eagleOpenSuggestionEditor(text, champ){
  const labels = {dangers:'Dangers identifiés',mesuresRisques:'Mesures de contrôle',procedures:'Procédures',endroitsSauvetage:'Endroits sauvetage',epiCustom:'EPI',permisCustom:'Permis',equipementsCustom:'Équipements'};
  _eagleDrawer(text, labels[champ]||champ, (edited)=>{ eagleAppendToField(edited, champ); });
}

// === Drawer pour ÉDITER un champ existant directement ===
function eagleOpenFieldEditor(champ){
  const labels = {dangers:'Dangers identifiés',mesuresRisques:'Mesures de contrôle',procedures:'Procédures de sauvetage',endroitsSauvetage:'Endroits de sauvetage',cadenassage:'Cadenassage'};
  const current = plan[champ]||'';
  _eagleDrawer(current, '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg> '+(labels[champ]||champ), (edited)=>{
    plan[champ] = edited;

    if(el) el.value = edited;
    showToast(' Champ mis à jour','ok');
  });
}

        <button onclick="document.getElementById('eagleEditOverlay').remove()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px">X</button>
      </div>
      <textarea id="eagleDrawerTA" style="width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);padding:12px;font-size:12px;min-height:110px;font-family:inherit;resize:vertical;line-height:1.5">${escHtml(initialText)}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button onclick="document.getElementById('eagleEditOverlay').remove()" style="flex:1;padding:13px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:Oswald;font-size:12px;cursor:pointer">ANNULER</button>
        <button id="eagleDrawerConfirm" style="flex:2;padding:13px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-family:Oswald;font-size:13px;letter-spacing:1.5px;cursor:pointer">APPLIQUER AU PLAN</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // Attach confirm handler (closure — safe)
  document.getElementById('eagleDrawerConfirm').onclick = () => {
    const val = document.getElementById('eagleDrawerTA')?.value?.trim();
    if(!val){ showToast('Texte vide','err'); return; }
    onConfirm(val);
    overlay.remove();
  };
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  setTimeout(()=>{ const ta=document.getElementById('eagleDrawerTA'); if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length); } }, 80);
}

// Fix renderStepAssistResult to also use index approach
function renderStepAssistResultV2(container, suggestions, stepNum){
  if(!suggestions.length){
    container.innerHTML = `<div style="padding:10px 14px;border:1px solid rgba(39,174,96,.3);border-radius:10px;background:rgba(39,174,96,.05);font-size:11px;color:var(--green);text-align:center;margin-top:4px">Étape complète — Aucun oubli détecté par Eagle SST</div>`;
    return;
  }
  eagleStoreItems(suggestions);
  const chipBg = {critique:'rgba(192,57,43,.08)',recommande:'rgba(39,174,96,.07)',default:'rgba(59,130,246,.07)'};
  const chipBorder = {critique:'var(--red)',recommande:'var(--green)',default:'var(--blue)'};
  const chipIcon = {critique:'!',recommande:'*',default:'*'};

  const chips = suggestions.map((s,i) => {
    const bg = chipBg[s.priorite]||chipBg.default;
    const border = chipBorder[s.priorite]||chipBorder.default;
    const icon = chipIcon[s.priorite]||chipIcon.default;
    return `<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:${bg};border:1px solid ${border};border-radius:9px;margin-bottom:5px">
      <span style="font-size:13px;flex-shrink:0;margin-top:1px">${icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:10.5px;color:var(--txt);margin-bottom:4px;line-height:1.4">${escHtml(s.texte||s.label||'')}</div>
        <div style="font-size:9px;color:var(--muted);margin-bottom:5px">${s.label||''} ${s.scenario?'• '+s.scenario:''}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button onclick="eagleStepApply(${i})" style="padding:4px 10px;background:${border};border:none;border-radius:6px;color:#fff;font-size:9px;font-family:Oswald;letter-spacing:1px;cursor:pointer">APPLIQUER</button>
          <button onclick="eagleStepEdit(${i})" style="padding:4px 10px;background:none;border:1px solid ${border};border-radius:6px;color:${border};font-size:9px;font-family:Oswald;letter-spacing:1px;cursor:pointer">MODIFIER</button>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div style="border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:12px;margin-top:4px;background:rgba(59,130,246,.03)">
    <div style="font-family:Oswald;font-size:11px;color:var(--blue);letter-spacing:1.5px;margin-bottom:8px">SUGGESTIONS EAGLE SST — ÉTAPE ${stepNum}</div>
    ${chips}
    <button onclick="eagleStepApplyAll()" style="width:100%;margin-top:6px;padding:8px;background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(39,174,96,.1));border:1.5px solid var(--blue);border-radius:8px;color:var(--blue);font-size:10px;font-family:Oswald;letter-spacing:1.5px;cursor:pointer">TOUT APPLIQUER (${suggestions.length})</button>
  </div>`;
}

function eagleStepApply(idx){
  const item = window._eagleItems[idx];
  if(!item) return;
  eagleInjectDirect(item.texte, item.champ||'', item.preventif||[], item.type||'');
}
function eagleStepEdit(idx){
  const item = window._eagleItems[idx];
  if(!item) return;
  eagleOpenSuggestionEditor(item.texte, item.champ||'');
}
function eagleStepApplyAll(){
  (window._eagleItems||[]).forEach(i=>eagleInjectDirect(i.texte, i.champ||'', i.preventif||[], i.type||''));
  showToast(' Toutes les suggestions appliquées!','ok');
}

function eagleInjectDirect(text, champ, preventif, type){
  if(champ==='zonesRisque'){
    plan.zonesRisque.push({lieu:text,type:type||'',preventif:preventif||[],customPrev:[],autre:''});
    showToast(' Zone de danger ajoutée','ok'); render(true); return;
  }
  if(champ==='zonesChute'){
    plan.zonesChute.push({lieu:text,type:type||'',preventif:preventif||[],customPrev:[],autre:''});
    showToast(' Zone de chute ajoutée','ok'); render(true); return;
  }
  if(['epiCustom','permisCustom','equipementsCustom'].includes(champ)){
    if(!plan[champ]) plan[champ]=[];
    if(!plan[champ].includes(text)){ plan[champ].push(text); }
    showToast(' Ajouté à la liste','ok'); render(true); return;
  }
  if(['dangers','mesuresRisques','procedures','endroitsSauvetage'].includes(champ)){
    const cur = plan[champ]||'';
    if(!cur.includes(text.slice(0,20))){
      plan[champ] = cur + (cur.trim()?'\n':'') + text;
    }
    const el = document.getElementById('field_'+champ);
    if(el) el.value = plan[champ];
    showToast(' Ajouté au champ','ok'); return;
  }
}

// Appliquer toutes les suggestions d'un step
function eagleApplyAll(suggestions){
  suggestions.forEach(s => eagleInjectDirect(s.texte, s.champ||'', s.preventif||[], s.type||''));
  showToast(' Toutes les suggestions appliquées!','ok');
}

// Ouvrir l'éditeur de suggestion
function eagleEditOpen(text, champ, preventif, type){
  const overlay = document.createElement('div');
  overlay.id = 'eagleEditOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  
  const champLabels = {
    zonesRisque:'Zone de danger', zonesChute:'Zone de chute',
    epiCustom:'EPI', permisCustom:'Permis', equipementsCustom:'Équipement technique',
    dangers:'Dangers identifiés', mesuresRisques:'Mesures de contrôle',
    procedures:'Procédures de sauvetage', endroitsSauvetage:'Endroits de sauvetage'
  };
  const label = champLabels[champ] || champ;

  overlay.innerHTML = `<div style="background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;border-top:2px solid var(--blue)">
    <div style="font-family:Oswald;font-size:13px;color:var(--blue);letter-spacing:1.5px;margin-bottom:4px">MODIFIER LA SUGGESTION</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:12px">→ Sera injecté dans : <strong>${label}</strong></div>
    <textarea id="eagleEditTA" style="width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:12px;min-height:90px;font-family:inherit;resize:vertical">${text}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="document.getElementById('eagleEditOverlay').remove()" 
        style="flex:1;padding:12px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:Oswald;font-size:12px;cursor:pointer">ANNULER</button>
      <button onclick="eagleEditConfirm('${champ}',${JSON.stringify(preventif||[])},${JSON.stringify(type||'')})"
        style="flex:2;padding:12px;background:var(--blue);border:none;border-radius:8px;color:#fff;font-family:Oswald;font-size:13px;letter-spacing:1.5px;cursor:pointer">INJECTER DANS LE PLAN</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  setTimeout(()=>{ const ta=document.getElementById('eagleEditTA'); if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);} }, 100);
}

function eagleEditConfirm(champ, preventif, type){
  const ta = document.getElementById('eagleEditTA');
  if(!ta) return;
  const text = ta.value.trim();
  if(!text){ showToast('Texte vide','err'); return; }
  eagleInjectDirect(text, champ, preventif, type);
  document.getElementById('eagleEditOverlay').remove();
}

function eagleInject(text, field){
  if(!text) return;
  const cur = plan[field] || '';
  const sep = cur.trim() ? '\n' : '';
  // Check if already added
  if(cur.includes(text.slice(0,30))){ showToast('Déjà présent dans le champ','ok'); return; }
  plan[field] = cur + sep + text;
  // Update textarea if visible on screen
  const el = document.getElementById('field_'+field);
  if(el){ el.value = plan[field]; }
  showToast(' Ajouté à '+field,'ok');
}

function eagleInjectAll(items, field){
  if(!items||!items.length) return;
  items.forEach(item => {
    const cur = plan[field] || '';
    if(!cur.includes(item.slice(0,20))){
      const sep = plan[field].trim() ? '\n' : '';
      plan[field] = plan[field] + sep + item;
    }
  });
  const el = document.getElementById('field_'+field);
  if(el){ el.value = plan[field]; }
}

function playEagle(){
  try{ document.getElementById('eagleAudio').play(); }catch(e){}
}

function escQuote(str){ return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function showToast(msg, type){
  const t = document.createElement('div');
  t.className = 'toast toast-'+(type||'ok');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3000);
}
</script>
