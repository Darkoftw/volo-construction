function renderRecap(){
  const regions=getRegions();
  let regionOpts='<option value="ALL">Toutes les régions</option>';
  regions.forEach(r=>{regionOpts+=`<option value="${r}"${recapRegion===r?' selected':''}>${r}</option>`;});

  let html=`<div style="text-align:center;margin-bottom:10px">
    <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold)">📊 RÉCAP DISPONIBILITÉS</div>
    <div style="font-size:11px;color:var(--muted);margin-top:3px">🦅 ${getSauvs().length} sauveteurs &nbsp;·&nbsp; 🦺 ${getSurvs().length} surveillants</div>
  </div>
  <div class="recap-controls">
    <select class="finput" style="margin-bottom:0;flex:1;padding:7px 10px;font-size:11px" onchange="recapRegion=this.value;render()">${regionOpts}</select>
    <select class="finput" style="margin-bottom:0;width:95px;padding:7px 10px;font-size:11px" onchange="recapDays=parseInt(this.value);render()">
      <option value="7"${recapDays===7?' selected':''}>7 jours</option>
      <option value="14"${recapDays===14?' selected':''}>14 jours</option>
      <option value="21"${recapDays===21?' selected':''}>21 jours</option>
      <option value="30"${recapDays===30?' selected':''}>30 jours</option>
    </select>
  </div>`;

  const days=[];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<recapDays;i++){const d=new Date(today);d.setDate(today.getDate()+i);days.push(d);}
  const todayKey=tsKey(new Date());
  const shortName=n=>{const p=n.trim().split(' ');return p[0]+(p.length>1?' '+p[p.length-1][0]+'.':'');};

  const renderMatrix=(people,label,icon)=>{
    if(!people.length)return '';
    const isSauv=icon==='🦅';
    const isOpen=isSauv?recapSauvOpen:recapSurvOpen;
    const toggleFn=isSauv?'recapSauvOpen=!recapSauvOpen':'recapSurvOpen=!recapSurvOpen';
    const sorted=[...people].sort((a,b)=>{
      if(isChef(a)&&!isChef(b))return -1;if(!isChef(a)&&isChef(b))return 1;
      return(a.name||'').localeCompare(b.name||'');
    });
    const dispoCount=sorted.filter(p=>days.some(d=>DISPO_LIKE(getAvail(p.id,tsKey(d))))).length;
    let h=`<div onclick="${toggleFn};render()" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:${isOpen?'var(--radius) var(--radius) 0 0':'var(--radius)'};cursor:pointer;user-select:none;margin-top:10px">
      <span style="font-size:14px">${icon}</span>
      <span style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:700">${label}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);margin-left:auto">${dispoCount}/${sorted.length}</span>
      <span style="font-size:11px;color:var(--muted);transition:transform .2s;transform:rotate(${isOpen?180:0}deg)">▼</span>
    </div>`;
    if(!isOpen) return h;
    h+=`<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th class="mth-name">NOM</th>`;
    days.forEach(d=>{
      const ds=tsKey(d),isT=ds===todayKey;
      h+=`<th class="${isT?'mth-today':''}" title="${fmtFR(ds)}">${DAYS[d.getDay()].slice(0,1)}<br><span style="font-size:8px">${d.getDate()}</span></th>`;
    });
    h+=`<th style="color:var(--gold);min-width:46px">✅<br><span style="font-size:8px">JOURS</span></th>`;
    h+=`</tr></thead><tbody>`;
    sorted.forEach(p=>{
      const chef=isChef(p);
      const joursDispos=days.filter(d=>DISPO_LIKE(getAvail(p.id,tsKey(d)))).length;
      const joursTotal=days.filter(d=>getAvail(p.id,tsKey(d))).length;
      const pct=days.length>0?Math.round((joursDispos/days.length)*100):0;
      const barColor=pct>=70?SCOLORS.DISPO:pct>=40?SCOLORS.VACANCES:pct>0?SCOLORS.INDISPO:'var(--border)';
      h+=`<tr><td class="mtd-name${chef?' mtd-chef':''}" title="${p.name} · ${p.role} · ${p.ville||''}">${chef?'⭐ ':''}${shortName(p.name)} ${renderReliabilityBadge(p.id)}</td>`;
      days.forEach(d=>{
        const ds=tsKey(d),st=getAvail(p.id,ds);
        h+=st?`<td><div class="mcell" style="background:${SCOLORS[st]}" title="${p.name} — ${st}"></div></td>`
             :`<td><div class="mcell-empty"></div></td>`;
      });
      // Colonne JOURS
      h+=`<td style="padding:2px 6px;min-width:46px">
        <div style="text-align:center">
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${barColor}">${joursDispos}j</div>
          <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:2px auto 0">
            <div style="width:${pct}%;height:100%;background:${barColor};border-radius:2px;transition:width .3s"></div>
          </div>
        </div>
      </td>`;
      h+=`</tr>`;
    });
    // Totaux ligne fin de section
    h+=`<tr style="background:rgba(0,0,0,.1)"><td class="mtd-name" style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--green)">✅ DISPOS</td>`;
    days.forEach(d=>{
      const ds=tsKey(d);
      const cnt=sorted.filter(p=>DISPO_LIKE(getAvail(p.id,ds))).length;
      const pct=sorted.length>0?cnt/sorted.length:0;
      const bg=pct>=.7?SCOLORS.DISPO:pct>=.35?SCOLORS.VACANCES:cnt>0?SCOLORS.INDISPO:'var(--border)';
      h+=`<td><div style="width:18px;height:18px;border-radius:4px;background:${bg};margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;font-family:'JetBrains Mono',monospace">${cnt||''}</div></td>`;
    });
    h+=`</tr></tbody></table></div>`;
    return h;
  };

  let sauvs=getSauvs(),survs=getSurvs();
  if(recapRegion!=='ALL'){sauvs=sauvs.filter(p=>p.region===recapRegion);survs=survs.filter(p=>p.region===recapRegion);}

  html+=renderMatrix(sauvs,'SAUVETEURS','🦅');
  html+=renderMatrix(survs,'SURVEILLANTS','🦺');

  // ── Classement top dispos ──
  const allFiltered=[...sauvs,...survs];
  if(allFiltered.length){
    const ranked=allFiltered.map(p=>({
      p,
      jours:days.filter(d=>DISPO_LIKE(getAvail(p.id,tsKey(d)))).length
    })).sort((a,b)=>b.jours-a.jours);
    const top=ranked.slice(0,10);
    const max=top[0]?.jours||1;

    html+=`<div style="margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
      <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);margin-bottom:12px">🏆 TOP DISPONIBILITÉS — ${recapDays} JOURS</div>`;
    top.forEach((r,i)=>{
      const pct=Math.round((r.jours/recapDays)*100);
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const color=pct>=70?SCOLORS.DISPO:pct>=40?SCOLORS.VACANCES:SCOLORS.INDISPO;
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:18px;text-align:right">${medal||('#'+(i+1))}</div>
        <div style="font-size:13px;font-weight:600;min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.p.name}">${r.p.name.split(' ')[0]} ${r.p.name.split(' ').slice(-1)[0]}</div>
        <div style="flex:1;background:var(--border);border-radius:3px;height:7px;overflow:hidden">
          <div style="width:${Math.round((r.jours/max)*100)}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${color};min-width:32px;text-align:right">${r.jours}j</div>
        <div style="font-size:9px;color:var(--muted);min-width:30px">${pct}%</div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="matrix-legend">
    ${STATUSES.map(s=>`<span><div class="ml-box" style="background:${SCOLORS[s]}"></div>${s}</span>`).join('')}
    <span><div class="ml-box" style="background:var(--border);border-radius:50%"></div>—</span>
  </div>
  <div style="margin-top:10px">
    <button class="btn btn-outline" style="font-size:12px;padding:10px" onclick="copyRecap()">📋 COPIER RÉCAP TEXTE</button>
    <button class="btn btn-rescue" style="font-size:12px;padding:10px;margin-top:6px" onclick="exportRecapPDF()">📄 EXPORTER PDF</button>
  </div>`;
  return html;
}

function copyRecap(){
  const days=[];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<recapDays;i++){const d=new Date(today);d.setDate(today.getDate()+i);days.push(d);}
  let sauvs=getSauvs(),survs=getSurvs();
  if(recapRegion!=='ALL'){sauvs=sauvs.filter(p=>p.region===recapRegion);survs=survs.filter(p=>p.region===recapRegion);}
  const field=[...sauvs,...survs];
  const bar=(n,total,w=10)=>{ const f=total?Math.round(n/total*w):0; return '█'.repeat(f)+'░'.repeat(w-f); };
  const pctStr=(n,t)=>t?'('+Math.round(n/t*100)+'%)':'(0%)';
  const DAY_FR=['dim','lun','mar','mer','jeu','ven','sam'];

  // Totaux globaux
  let totalDispoJours=0, totalRéponses=0;
  days.forEach(d=>{
    const ds=tsKey(d);
    totalDispoJours+=field.filter(p=>DISPO_LIKE(getAvail(p.id,ds))).length;
    totalRéponses+=field.filter(p=>getAvail(p.id,ds)).length;
  });
  const tauxRep=field.length&&days.length?Math.round(totalRéponses/(field.length*days.length)*100):0;

  const sep='━'.repeat(38);
  const sep2='─'.repeat(38);
  const lines=[];

  lines.push('╔══════════════════════════════════════╗');
  lines.push('║   📊  RÉCAP DISPONIBILITÉS VOLO SST  ║');
  lines.push('╚══════════════════════════════════════╝');
  lines.push('Généré : '+new Date().toLocaleString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}));
  lines.push('Période : '+fmtFR(tsKey(today))+' → '+fmtFR(tsKey(days[days.length-1]))+' ('+recapDays+' jours)');
  if(recapRegion!=='ALL') lines.push('Région : '+recapRegion);
  lines.push('Effectif : '+sauvs.length+' sauveteurs · '+survs.length+' surveillants · '+field.length+' total');
  lines.push('Taux de réponse global : '+tauxRep+'%  '+bar(tauxRep,100,12));
  lines.push('');

  // ── PAR JOUR ──
  lines.push(sep);
  lines.push('  CALENDRIER JOUR PAR JOUR');
  lines.push(sep);
  days.forEach(d=>{
    const ds=tsKey(d);
    const dow=DAY_FR[d.getDay()].toUpperCase();
    const dateLabel=(dow+' '+d.getDate()+' '+MONTHS[d.getMonth()]).padEnd(18);
    const dS=sauvs.filter(p=>DISPO_LIKE(getAvail(p.id,ds)));
    const dSu=survs.filter(p=>DISPO_LIKE(getAvail(p.id,ds)));
    const nS=sauvs.filter(p=>getAvail(p.id,ds)==='INDISPO').length;
    const nSu=survs.filter(p=>getAvail(p.id,ds)==='INDISPO').length;
    const noneS=sauvs.filter(p=>!getAvail(p.id,ds)).length;
    const noneSu=survs.filter(p=>!getAvail(p.id,ds)).length;
    const totalDispo=dS.length+dSu.length;
    const emoji=totalDispo===0?'🔴':totalDispo<3?'🟡':'🟢';
    lines.push('');
    lines.push(emoji+' '+dateLabel);
    lines.push('   🦅 Sauveteurs  : '+dS.length+'/'+sauvs.length+' dispos  '+bar(dS.length,sauvs.length,8)+'  ❌'+nS+'  ❓'+noneS);
    if(dS.length) lines.push('      ▸ '+dS.map(p=>p.name.split(' ')[0]).join(', '));
    lines.push('   🦺 Surveillants: '+dSu.length+'/'+survs.length+' dispos  '+bar(dSu.length,survs.length,8)+'  ❌'+nSu+'  ❓'+noneSu);
    if(dSu.length) lines.push('      ▸ '+dSu.map(p=>p.name.split(' ')[0]).join(', '));
  });
  lines.push('');

  // ── TOP DISPOS SAUVETEURS ──
  lines.push(sep);
  lines.push('  🦅 TOP SAUVETEURS — '+recapDays+'J');
  lines.push(sep);
  const rankSauvs=[...sauvs].map(p=>({p,j:days.filter(d=>DISPO_LIKE(getAvail(p.id,tsKey(d)))).length})).sort((a,b)=>b.j-a.j);
  rankSauvs.slice(0,10).forEach((r,i)=>{
    const pct=Math.round(r.j/days.length*100);
    lines.push((i+1+'').padStart(2)+'. '+r.p.name.padEnd(28)+r.j+'j '+bar(r.j,days.length,8)+' '+pct+'%');
  });
  const nonRepondSauvs=sauvs.filter(p=>days.every(d=>!getAvail(p.id,tsKey(d))));
  if(nonRepondSauvs.length){
    lines.push('');
    lines.push('   ⚠ Sans aucune réponse ('+nonRepondSauvs.length+') :');
    lines.push('   '+nonRepondSauvs.map(p=>p.name.split(' ')[0]).join(', '));
  }
  lines.push('');

  // ── TOP DISPOS SURVEILLANTS ──
  lines.push(sep);
  lines.push('  🦺 TOP SURVEILLANTS — '+recapDays+'J');
  lines.push(sep);
  const rankSurvs=[...survs].map(p=>({p,j:days.filter(d=>DISPO_LIKE(getAvail(p.id,tsKey(d)))).length})).sort((a,b)=>b.j-a.j);
  rankSurvs.slice(0,15).forEach((r,i)=>{
    const pct=Math.round(r.j/days.length*100);
    lines.push((i+1+'').padStart(2)+'. '+r.p.name.padEnd(28)+r.j+'j '+bar(r.j,days.length,8)+' '+pct+'%');
  });
  const nonRepondSurvs=survs.filter(p=>days.every(d=>!getAvail(p.id,tsKey(d))));
  if(nonRepondSurvs.length){
    lines.push('');
    lines.push('   ⚠ Sans aucune réponse ('+nonRepondSurvs.length+') :');
    // Grouper par région
    const byReg={};
    nonRepondSurvs.forEach(p=>{(byReg[p.region||'?']=byReg[p.region||'?']||[]).push(p.name.split(' ')[0]);});
    Object.entries(byReg).sort().forEach(([r,ns])=>lines.push('   '+r+': '+ns.join(', ')));
  }
  lines.push('');

  // ── PIRE JOURS / MEILLEURS JOURS ──
  lines.push(sep);
  lines.push('  📈 ANALYSE');
  lines.push(sep);
  const byDay=days.map(d=>{const ds=tsKey(d);return {d,ds,n:field.filter(p=>DISPO_LIKE(getAvail(p.id,ds))).length};});
  const sorted=[...byDay].sort((a,b)=>b.n-a.n);
  lines.push('  Meilleure journée : '+fmtFR(sorted[0].ds)+' → '+sorted[0].n+' dispos '+pctStr(sorted[0].n,field.length));
  lines.push('  Pire journée      : '+fmtFR(sorted[sorted.length-1].ds)+' → '+sorted[sorted.length-1].n+' dispos '+pctStr(sorted[sorted.length-1].n,field.length));
  const avgDispo=(byDay.reduce((s,x)=>s+x.n,0)/days.length).toFixed(1);
  lines.push('  Moyenne / jour    : '+avgDispo+' membres dispos');
  lines.push('');
  lines.push(sep);
  lines.push('  Généré par VOLO SST AGENDA  🦅');
  lines.push(sep);

  const txt=lines.join('\n');
  navigator.clipboard?navigator.clipboard.writeText(txt).then(()=>showToast('Récap copié ✓','info')):showToast('Copie non supportée','err');
}

function resetRange(){rStart=null;rEnd=null;rState='idle';}
function dpToggle(id){
  const names=document.getElementById(id);

  const collapsed=names.classList.toggle('collapsed');

}

function prevMonth(anim='right'){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}resetRange();render(anim?'swipe-'+anim:'');}
function nextMonth(anim='left'){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}resetRange();render(anim?'swipe-'+anim:'');}
function goToday(){viewMonth=new Date().getMonth();viewYear=new Date().getFullYear();resetRange();render();}

function renderCalGrid(chefMode){
  const first=new Date(viewYear,viewMonth,1);
  const last=new Date(viewYear,viewMonth+1,0);
  const startDow=first.getDay();
  const total=last.getDate();
  const todayKey=tsKey(new Date());
  const sauvs=getSauvs();

  let html='<div class="cal-grid">';
  // Day headers
  ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'].forEach(d=>{
    html+=`<div class="cal-dow" style="font-size:9px;padding:4px 0">${d}</div>`;
  });
  // Empty cells
  for(let i=0;i<startDow;i++) html+='<div></div>';

  for(let day=1;day<=total;day++){
    const d=new Date(viewYear,viewMonth,day);
    const ds=tsKey(d);
    const isToday=ds===todayKey;
    const isSel=ds===chefSel;
    const normLo=rStart&&rEnd?Math.min(parseK(rStart).getTime(),parseK(rEnd).getTime()):rStart?parseK(rStart).getTime():null;
    const normHi=rStart&&rEnd?Math.max(parseK(rStart).getTime(),parseK(rEnd).getTime()):rStart?parseK(rStart).getTime():null;
    const ts=d.getTime();
    const inRange=normLo&&normHi&&ts>=normLo&&ts<=normHi;
    const mySt=getAvail(currentUser.id,ds);
    const c=mySt?SCOLORS[mySt]:'';

    // Chef mode: count dispos
    let chefDots='';
    if(chefMode){
      const counts={};
      sauvs.forEach(p=>{const s=getAvail(p.id,ds)||'NONE';counts[s]=(counts[s]||0)+1;});
      const dispo=(counts['DISPO']||0)+(counts['JOUR']||0)+(counts['NUIT']||0);
      const total2=sauvs.length;
      const pct=total2?Math.round(dispo/total2*100):0;
      const dotColor=pct>=70?'#27AE60':pct>=40?'#F39C12':'#C0392B';
      chefDots=`<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:${dotColor};margin-top:1px">${dispo}/${total2}</div>`;
    }

    const bg=isSel?'rgba(230,81,0,.25)':inRange?'rgba(230,81,0,.12)':mySt?c+'18':'transparent';
    const border=isSel?'var(--rescue)':inRange?'rgba(230,81,0,.4)':isToday?'var(--rescue)':mySt?c:'var(--border)';

    html+=`<div onclick="${chefMode?`selectChefDay('${ds}')`:`selectDay('${ds}')`}" 
      style="border:1px solid ${border};border-radius:8px;padding:4px;min-height:44px;cursor:pointer;background:${bg};transition:all .12s;display:flex;flex-direction:column;align-items:center">
      <div style="font-family:'Oswald',sans-serif;font-size:${isToday?'13':'12'}px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--rescue)':mySt?c:'var(--txt)'};">${day}</div>
      ${mySt?`<div style="font-size:10px">${ICONS[mySt]}</div>`:''}
      ${chefDots}
    </div>`;
  }
  html+='</div>';
  return html;
}

  // Chefs first, then sauveteurs
  const sorted=[...sauvs].sort((a,b)=>{
    if(isChef(a)&&!isChef(b))return -1;
    if(!isChef(a)&&isChef(b))return 1;
    return (a.name||'').localeCompare(b.name||'');
  });

  sorted.forEach(p=>{
    const chef=isChef(p);
    html+=`<tr><td class="name-td${chef?' chef-td':''}">${chef?'⭐ ':''}${p.name.split(' ')[0]}</td>`;
    days.forEach(ds=>{
      const st=getAvail(p.id,ds);
      if(st) html+=`<td><div class="cell-bar" style="background:${SCOLORS[st]}"></div></td>`;
      else   html+=`<td><div class="cell-empty"></div></td>`;
    });
    html+='</tr>';
  });

  html+=`</tbody></table></div>`;

  // Summary row for today
  const counts={DISPO:0,JOUR:0,NUIT:0,INDISPO:0,VACANCES:0,FORMATION:0};
  sauvs.forEach(p=>{const s=getAvail(p.id,todayKey);if(s&&counts[s]!==undefined)counts[s]++;});
  html+=`<div class="summary-grid" style="margin-top:10px;grid-template-columns:repeat(3,1fr)">
    <div class="sbox sbox-dispo"><div class="sn">${counts.DISPO+counts.JOUR+counts.NUIT}</div><div class="sl">DISPOS</div>
      <div style="font-size:9px;margin-top:2px;color:var(--muted)">${counts.JOUR?'☀️'+counts.JOUR:''}${counts.JOUR&&counts.NUIT?' · ':''}${counts.NUIT?'🌙'+counts.NUIT:''}</div>
    </div>
    <div class="sbox sbox-indispo"><div class="sn">${counts.INDISPO}</div><div class="sl">INDISPOS</div></div>
    <div class="sbox sbox-vacances"><div class="sn">${counts.VACANCES}</div><div class="sl">VACANCES</div></div>
  </div>`;
  html+=`<div style="text-align:center;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:6px">AUJOURD'HUI · ${fmtFR(todayKey)}</div>`;
  html+=renderLegend();
  return html;
}

function toggleCF(s){
  const idx=chefFilters.indexOf(s);idx>-1?chefFilters.splice(idx,1):chefFilters.push(s);
  document.querySelectorAll('#cf .filter-btn').forEach(btn=>{
    const txt=btn.textContent;
    const match=s==='NONE'?txt.startsWith('NON'):txt.startsWith(s);
    if(match)btn.classList.toggle('on',chefFilters.includes(s));
  });
  document.querySelectorAll('#cfl [data-status]').forEach(row=>{
    row.style.display=chefFilters.includes(row.dataset.status)?'':'none';
  });
}

let contratOpenId=null;

function prolongerContrat(id, jours){
  const contrats=getContrats();
  const c=contrats.find(x=>x.id===id);
  if(!c) return;
  const fin=new Date(parseK(c.fin||c.debut));
  fin.setDate(fin.getDate()+jours);
  c.fin=tsKey(fin);
  saveContrats(contrats);
  fbSet('contracts/'+id, c); // sync Firebase
  showToast('✅ Contrat prolongé de '+jours+'j → '+fmtShort(c.fin),'ok');
  render();
}

function pointageContrat(id){
  // Pointer = prolonger de 1 jour automatiquement (prolongerContrat montre déjà un toast)
  prolongerContrat(id, 1);
}

function runBookerFromPlanifier(){
  if(!sondageDeb){showToast('Choisis une période d\'abord','err');return;}
  bookerDateStart=sondageDeb;
  bookerDateEnd=sondageFin||sondageDeb;
  if(sondageTitre) bookerSiteVal=sondageTitre;
  runBooker();
}

function updateBookerDays(){
  const s=document.getElementById('bookerDateStart')?.value;
  const e=document.getElementById('bookerDateEnd')?.value;
  const el=document.getElementById('bookerDaysCount');
  if(!s||!e||!el)return;
  const days=daysBetween(s,e);
  el.textContent='📅 '+days+' jour'+(days>1?'s':'')+' de mission';
}

// ── CONTRATS ──
// (getContrats/saveContrats/addContrat/removeContrat dans FIREBASE DATA LAYER ci-dessus)

// Retourne true si le membre est déjà sur un contrat actif pour au moins 1 jour de la période
function isDoubleBooke(uid, dates){
  return getContrats().some(c=>{
    if(!c.membres||!c.membres.includes(uid)) return false;
    return dates.some(ds=>ds>=c.debut&&ds<=(c.fin||c.debut));
  });
}

function runBooker(){
  const dsEl=document.getElementById('bookerDateStart'),deEl=document.getElementById('bookerDateEnd');
  const sEl=document.getElementById('bookerSite'),tEl=document.getElementById('bookerType');
  const rEl=document.getElementById('bookerRegion');
  const dsv=dsEl?.value||bookerDateStart, dev=deEl?.value||bookerDateEnd||dsv;
  const tv=tEl?.value||bookerTypeVal;
  if(!dsv){showToast('Choisis une période d\'abord','err');return;}
  bookerDateStart=dsv; bookerDateEnd=dev;
  bookerSiteVal=sEl?.value||bookerSiteVal;
  bookerTypeVal=tv;
  const region=rEl?.value||bookerRegion||'ALL';
  const allDates=[];
  let d=new Date(Math.min(parseK(dsv).getTime(),parseK(dev).getTime()));
  const hiTs=Math.max(parseK(dsv).getTime(),parseK(dev).getTime());
  while(d.getTime()<=hiTs){allDates.push(tsKey(d));d.setDate(d.getDate()+1);}

  // Dispo = pas explicitement INDISPO/VACANCES/FORMATION sur aucun jour
  // null = pas encore répondu = inclus (avec badge "non confirmé")
  const BLOCKED_ST=new Set(['INDISPO','VACANCES','FORMATION']);
  const isDispoAll=p=>allDates.every(ds=>{const st=getAvail(p.id,ds);return !st||!BLOCKED_ST.has(st);});
  const hasAtLeastOneDispo=p=>allDates.some(ds=>DISPO_LIKE(getAvail(p.id,ds)));
  const matchRegion=p=>region==='ALL'||p.region===region;
  const notBooked=p=>!isDoubleBooke(p.id,allDates);

  // Candidats libres
  const chefs=getPers().filter(p=>isChef(p)&&isDispoAll(p)&&matchRegion(p)&&notBooked(p));
  const sauvsCandidats=getPers().filter(p=>isDispoAll(p)&&matchRegion(p)&&p.type==='SAUVETEUR'&&!isChef(p)&&notBooked(p));

  // Stats pour alertes
  const totalDispo=getPers().filter(p=>isDispoAll(p)&&matchRegion(p)).length;
  const bloqueContrat=getPers().filter(p=>isDispoAll(p)&&matchRegion(p)&&!notBooked(p));

  bookerTeam=[];
  if(chefs.length>0) bookerTeam.push({...chefs[0],_isChef:true});
  sauvsCandidats.slice(0,bookerNbReq+2).forEach(s=>bookerTeam.push({...s,_isChef:false}));

  // Messages intelligents
  const alerts=[];
  if(bloqueContrat.length>0){
    alerts.push(`⛔ ${bloqueContrat.length} membre${bloqueContrat.length>1?'s':''} exclu${bloqueContrat.length>1?'s':''} — déjà sur contrat`);
  }
  if(!bookerTeam.length){
    showToast('🚨 Aucun sauveteur disponible sur cette période','err');
    render(); setTimeout(updateBookerDays,50); return;
  }
  if(chefs.length===0){
    alerts.push('⚠️ Aucun chef d\'équipe disponible — vérifier les dispos');
  }
  if(bookerTeam.length < bookerNbReq){
    const manque=bookerNbReq-bookerTeam.length;
    alerts.push(`🔴 SOUS-EFFECTIF : il manque ${manque} personne${manque>1?'s':''} (${bookerTeam.length}/${bookerNbReq})`);
    showToast('⚠️ '+bookerTeam.length+'/'+bookerNbReq+' disponibles — sous-effectif','err');
  } else if(bookerTeam.length === bookerNbReq){
    alerts.push('🟡 Juste le minimum requis — aucune marge si désistement');
    showToast('✓ Minimum atteint — pas de marge','off');
  } else {
    showToast('✅ '+bookerTeam.length+' membres dispos · '+allDates.length+'j','ok');
  }
  bookerAlerts=alerts;
  render();
  setTimeout(updateBookerDays,50);
}

  const juste=bookerTeam.length===bookerNbReq;
  const statusColor=insuffisant?'var(--red)':juste?'var(--gold)':'#27AE60';

  }

  html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
    <div style="padding:10px 14px;background:rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
      <span>${statusIcon}</span>
      <span style="font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;color:${statusColor};font-weight:700">ÉQUIPE SUGGÉRÉE</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto">${bookerTeam.length} / ${bookerNbReq} requis</span>
    </div>`;

  bookerTeam.forEach((p,i)=>{
    const contratActif=getContrats().filter(c=>c.membres&&c.membres.includes(p.id));
    // Check dispo status for the period
    const confirmedDays=bookerDateStart?[...Array(Math.round((parseK(bookerDateEnd||bookerDateStart)-parseK(bookerDateStart))/86400000)+1)].map((_,i)=>{const d=new Date(parseK(bookerDateStart));d.setDate(d.getDate()+i);return tsKey(d);}).filter(ds=>DISPO_LIKE(getAvail(p.id,ds))).length:0;
    const totalDays=bookerDateStart?Math.round((parseK(bookerDateEnd||bookerDateStart)-parseK(bookerDateStart))/86400000)+1:1;
    const allConfirmed=confirmedDays===totalDays;
    const badgeColor=allConfirmed?'#27AE60':'#F39C12';
    const badgeLabel=allConfirmed?'✓ Confirmé':`${confirmedDays}/${totalDays}j`;
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:var(--txt)">${p._isChef?'⭐ ':''}${p.name}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${p.role||p.type} · ${p.ville||''} · ${p.region||''}</div>
        ${contratActif.length?`<div style="font-size:10px;color:var(--gold);margin-top:2px">📋 ${contratActif.length} contrat${contratActif.length>1?'s':''} actif${contratActif.length>1?'s':''} (autres dates)</div>`:''}
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${badgeColor};background:${badgeColor}18;border:1px solid ${badgeColor}44;border-radius:6px;padding:3px 7px">${badgeLabel}</span>
      <button onclick="removeTeam(${i})" style="background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.2);color:var(--red);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:13px">✕</button>
    </div>`;
  });

  html+=`<div style="padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <button class="btn btn-green" style="font-size:12px;padding:12px" onclick="confirmerContrat()">✅ CONFIRMER LE CONTRAT</button>
    <button class="btn btn-outline" style="font-size:12px" onclick="genWorkPlan()">📋 PLAN DE TRAVAIL</button>
  </div>
  <div style="padding:0 14px 12px">
    <button class="btn btn-outline" style="font-size:11px;padding:8px;color:var(--muted)" onclick="clearTeam()">✕ RÉINITIALISER</button>
  </div>
  </div>`;

  // Contrats actifs
  const contrats=getContrats();
  if(contrats.length){
    html+=`<div style="margin-top:12px">
      <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:6px">📋 CONTRATS ACTIFS (${contrats.length})</div>`;
    contrats.forEach(c=>{
      html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;color:var(--txt)">${c.site||c.type||'Mission'}</div>
          <div style="font-size:11px;color:var(--muted)">${fmtShort(c.debut)} → ${fmtShort(c.fin||c.debut)} · ${(c.membres||[]).length} membres</div>
        </div>
        <button onclick="removeContrat('${c.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:4px">🗑</button>
      </div>`;
    });
    html+=`</div>`;
  }

  return html;
}

function confirmerContrat(){
  if(!bookerTeam.length){showToast('Aucune équipe à confirmer','err');return;}
  const contrat={
    id:'c'+Date.now(),
    debut:bookerDateStart, fin:bookerDateEnd||bookerDateStart,
    site:bookerSiteVal, type:bookerTypeVal,
    membres:bookerTeam.map(p=>p.id),
    nomsMembres:bookerTeam.map(p=>p.name),
    createdAt:tsKey(new Date())
  };
  addContrat(contrat);
  bookerTeam=[]; bookerAlerts=[];
  showToast('✅ Contrat confirmé — membres verrouillés','ok');
  render();
}

function removeTeam(i){bookerTeam.splice(i,1);render();}
function clearTeam(){bookerTeam=[];render();}

function genWorkPlan(){
  const dsv=bookerDateStart, dev=bookerDateEnd||bookerDateStart;
  const sv=bookerSiteVal, tv=bookerTypeVal;
  const sn=typeof DESTINATIONS!=='undefined'?(DESTINATIONS.find(d=>d.id===sv)||{}).name||sv:sv;
  const tn=(MISSION_TYPES.find(m=>m.id===tv)||{}).name||tv;
  const chef=bookerTeam.find(p=>p._isChef),membres=bookerTeam.filter(p=>!p._isChef);
  const old=document.getElementById('wpOut');if(old)old.remove();
  const periode=dsv&&dev&&dsv!==dev?fmtFR(dsv)+' → '+fmtFR(dev):dsv?fmtFR(dsv):'—';
  const days=dsv&&dev?daysBetween(dsv,dev):1;
  // Build plain text for sharing
  const planText=[
    '🦅 PLAN DE TRAVAIL — VOLO SST',
    '───────────────────────',
    'PÉRIODE : '+periode,
    'DURÉE   : '+days+' jour'+(days>1?'s':''),
    'SITE    : '+(sn||'—'),
    'TYPE    : '+(tn||'—'),
    'EFFECTIF: '+bookerTeam.length+' personne'+(bookerTeam.length>1?'s':''),
    '───────────────────────',
    chef?'⭐ '+chef.name+' (CHEF)':'',
    ...membres.map(m=>'· '+m.name+(m.role?' — '+m.role:'')),
    '───────────────────────',
    'Généré le '+new Date().toLocaleString('fr-CA')+' · VOLO SST'
  ].filter(Boolean).join('\n');

  let html=`<div id="wpOut" class="work-plan">
    <div style="font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:3px;color:var(--rescue);margin-bottom:14px;text-align:center">🦅 PLAN DE TRAVAIL</div>
    <div class="wp-row"><span class="wp-lbl">PÉRIODE</span><span class="wp-val">${periode}</span></div>
    <div class="wp-row"><span class="wp-lbl">DURÉE</span><span class="wp-val">${days} jour${days>1?'s':''}</span></div>
    <div class="wp-row"><span class="wp-lbl">SITE</span><span class="wp-val">${sn||'—'}</span></div>
    <div class="wp-row"><span class="wp-lbl">TYPE</span><span class="wp-val">${tn||'—'}</span></div>
    <div class="wp-row"><span class="wp-lbl">EFFECTIF</span><span class="wp-val">${bookerTeam.length} personne${bookerTeam.length>1?'s':''}</span></div>
    <div class="sec-div" style="margin:12px 0 8px">ÉQUIPE</div>`;
  if(chef)html+=`<div class="wp-m wp-m-chef"><span style="font-weight:700">⭐ ${chef.name}</span><span style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--gold)">CHEF D'ÉQUIPE</span></div>`;
  membres.forEach(m=>{html+=`<div class="wp-m wp-m-norm"><span>${m.name}</span><span style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--rescue)">${m.role||''}</span></div>`;});
  html+=`<div style="text-align:center;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)">Généré le ${new Date().toLocaleString('fr-CA')} · VOLO SST</div>
    <div class="wp-actions" style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-rescue" style="font-size:13px" onclick="sharePlan(\`${planText.replace(/`/g,"'")}\`)">📤 PARTAGER</button>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        <button onclick="shareToWhatsApp(\`${planText.replace(/`/g,"'")}\`)" style="padding:10px;border-radius:10px;border:none;background:#25D366;color:#fff;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;font-weight:700">💬 WhatsApp</button>
        <button onclick="shareToSMS(\`${planText.replace(/`/g,"'")}\`)" style="padding:10px;border-radius:10px;border:none;background:#34B7F1;color:#fff;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;font-weight:700">💬 Messages</button>
        <button onclick="shareToMessenger(\`${planText.replace(/`/g,"'")}\`)" style="padding:10px;border-radius:10px;border:none;background:#0084FF;color:#fff;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;font-weight:700">💬 Messenger</button>
        <button onclick="copyPlan(\`${planText.replace(/`/g,"'")}\`)" style="padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer">📋 Copier</button>
      </div>
    </div>
  </div>`;

  const div=document.createElement('div');div.innerHTML=html;
  document.getElementById('mainScreen').appendChild(div.firstChild);
  showToast('Plan de travail généré','ok');
  setTimeout(()=>document.getElementById('wpOut')?.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

async function sharePlan(text){
  if(navigator.share){
    try{await navigator.share({title:'Plan de travail VOLO SST',text});showToast('Partagé ✓','ok');}
    catch(e){if(e.name!=='AbortError')copyPlan(text);}
  } else {
    copyPlan(text);
  }
}

function shareToWhatsApp(text){
  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}
function shareToSMS(text){
  window.open('sms:?&body='+encodeURIComponent(text));
}
function shareToMessenger(text){
  // Messenger ne supporte pas de texte pré-rempli sans app ID,
  // fallback: copier + ouvrir messenger
  copyPlan(text);
  showToast('Texte copié — colle dans Messenger','info');
  setTimeout(()=>window.open('https://www.messenger.com','_blank'),600);
}

async function copyPlan(text){
  try{
    await navigator.clipboard.writeText(text);
    showToast('Copié dans le presse-papier ✓','info');
  } catch(e){
    // Fallback
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();
    showToast('Copié ✓','info');
  }
}

//  CHAT MODULE — Firebase Realtime Database
// ══════════════════════════════════════════
var chatMessages=[], chatListener=null;
var chatMode='general'; // 'general' | 'sauveteur' | 'dm' | 'dm-list'
var chatDmTarget=null;  // {id, name} du destinataire DM
var chatUnreadCount=0;
var chatMentionDropdown=false, chatMentionFilter='', chatMentionIdx=0;
var chatNewMsgCount=0, chatIsAtBottom=true;
const LS_CHAT_READ=LS+'chat_last_read';
const CHAT_COLORS=['#E65100','#D4A017','#27AE60','#3B82F6','#8E44AD','#C0392B','#E67E22','#16A085','#2980B9','#8E44AD'];

function chatColor(uid){
  let h=0;for(let i=0;i<uid.length;i++)h=uid.charCodeAt(i)+((h<<5)-h);
  return CHAT_COLORS[Math.abs(h)%CHAT_COLORS.length];
}
function chatInitials(name){
  const p=(name||'?').trim().split(' ');
  return (p[0][0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase();
}
function chatTimeAgo(ts){
  const now=Date.now(),diff=now-ts;
  if(diff<60000) return "à l'instant";
  if(diff<3600000) return Math.floor(diff/60000)+'min';
  if(diff<86400000){const d=new Date(ts);return d.getHours()+'h'+String(d.getMinutes()).padStart(2,'0');}
  if(diff<172800000){const d=new Date(ts);return 'hier '+d.getHours()+'h'+String(d.getMinutes()).padStart(2,'0');}
  const d=new Date(ts);return d.getDate()+'/'+(d.getMonth()+1)+' '+d.getHours()+'h'+String(d.getMinutes()).padStart(2,'0');
}
function chatDayLabel(ts){
  const d=new Date(ts),today=new Date();
  if(d.toDateString()===today.toDateString()) return "AUJOURD'HUI";
  const yesterday=new Date(today);yesterday.setDate(today.getDate()-1);
  if(d.toDateString()===yesterday.toDateString()) return 'HIER';
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function chatDbPath(){
  if(chatMode==='dm'&&chatDmTarget){
    const ids=[currentUser.id,chatDmTarget.id].sort();
    return 'private/'+ids[0]+'_'+ids[1];
  }
  if(chatMode==='sauveteur') return 'channels/sauveteur';
  return 'messages';
}
var chatDmCache={};
function chatGetDmUnread(targetId){
  const key=LS+'dm_read_'+targetId;
  const lastRead=parseInt(localStorage.getItem(key)||'0');
  const cached=chatDmCache[targetId]||[];
  return cached.filter(m=>m.authorId!==currentUser.id&&m.timestamp>lastRead).length;
}

// Charger les DM en cache pour chaque membre (pour badges unread)
function chatLoadDmCache(){
  if(!firebaseDB||!currentUser) return;
  getPers().forEach(p=>{
    if(p.id===currentUser.id) return;
    const ids=[currentUser.id,p.id].sort();
    const path='private/'+ids[0]+'_'+ids[1];
    firebaseDB.ref(path).orderByChild('timestamp').limitToLast(50).once('value',snap=>{
      const data=snap.val()||{};
      chatDmCache[p.id]=Object.values(data).sort((a,b)=>a.timestamp-b.timestamp);
    });
  });
}

// ── Firebase listeners ──
function chatStartListening(){
  if(!firebaseDB){chatLoadLocal();return;}
  chatStopListening();
  chatLoadDmCache(); // Charger le cache DM pour badges unread
  const ref=firebaseDB.ref(chatDbPath()).orderByChild('timestamp').limitToLast(200);
  chatListener=ref.on('value',snap=>{
    const data=snap.val()||{};
    chatMessages=Object.values(data).sort((a,b)=>a.timestamp-b.timestamp);
    // Unread count
    if(activeTab!=='chat'){
      const lastRead=parseInt(localStorage.getItem(LS_CHAT_READ)||'0');
      chatUnreadCount=chatMessages.filter(m=>m.timestamp>lastRead&&m.authorId!==currentUser.id).length;
      // Update tab badge without full re-render
      const badge=document.querySelector('.tab-btn[onclick*="chat"]');
      if(badge&&chatUnreadCount>0&&!badge.innerHTML.includes('tab-badge')){
        render();
      }
    }
    // Check mentions
    const lastRead2=parseInt(localStorage.getItem(LS_CHAT_READ)||'0');
    const newMentions=chatMessages.filter(m=>m.timestamp>lastRead2&&m.authorId!==currentUser.id&&m.text&&m.text.includes('@'+currentUser.name.split(' ')[0]));
    if(newMentions.length>0&&activeTab!=='chat'){
      showToast('💬 '+newMentions[newMentions.length-1].authorName+' vous a mentionné','info');
    }
    if(activeTab==='chat') chatRenderMessages();
  });
}
function chatStopListening(){
  if(chatListener&&firebaseDB){
    firebaseDB.ref(chatDbPath()).off('value',chatListener);
    chatListener=null;
  }
}
// Fallback localStorage si pas de Firebase
function chatLoadLocal(){
  try{chatMessages=JSON.parse(localStorage.getItem(LS+'chat_msgs_'+chatDbPath().replace(/\//g,'_'))||'[]');}catch(e){chatMessages=[];}
  if(activeTab==='chat') chatRenderMessages();
}
function chatSaveLocal(){
  localStorage.setItem(LS+'chat_msgs_'+chatDbPath().replace(/\//g,'_'),JSON.stringify(chatMessages.slice(-200)));
}

// ── Send message ──
function chatSend(){
  const input=document.getElementById('chatInput');
  if(!input)return;
  const text=input.value.trim();
  if(!text)return;
  const msg={
    id:'m'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    authorId:currentUser.id,
    authorName:currentUser.name,
    text:text,
    timestamp:Date.now(),
    pinned:false,
    reactions:{}
  };
  if(firebaseDB){
    firebaseDB.ref(chatDbPath()+'/'+msg.id).set(msg);
  } else {
    chatMessages.push(msg);
    chatSaveLocal();
    chatRenderMessages();
  }
  input.value='';
  input.style.height='36px';
  chatMentionDropdown=false;
  const dd=document.getElementById('chatMentionDD');
  if(dd)dd.classList.remove('visible');
}

// ── Reactions ──
function chatReact(msgId,emoji){
  const path=chatDbPath()+'/'+msgId+'/reactions/'+emoji;
  if(firebaseDB){
    const ref=firebaseDB.ref(path);
    ref.once('value',snap=>{
      const arr=snap.val()||[];
      const idx=arr.indexOf(currentUser.id);
      if(idx>-1) arr.splice(idx,1); else arr.push(currentUser.id);
      ref.set(arr.length?arr:null);
    });
  } else {
    const msg=chatMessages.find(m=>m.id===msgId);
    if(!msg)return;
    if(!msg.reactions)msg.reactions={};
    if(!msg.reactions[emoji])msg.reactions[emoji]=[];
    const idx=msg.reactions[emoji].indexOf(currentUser.id);
    if(idx>-1) msg.reactions[emoji].splice(idx,1); else msg.reactions[emoji].push(currentUser.id);
    if(!msg.reactions[emoji].length) delete msg.reactions[emoji];
    chatSaveLocal();
    chatRenderMessages();
  }
}

// ── Pin ──
function chatPin(msgId){
  if(!isChef(currentUser))return;
  // Unpin all others first
  const path=chatDbPath();
  if(firebaseDB){
    firebaseDB.ref(path).once('value',snap=>{
      const data=snap.val()||{};
      const updates={};
      Object.keys(data).forEach(k=>{
        if(data[k].pinned) updates[k+'/pinned']=false;
      });
      updates[msgId+'/pinned']=true;
      firebaseDB.ref(path).update(updates);
    });
  } else {
    chatMessages.forEach(m=>m.pinned=false);
    const msg=chatMessages.find(m=>m.id===msgId);
    if(msg)msg.pinned=true;
    chatSaveLocal();
    chatRenderMessages();
  }
}
function chatUnpin(msgId){
  if(firebaseDB){
    firebaseDB.ref(chatDbPath()+'/'+msgId+'/pinned').set(false);
  } else {
    const msg=chatMessages.find(m=>m.id===msgId);
    if(msg)msg.pinned=false;
    chatSaveLocal();
    chatRenderMessages();
  }
}

// ── Mention processing ──
function chatProcessMentions(text){
  const people=getPers();
  let result=text;
  people.forEach(p=>{
    const firstName=p.name.split(' ')[0];
    const re=new RegExp('@'+firstName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    result=result.replace(re,'<span class="chat-mention">@'+firstName+'</span>');
  });
  return result;
}

// ── Channel switch ──
var chatLastChannel='general';
function chatSwitchChannel(channel){
  if(chatMode===channel) return;
  if(channel==='sauveteur'&&currentUser&&currentUser.type==='SURVEILLANT') return;
  chatStopListening();
  chatMode=channel;
  chatMessages=[];
  chatStartListening();
  chatRenderFull();
}

// ── DM navigation ──
function chatOpenDM(targetId,targetName){
  chatStopListening();
  chatLastChannel=chatMode==='dm'?chatLastChannel:chatMode;
  chatMode='dm';
  chatDmTarget={id:targetId,name:targetName};
  chatMessages=[];
  localStorage.setItem(LS+'dm_read_'+targetId,Date.now().toString());
  chatStartListening();
  chatRenderFull();
}
function chatBackToGeneral(){
  chatStopListening();
  chatMode=chatLastChannel||'general';
  chatDmTarget=null;
  chatMessages=[];
  chatStartListening();
  chatRenderFull();
}

    oninput="chatOnInput(this)" onkeydown="chatOnKeydown(event)"></textarea>`;

function chatRenderMessages(){
  const area=document.getElementById('chatMsgArea');
  if(!area)return;
  if(!chatMessages.length){
    area.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:10px">${chatMode==='sauveteur'?'🦅':'💬'}</div>
      <div style="font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px">AUCUN MESSAGE</div>
      <div style="font-size:11px;margin-top:4px">${chatMode==='sauveteur'?'Canal sauveteurs — écrivez le premier message':'Soyez le premier à écrire'}</div>
    </div>`;
    return;
  }
  let html='';
  let lastAuthor=null, lastTime=0, lastDay='';
  chatMessages.forEach((msg,i)=>{
    if(!currentUser) return;
    const isMine=msg.authorId===currentUser.id;
    const sameAuthor=msg.authorId===lastAuthor;
    const closeInTime=msg.timestamp-lastTime<120000; // 2min
    const grouped=sameAuthor&&closeInTime;
    const day=chatDayLabel(msg.timestamp);
    // Day separator
    if(day!==lastDay){
      html+=`<div class="chat-day-sep">${day}</div>`;
      lastDay=day;
    }
    if(!grouped){
      // Close previous group
      if(lastAuthor!==null) html+=`</div></div>`;
      // Open new group
      const color=chatColor(msg.authorId);
      html+=`<div class="chat-group${isMine?' mine':''}">`;
      html+=`<div class="chat-avatar" style="background:${color}">${chatInitials(msg.authorName)}</div>`;
      html+=`<div class="chat-bubbles">`;
      if(!isMine) html+=`<div class="chat-author">${msg.authorName.split(' ')[0]}</div>`;
    }
    // Bubble
    const processedText=chatProcessMentions(msg.text.replace(/</g,'&lt;').replace(/>/g,'&gt;'));
    html+=`<div class="chat-bubble${isMine?' mine':' other'}" data-msgid="${msg.id}">`;
    // Hover actions
    html+=`<div class="chat-hover-actions">`;
    html+=`<button onclick="chatReact('${msg.id}','👍')" title="👍">👍</button>`;
    html+=`<button onclick="chatReact('${msg.id}','✅')" title="✅">✅</button>`;
    html+=`<button onclick="chatReact('${msg.id}','❌')" title="❌">❌</button>`;
    if(isChef(currentUser)&&!msg.pinned) html+=`<button onclick="chatPin('${msg.id}')" title="Épingler">📌</button>`;
    html+=`</div>`;
    html+=processedText;
    html+=`<span class="cb-time">${chatTimeAgo(msg.timestamp)}</span>`;
    html+=`</div>`;
    // Reactions
    if(msg.reactions&&Object.keys(msg.reactions).length){
      html+=`<div class="chat-reactions">`;
      Object.entries(msg.reactions).forEach(([emoji,uids])=>{
        if(!uids||!uids.length)return;
        const active=uids.includes(currentUser.id);
        html+=`<button class="chat-react-btn${active?' active':''}" onclick="chatReact('${msg.id}','${emoji}')">
          ${emoji} <span class="cr-count">${uids.length}</span>
        </button>`;
      });
      html+=`</div>`;
    }
    lastAuthor=msg.authorId;
    lastTime=msg.timestamp;
  });
  // Close last group
  if(lastAuthor!==null) html+=`</div></div>`;
  area.innerHTML=html;
  // Auto scroll
  if(chatIsAtBottom){
    area.scrollTop=area.scrollHeight;
  } else {
    chatNewMsgCount++;
    const btn=document.getElementById('chatNewBtn');
    if(btn&&chatNewMsgCount>0) btn.style.display='block';
  }
}

function chatScrollBottom(){
  const area=document.getElementById('chatMsgArea');
  if(area){area.scrollTop=area.scrollHeight;chatIsAtBottom=true;}
  chatNewMsgCount=0;
  const btn=document.getElementById('chatNewBtn');
  if(btn)btn.style.display='none';
}

// ── Mention autocomplete ──
function chatOnInput(el){
  // Auto-resize
  el.style.height='36px';
  el.style.height=Math.min(80,el.scrollHeight)+'px';
  // Mention detection
  const val=el.value;
  const cursor=el.selectionStart;
  const before=val.substring(0,cursor);
  const atMatch=before.match(/@(\w*)$/);
  const dd=document.getElementById('chatMentionDD');
  if(atMatch){
    chatMentionFilter=atMatch[1].toLowerCase();
    const people=getPers().filter(p=>{
      const fn=p.name.split(' ')[0].toLowerCase();
      return fn.startsWith(chatMentionFilter)||p.name.toLowerCase().includes(chatMentionFilter);
    }).slice(0,8);
    if(people.length){
      chatMentionIdx=0;
      let ddHtml='';
      people.forEach((p,i)=>{
        const roleColor=p.type==='SAUVETEUR'?'var(--rescue)':'var(--blue)';
        ddHtml+=`<div class="chat-mention-dd-item${i===0?' selected':''}" onclick="chatInsertMention('${p.name.split(' ')[0]}')" data-idx="${i}">
          <div class="chat-avatar" style="width:24px;height:24px;font-size:9px;background:${chatColor(p.id)}">${chatInitials(p.name)}</div>
          <span>${p.name}</span>
          <span class="cmdi-role" style="color:${roleColor}">${p.role}</span>
        </div>`;
      });
      dd.innerHTML=ddHtml;
      dd.classList.add('visible');
      chatMentionDropdown=true;
    } else {
      dd.classList.remove('visible');
      chatMentionDropdown=false;
    }
  } else {
    dd.classList.remove('visible');
    chatMentionDropdown=false;
  }
}

function chatInsertMention(firstName){
  const input=document.getElementById('chatInput');
  if(!input)return;
  const val=input.value;
  const cursor=input.selectionStart;
  const before=val.substring(0,cursor);
  const after=val.substring(cursor);
  const newBefore=before.replace(/@\w*$/,'@'+firstName+' ');
  input.value=newBefore+after;
  input.selectionStart=input.selectionEnd=newBefore.length;
  input.focus();
  chatMentionDropdown=false;
  const dd=document.getElementById('chatMentionDD');
  if(dd)dd.classList.remove('visible');
}

function chatOnKeydown(e){
  if(chatMentionDropdown){
    const dd=document.getElementById('chatMentionDD');
    const items=dd?dd.querySelectorAll('.chat-mention-dd-item'):[];
    if(e.key==='ArrowDown'){
      e.preventDefault();
      chatMentionIdx=Math.min(chatMentionIdx+1,items.length-1);
      items.forEach((it,i)=>it.classList.toggle('selected',i===chatMentionIdx));
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      chatMentionIdx=Math.max(chatMentionIdx-1,0);
      items.forEach((it,i)=>it.classList.toggle('selected',i===chatMentionIdx));
    } else if(e.key==='Enter'||e.key==='Tab'){
      e.preventDefault();
      if(items[chatMentionIdx]){
        items[chatMentionIdx].click();
      }
      return;
    } else if(e.key==='Escape'){
      e.preventDefault();
      chatMentionDropdown=false;
      dd.classList.remove('visible');
      return;
    }
    return;
  }
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    chatSend();
  }
}

// ── DM list ──
function chatShowDMList(){
  chatStopListening();
  chatMode='dm-list';
  chatRenderDMList();
}
function chatRenderDMList(){
  const container=document.getElementById('chatContainer');
  if(!container)return;
  const people=getAllField().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  let html=`<div class="chat-wrap">
    <div class="chat-header">
      <button onclick="chatBackToGeneral()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px" aria-label="Retour au canal général">‹</button>
      <div class="chat-header-title">MESSAGES PRIVÉS</div>
      <div class="chat-header-sub">${people.length} membres</div>
    </div>
    <div style="padding:8px 14px">
      <input type="text" class="chat-input" placeholder="Rechercher…" style="border-radius:10px;padding:8px 12px" oninput="chatFilterDM(this.value)">
    </div>
    <div class="chat-dm-list" id="chatDMList">`;
  people.forEach(p=>{
    if(p.id===currentUser.id)return;
    const color=chatColor(p.id);
    const roleColor=p.type==='SAUVETEUR'?'var(--rescue)':'var(--blue)';
    const unread=chatGetDmUnread(p.id);
    html+=`<div class="chat-dm-item" onclick="chatOpenDM('${p.id}','${p.name.replace(/'/g,"\\'")}')" data-name="${p.name.toLowerCase()}">
      <div class="chat-avatar" style="width:28px;height:28px;font-size:10px;background:${color}">${chatInitials(p.name)}</div>
      <div class="dmi-name">${p.name} <span style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:${roleColor};margin-left:4px">${p.type==='SAUVETEUR'?'SAUV':'SURV'}</span></div>
      ${unread>0?'<div class="dmi-badge"></div>':''}
    </div>`;
  });
  html+=`</div></div>`;
  container.innerHTML=html;
}
function chatFilterDM(val){
  const items=document.querySelectorAll('#chatDMList .chat-dm-item');
  const q=val.toLowerCase();
  items.forEach(it=>{
    it.style.display=it.dataset.name.includes(q)?'':'none';
  });
}

// ================================================================
//  JOB 9 — ONBOARDING NOUVEAU MEMBRE
// ================================================================
let _agTourStep=0;
const AG_TOUR_STEPS=[
  {title:'Bienvenue',icon:'🦅',body:''},
  {title:'Ton agenda',icon:'📅',body:'Sélectionne tes disponibilités en <strong>2 clics</strong> sur le calendrier.<br>Jour, nuit ou les deux — c\'est toi qui décides.<br>Remplis les <strong>7 prochains jours</strong> pour commencer.'},
  {title:'Le chat',icon:'💬',body:'Le <strong>canal général</strong> te connecte à toute l\'équipe.<br>Les sauveteurs ont aussi leur canal privé.<br>Utilise <strong>@</strong> pour mentionner quelqu\'un.'},
  {title:'C\'est parti !',icon:'🚀',body:'Tu es prêt. Tu peux revoir ce tour dans les paramètres à tout moment.<br><strong>Bonne mission !</strong>'}
];

function agShouldShowTour(){
  if(!currentUser) return false;
  const key=LS+'onboarding_'+currentUser.id;
  return !localStorage.getItem(key);
}

function agShowTour(){
  _agTourStep=0;
  if(!currentUser) return;
  AG_TOUR_STEPS[0].body='Ton rôle : <strong>'+(currentUser.role||currentUser.type)+'</strong><br>Ta région : <strong>'+(currentUser.region||'—')+'</strong><br>Ton numéro : <strong>'+currentUser.volo+'</strong>';
  _agRenderTourStep();
}

function _agRenderTourStep(){
  const s=AG_TOUR_STEPS[_agTourStep];
  const isLast=_agTourStep===AG_TOUR_STEPS.length-1;
  let overlay=document.getElementById('agTourOverlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='agTourOverlay';
    overlay.className='tour-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML='<div class="tour-card">'+
    '<div class="tour-step">ÉTAPE '+(_agTourStep+1)+'/'+AG_TOUR_STEPS.length+'</div>'+
    '<div style="font-size:2.5rem;margin-bottom:8px">'+s.icon+'</div>'+
    '<div class="tour-title">'+s.title+'</div>'+
    '<div class="tour-body">'+s.body+'</div>'+
    '<div class="tour-dots">'+AG_TOUR_STEPS.map(function(_,i){return '<div class="tour-dot'+(i===_agTourStep?' active':'')+'"></div>';}).join('')+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:center">'+
      '<button class="tour-btn tour-btn-skip" onclick="agCloseTour()">PASSER</button>'+
      '<button class="tour-btn tour-btn-primary" onclick="'+(isLast?'agCompleteTour()':'agNextTourStep()')+'">'+(isLast?'COMMENCER':'SUIVANT →')+'</button>'+
    '</div>'+
  '</div>';
}

function agNextTourStep(){
  _agTourStep++;
  if(_agTourStep>=AG_TOUR_STEPS.length){agCompleteTour();return;}
  _agRenderTourStep();
}

function agCompleteTour(){
  if(currentUser){
    localStorage.setItem(LS+'onboarding_'+currentUser.id,'true');
    try{fbSet('users/'+currentUser.id+'/onboardingDone',true);}catch(e){}
  }
  agCloseTour();
}

function agCloseTour(){
  const overlay=document.getElementById('agTourOverlay');
  if(overlay) overlay.remove();
  if(currentUser) localStorage.setItem(LS+'onboarding_'+currentUser.id,'true');
}

// Inject onboarding check after login
(function(){
  const origLoginUser=loginUser;
  loginUser=function(p){
    origLoginUser(p);
    setTimeout(function(){
      if(agShouldShowTour()) agShowTour();
    },600);
  };
})();
