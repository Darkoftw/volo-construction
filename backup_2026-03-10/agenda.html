<style>
*{margin:0;padding:0;box-sizing:border-box}
input,select,textarea{font-size:16px!important}
button,.btn{min-height:44px}
@supports(-webkit-touch-callout:none){html{height:-webkit-fill-available}body{min-height:-webkit-fill-available}}
:root{
  --bg:#0C0608;--card:rgba(28,16,18,.90);--card2:rgba(38,22,26,.94);--cardSolid:#1C1012;
  --gold:#D4A017;--goldL:#E8C547;
  --rescue:#E65100;--rescueL:#FF6D00;--rescueD:#BF360C;--rescueGlow:rgba(230,81,0,.15);
  --red:#C0392B;--green:#27AE60;--orange:#E67E22;--blue:#3B82F6;
  --txt:#F5F0EB;--muted:#C9BAA9;--border:rgba(68,40,46,.55);
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
  --dispo:#27AE60;--indispo:#C0392B;--vacances:#E67E22;--formation:#3B82F6;
}
body.light{
  --bg:#F8FAFC;--card:rgba(255,255,255,.96);--card2:rgba(241,245,249,.98);--cardSolid:#fff;
  --gold:#C2410C;--goldL:#EA580C;--rescue:#E65100;--rescueD:#BF360C;--rescueGlow:rgba(230,81,0,.09);
  --txt:#0F172A;--muted:#64748B;--border:rgba(203,213,225,.9);
}
body.light .header{background:rgba(248,250,252,.97)!important;border-bottom-color:#E2E8F0}
body,html{font-family:'Inter',sans-serif;font-size:15px;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;transition:background-color .22s,color .15s}

/* ── GRAIN ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E")}
/* ── AURA ── */
body::after{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:900px;height:500px;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 65% 38% at 50% 0%,rgba(230,81,0,.20) 0%,transparent 70%),radial-gradient(ellipse 38% 22% at 50% 0%,rgba(230,81,0,.10) 0%,transparent 55%);
  animation:aura-breathe 7s ease-in-out infinite}

@keyframes aura-breathe{0%,100%{opacity:.8}50%{opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-110%)}to{transform:translateX(-50%) translateY(0)}}
@keyframes rangeGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px 2px rgba(230,81,0,.2)}}
@keyframes swipeLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes swipeRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}

.app{max-width:500px;margin:0 auto;min-height:100vh;position:relative;z-index:1}
.gold-bar{height:3px;background:linear-gradient(90deg,var(--rescueD),var(--rescue),var(--rescueL),var(--rescue),var(--rescueD));background-size:300% 100%;animation:shimmer 4s ease infinite}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;background:rgba(12,6,8,.94)}
.header-left{display:flex;align-items:center;gap:11px}
.header-logo{width:40px;height:40px;border-radius:50%;border:2px solid var(--rescue);object-fit:cover;box-shadow:0 0 18px rgba(230,81,0,.25),0 0 40px rgba(230,81,0,.08);animation:float 4s ease-in-out infinite;transition:all .3s;cursor:pointer}
.header-logo:hover{transform:scale(1.1) rotate(3deg);box-shadow:0 0 0 2px rgba(230,81,0,.5),0 0 28px rgba(230,81,0,.4)}
.header-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;color:var(--rescue);text-shadow:0 0 18px rgba(230,81,0,.15)}
.header-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:7px}
.hdr-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 11px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.hdr-btn:hover{border-color:var(--rescue);color:var(--rescue);background:var(--rescueGlow)}
.hdr-icon-btn{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.hdr-icon-btn:hover{border-color:var(--red);color:var(--red)}

.screen{padding:18px;min-height:calc(100vh - 70px);animation:fadeSlide .32s cubic-bezier(.22,1,.36,1)}
.screen.swipe-left{animation:swipeLeft .28s cubic-bezier(.22,1,.36,1)}
.screen.swipe-right{animation:swipeRight .28s cubic-bezier(.22,1,.36,1)}

/* ── TABS ── */
.tab-row{display:flex;gap:6px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px 5px;border-radius:var(--radius-sm);text-align:center;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.2px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .22s}
.tab-btn.active{border-color:var(--rescue);color:var(--rescue);background:var(--rescueGlow)}
.tab-btn:active{transform:scale(.96)}

/* ══ CALENDAR ══ */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;gap:4px}
.cal-nav-btn{background:transparent;border:none;color:var(--rescue);width:36px;height:36px;border-radius:8px;font-size:20px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-nav-btn:hover{background:var(--rescueGlow);border:1px solid rgba(230,81,0,.3)}
.cal-nav-btn:active{transform:scale(.88)}
.cal-month-label{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:var(--txt);text-align:center;flex:1}
.cal-month-label span{color:var(--rescue)}
.btn-today{background:var(--rescueGlow);border:1px solid rgba(230,81,0,.35);color:var(--rescue);padding:5px 10px;border-radius:7px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.5px;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.btn-today:hover{background:rgba(230,81,0,.25);border-color:var(--rescue)}

/* Range hint */
.range-hint{text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;padding:7px 12px;border-radius:8px;margin-bottom:8px;transition:all .25s}
.rh-idle{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.rh-picking{background:rgba(230,81,0,.10);border:1px solid rgba(230,81,0,.4);color:var(--rescue);animation:rangeGlow 2s infinite}
.rh-set{background:rgba(39,174,96,.10);border:1px solid rgba(39,174,96,.3);color:var(--green)}

/* Grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px}
.cal-dow{text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--muted);padding:5px 0;font-weight:700}
.cal-dow.wknd{color:rgba(184,169,154,.4)}
.cal-day{
  text-align:center;border-radius:8px;cursor:pointer;
  border:1px solid transparent;position:relative;overflow:hidden;
  min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  user-select:none;-webkit-user-select:none;transition:background .12s,border .12s,transform .1s;
}
.cal-day:hover:not(.other-m):not(.disabled){filter:brightness(1.15)}
.cal-day:active:not(.other-m){transform:scale(.90)}
.cal-day.other-m{opacity:.12;pointer-events:none}
.cal-day.today{box-shadow:0 0 0 2px var(--rescue)!important}
.cal-day.today .dnum{position:relative}
.dnum{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;line-height:1;color:inherit}
.day-bars{display:none} /* barres désactivées — couleur de fond à la place */

/* Range states */
.cal-day.r-start,.cal-day.r-end{
  background:var(--rescue)!important;border-color:var(--rescue)!important;
  box-shadow:0 0 14px rgba(230,81,0,.5),0 0 0 2px rgba(230,81,0,.3);z-index:2;
}
.cal-day.r-start .dnum,.cal-day.r-end .dnum{color:#fff!important}
.cal-day.r-start span,.cal-day.r-end span{color:#fff!important}
.cal-day.in-range{background:rgba(230,81,0,.35)!important;border-color:rgba(230,81,0,.6)!important;border-radius:0}
.cal-day.in-range .dnum{color:#fff!important}
.cal-day.r-start:not(.r-end)::after{content:'';position:absolute;top:0;right:-1px;bottom:0;width:55%;background:rgba(230,81,0,.35);z-index:-1}
.cal-day.r-end:not(.r-start)::before{content:'';position:absolute;top:0;left:-1px;bottom:0;width:55%;background:rgba(230,81,0,.35);z-index:-1}

/* ── STATUS PICKER ── */
.status-picker-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-top:10px;animation:fadeIn .22s ease}
.sp-title{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:4px}
.sp-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--rescue);margin-bottom:11px}
.sp-date.is-range{color:var(--green)}
.status-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.sbtn{padding:12px 6px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.2px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .18s;text-align:center}
.sbtn:active{transform:scale(.94)}
.sbtn-dispo{background:rgba(39,174,96,.12);color:var(--dispo);border-color:rgba(39,174,96,.25)}
.sbtn-dispo:hover,.sbtn-dispo.on{background:rgba(39,174,96,.28);border-color:var(--dispo);box-shadow:0 0 14px rgba(39,174,96,.2)}
.sbtn-jour{background:rgba(243,156,18,.12);color:#F39C12;border-color:rgba(243,156,18,.25)}
.sbtn-jour:hover,.sbtn-jour.on{background:rgba(243,156,18,.28);border-color:#F39C12;box-shadow:0 0 14px rgba(243,156,18,.2)}
.sbtn-nuit{background:rgba(142,68,173,.12);color:#8E44AD;border-color:rgba(142,68,173,.25)}
.sbtn-nuit:hover,.sbtn-nuit.on{background:rgba(142,68,173,.28);border-color:#8E44AD;box-shadow:0 0 14px rgba(142,68,173,.2)}
.sbtn-indispo{background:rgba(192,57,43,.12);color:var(--indispo);border-color:rgba(192,57,43,.25)}
.sbtn-indispo:hover,.sbtn-indispo.on{background:rgba(192,57,43,.28);border-color:var(--indispo);box-shadow:0 0 14px rgba(192,57,43,.2)}
.sbtn-vacances{background:rgba(230,126,34,.12);color:var(--vacances);border-color:rgba(230,126,34,.25)}
.sbtn-vacances:hover,.sbtn-vacances.on{background:rgba(230,126,34,.28);border-color:var(--vacances);box-shadow:0 0 14px rgba(230,126,34,.2)}
.sbtn-formation{background:rgba(59,130,246,.12);color:var(--formation);border-color:rgba(59,130,246,.25)}
.sbtn-formation:hover,.sbtn-formation.on{background:rgba(59,130,246,.28);border-color:var(--formation);box-shadow:0 0 14px rgba(59,130,246,.2)}
.sbtn-clear{background:var(--card);color:var(--muted);border-color:var(--border);grid-column:span 3;font-size:11px;padding:9px;letter-spacing:1px}
.sbtn-clear:hover{border-color:var(--red);color:var(--red)}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:9px 14px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--border);margin-top:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted)}
.ldot{width:22px;height:5px;border-radius:3px;opacity:.9}

/* ══ CHEF VUE GRILLE ══ */
.chef-view-toggle{display:flex;gap:6px;margin-bottom:10px}
.view-btn{flex:1;padding:8px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s;text-align:center}
.view-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.08)}

/* Team grid table */
.team-grid-wrap{overflow-x:auto;margin-top:10px;border-radius:var(--radius);border:1px solid var(--border)}
.team-grid{width:100%;border-collapse:collapse;min-width:340px}
.team-grid th{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1.5px;color:var(--muted);padding:7px 4px;text-align:center;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0}
.team-grid th.name-col{text-align:left;padding-left:10px;min-width:90px}
.team-grid th.today-col{color:var(--rescue)!important}
.team-grid td{padding:5px 3px;border-bottom:1px solid rgba(68,40,46,.25);text-align:center;vertical-align:middle}
.team-grid td.name-td{text-align:left;padding-left:10px;font-size:12px;font-weight:600;white-space:nowrap}
.team-grid td.chef-td{color:var(--gold)}
.team-grid tr:last-child td{border-bottom:none}
.team-grid tr:hover td{background:rgba(230,81,0,.04)}
.cell-bar{height:6px;border-radius:3px;margin:0 auto;width:80%;opacity:.9}
.cell-empty{width:6px;height:6px;border-radius:50%;background:var(--border);margin:0 auto;opacity:.4}

/* Chef day detail */
.chef-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:10px;animation:fadeIn .25s ease}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.sbox{text-align:center;padding:11px 5px;border-radius:9px;border:1px solid var(--border)}
.sbox .sn{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;line-height:1}
.sbox .sl{font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:1.5px;color:var(--muted);margin-top:3px}
.sbox-dispo{background:rgba(39,174,96,.07);border-color:rgba(39,174,96,.2)}.sbox-dispo .sn{color:var(--dispo)}
.sbox-indispo{background:rgba(192,57,43,.07);border-color:rgba(192,57,43,.2)}.sbox-indispo .sn{color:var(--indispo)}
.sbox-vacances{background:rgba(230,126,34,.07);border-color:rgba(230,126,34,.2)}.sbox-vacances .sn{color:var(--vacances)}
.sbox-formation{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.2)}.sbox-formation .sn{color:var(--formation)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.filter-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .18s}
.filter-btn.on{border-color:var(--rescue);color:var(--rescue);background:var(--rescueGlow)}
.prow{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;transition:border .15s}
.prow:hover{border-color:rgba(230,81,0,.2)}
.pname{font-weight:600;font-size:13px}
.pmeta{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:1px}
.chef-color{color:var(--gold)!important}
.mbadge{padding:3px 8px;border-radius:5px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;font-weight:700}
.mb-dispo{background:rgba(39,174,96,.15);color:var(--dispo)}.mb-indispo{background:rgba(192,57,43,.15);color:var(--indispo)}
.mb-vacances{background:rgba(230,126,34,.15);color:var(--vacances)}.mb-formation{background:rgba(59,130,246,.15);color:var(--formation)}
.mb-none{background:var(--card);color:var(--muted);border:1px solid var(--border)}

/* ── BOOKER ── */
.booker-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.flbl{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2.5px;color:var(--muted);margin-bottom:7px;display:block}
.finput{width:100%;padding:11px 14px;border-radius:var(--radius-sm);background:var(--card2);border:1px solid var(--border);color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;transition:border-color .2s;outline:none;margin-bottom:12px;-webkit-appearance:none;appearance:none;color-scheme:dark}
.finput:focus{border-color:var(--rescue);box-shadow:0 0 0 3px rgba(230,81,0,.08)}
.finput option{background:var(--cardSolid);color:var(--txt)}
body.light .finput{color-scheme:light}
.btn{width:100%;padding:13px;border:none;border-radius:var(--radius);font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .22s;font-weight:700}
.btn-rescue{background:linear-gradient(135deg,var(--rescue),var(--rescueD));color:#fff;box-shadow:0 4px 16px rgba(230,81,0,.2)}
.btn-rescue:hover{box-shadow:0 6px 24px rgba(230,81,0,.38);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,#2ecc71,#1a8a47);color:#fff;box-shadow:0 4px 16px rgba(39,174,96,.2)}
.btn-outline{background:transparent;border:1px dashed var(--rescue);color:var(--rescue);font-size:13px;padding:11px}
.btn-outline:hover{background:var(--rescueGlow);border-style:solid}
.btn-share{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;font-size:13px;padding:12px;box-shadow:0 4px 16px rgba(59,130,246,.2)}
.btn-share:hover{box-shadow:0 6px 24px rgba(59,130,246,.38);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;transition:border .15s;animation:fadeIn .2s ease}
.team-card:hover{border-color:rgba(230,81,0,.25)}
.tname{font-weight:700;font-size:13px}
.trole{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;color:var(--gold);margin-top:2px}
.tville{font-size:11px;color:var(--muted);margin-top:1px}
.rmvbtn{background:none;border:1px solid rgba(192,57,43,.4);color:var(--red);width:28px;height:28px;border-radius:50%;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rmvbtn:hover{background:rgba(192,57,43,.15)}
.work-plan{background:var(--card);border:2px solid var(--rescue);border-radius:var(--radius-lg);padding:18px;margin-top:14px;animation:fadeIn .3s ease}
.wp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.wp-row:last-child{border:none}
.wp-lbl{color:var(--muted);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.5px}
.wp-val{font-weight:600}
.wp-m{padding:6px 10px;border-radius:7px;margin-bottom:4px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.wp-m-norm{background:rgba(39,174,96,.07);border:1px solid rgba(39,174,96,.15)}
.wp-m-chef{background:rgba(212,160,23,.07);border:1px solid rgba(212,160,23,.2)}
.wp-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}

/* ── LOCK ── */
.lock-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(12,6,8,.98);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(24px);animation:fadeIn .3s ease}
.lock-logo{width:88px;height:88px;border-radius:50%;border:3px solid var(--rescue);object-fit:cover;box-shadow:0 0 0 1px rgba(230,81,0,.2),0 0 40px rgba(230,81,0,.2),0 0 80px rgba(230,81,0,.08);animation:float 4s ease-in-out infinite}
.lock-title{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:4px;color:var(--rescue)}
.lock-sub{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted)}
.pin-row{display:flex;gap:10px;justify-content:center;margin:10px 0}
.pin-dot{width:50px;height:58px;border-radius:11px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--rescue);font-weight:700;transition:all .2s;background:var(--card)}
.pin-dot.filled{border-color:var(--rescue);box-shadow:0 0 14px rgba(230,81,0,.18)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:270px}
.numpad button{height:52px;border-radius:11px;background:var(--card);border:1px solid var(--border);color:var(--txt);font-size:21px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.numpad button:active{background:var(--rescueGlow);transform:scale(.92);border-color:var(--rescue)}
.pin-err{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;color:var(--red);min-height:16px;text-align:center}

/* ── TOAST ── */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-110%);padding:10px 22px;border-radius:12px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;font-weight:700;z-index:9999;pointer-events:none;max-width:92%;text-align:center;backdrop-filter:blur(12px);animation:toastIn .35s cubic-bezier(.4,0,.2,1) forwards}
.toast-ok{background:rgba(39,174,96,.92);color:#fff}.toast-err{background:rgba(192,57,43,.92);color:#fff}
.toast-info{background:rgba(59,130,246,.92);color:#fff}.toast-off{background:rgba(230,126,34,.92);color:#fff}

#theme-pill{position:fixed;top:50px;left:10px;z-index:9999}
#btn-theme{width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);opacity:.7;transition:all .2s}
#btn-theme:hover{opacity:1}
.sec-div{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:8px;margin:12px 0 8px}
.sec-div::before,.sec-div::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(68,40,46,.55),transparent)}
.sec-div::after{background:linear-gradient(to left,rgba(68,40,46,.55),transparent)}
/* ── DAY PEOPLE PANEL ── */
.day-panel{background:var(--card);border:2px solid var(--rescue);border-radius:var(--radius-lg);padding:18px;margin-top:14px;animation:fadeIn .22s ease;box-shadow:0 0 24px rgba(230,81,0,.08)}
.day-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.day-panel-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;color:var(--txt)}
.day-panel-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.today-tag{background:var(--rescueGlow);border:1px solid rgba(230,81,0,.3);color:var(--rescue);padding:2px 8px;border-radius:4px;font-size:10px;letter-spacing:1px;margin-left:6px;vertical-align:middle}
.dp-group{margin-bottom:4px}
.dp-group:last-child{margin-bottom:0}
.dp-group-label{display:flex;align-items:center;gap:8px;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;font-weight:700;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;user-select:none;border-bottom:none!important;margin-bottom:0}
.dp-group-label:hover{background:rgba(255,255,255,.04)}
.dp-chevron{margin-left:auto;font-size:11px;transition:transform .2s;color:var(--muted);flex-shrink:0}
.dp-group-label.open .dp-chevron{transform:rotate(180deg)}
.dp-group-bar{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.dp-count{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.8}
.dp-names{display:flex;flex-wrap:wrap;gap:7px;padding:4px 10px 10px 10px;animation:fadeIn .15s ease}
.dp-names.collapsed{display:none}
.dp-name{padding:7px 14px;border-radius:20px;font-size:14px;font-weight:600;background:var(--card2);border:1px solid var(--border);color:var(--txt);transition:border .15s}
.dp-chef{border-color:rgba(212,160,23,.5);color:var(--gold);background:rgba(212,160,23,.1);font-size:14px}
.dp-muted{color:var(--muted);font-weight:400;font-size:12px;opacity:.6}

/* ── VUE SEMAINE ── */
.view-mode-toggle{display:flex;gap:5px;margin-bottom:10px}
.vm-btn{flex:1;padding:7px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s;text-align:center}
.vm-btn.active{border-color:var(--rescue);color:var(--rescue);background:var(--rescueGlow)}
.week-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.week-day-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px}
.week-day-row:hover{border-color:rgba(230,81,0,.3);background:rgba(230,81,0,.04)}
.week-day-row.wdr-today{border-color:var(--rescue);background:var(--rescueGlow)}
.week-day-row.wdr-selected{border-color:var(--green);background:rgba(39,174,96,.07)}
.wdr-date{flex-shrink:0;text-align:center;min-width:42px}
.wdr-dow{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted)}
.wdr-num{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;line-height:1;color:var(--txt)}
.wdr-today .wdr-num{color:var(--rescue)}
.wdr-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.wdr-bar-row{display:flex;align-items:center;gap:6px}
.wdr-bar-fill{height:6px;border-radius:3px;transition:width .3s;min-width:4px}
.wdr-bar-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted);min-width:60px}
.wdr-bar-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.wdr-my-status{flex-shrink:0;padding:3px 9px;border-radius:6px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;font-weight:700}

/* ── RÉCAP MATRICE ── */
.recap-controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.recap-filter-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.recap-filter-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.08)}
.matrix-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);-webkit-overflow-scrolling:touch}
.matrix-table{border-collapse:collapse;min-width:100%}
.matrix-table th{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted);padding:6px 3px;text-align:center;background:var(--card);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.matrix-table th.mth-name{text-align:left;padding-left:10px;min-width:80px;position:sticky;left:0;z-index:3;background:var(--card)}
.matrix-table th.mth-today{color:var(--rescue)}
.matrix-table td{padding:3px 3px;border-bottom:1px solid rgba(68,40,46,.18);vertical-align:middle;text-align:center}
.matrix-table td.mtd-name{text-align:left;padding-left:10px;font-size:11px;font-weight:600;white-space:nowrap;position:sticky;left:0;background:var(--cardSolid);z-index:1;border-right:1px solid var(--border)}
.matrix-table td.mtd-chef{color:var(--gold)}
.matrix-table tr:hover td{background:rgba(230,81,0,.04)}
.matrix-table tr:hover td.mtd-name{background:rgba(230,81,0,.06)}
.mcell{width:18px;height:18px;border-radius:4px;margin:0 auto;transition:transform .1s}
.mcell:active{transform:scale(.85)}
.mcell-empty{width:10px;height:10px;border-radius:50%;background:var(--border);margin:0 auto;opacity:.3}
.matrix-legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px;margin-top:6px;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted)}
.matrix-legend span{display:flex;align-items:center;gap:4px}
.matrix-legend .ml-box{width:10px;height:10px;border-radius:2px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--rescue);border-radius:4px}
.hidden{display:none!important}

/* ── Leaflet map ── */
#agendaMap{height:220px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px}
.leaflet-popup-content-wrapper{background:var(--cardSolid)!important;color:var(--txt)!important;border:1px solid var(--border)!important;border-radius:var(--radius-sm)!important}
.leaflet-popup-tip{background:var(--cardSolid)!important}
.leaflet-popup-content{font-family:'Inter',sans-serif;font-size:12px}

/* ── Conflict alert ── */
.conflict-alert{padding:8px 12px;border-radius:9px;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);font-size:11px;color:#C0392B;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.conflict-alert .ca-icon{font-size:14px;flex-shrink:0}

/* ── Offline badge ── */
.offline-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(192,57,43,.95);color:#fff;text-align:center;padding:6px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;transform:translateY(-100%);transition:transform .3s}
.offline-banner.visible{transform:translateY(0)}

/* ── History sparkline ── */
.sparkline{display:flex;align-items:flex-end;gap:1px;height:24px}
.sparkline-bar{flex:1;border-radius:1px;min-width:2px;transition:height .3s}

/* ── Rappel badge ── */
.rappel-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;animation:rappelPulse 1.5s infinite}
@keyframes rappelPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ══════════════════════════════════════════
   CHAT MODULE
   ══════════════════════════════════════════ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 170px);max-height:calc(100dvh - 170px);background:var(--bg);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.chat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.chat-header-title{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gold);font-weight:700;flex:1}
.chat-header-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.chat-pinned{padding:8px 14px;background:rgba(212,160,23,.08);border-bottom:1px solid rgba(212,160,23,.2);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt);flex-shrink:0}
.chat-pinned .cp-icon{font-size:14px;flex-shrink:0}
.chat-pinned .cp-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-pinned .cp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px}
.chat-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--rescue);border-radius:3px}
.chat-day-sep{text-align:center;padding:10px 0 6px;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted)}
.chat-group{display:flex;gap:8px;margin-bottom:6px;max-width:85%}
.chat-group.mine{margin-left:auto;flex-direction:row-reverse}
.chat-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end}
.chat-group.mine .chat-avatar{display:none}
.chat-bubbles{display:flex;flex-direction:column;gap:2px;min-width:0}
.chat-author{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;color:var(--gold);margin-bottom:2px;margin-left:4px}
.chat-group.mine .chat-author{display:none}
.chat-bubble{position:relative;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-break:break-word;max-width:100%}
.chat-bubble.other{background:var(--card);border:1px solid var(--border);color:var(--txt);border-bottom-left-radius:4px}
.chat-bubble.mine{background:var(--rescue);color:#fff;border-bottom-right-radius:4px}
.chat-bubble .cb-time{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:.5;margin-top:2px;display:block}
.chat-bubble.mine .cb-time{text-align:right}
.chat-mention{background:rgba(230,81,0,.25);color:var(--rescue);padding:1px 4px;border-radius:4px;font-weight:600}
.chat-bubble.mine .chat-mention{background:rgba(255,255,255,.2);color:#fff}
.chat-reactions{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.chat-react-btn{padding:2px 6px;border-radius:10px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all .12s;display:flex;align-items:center;gap:2px}
.chat-react-btn.active{border-color:var(--rescue);background:rgba(230,81,0,.12)}
.chat-react-btn .cr-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.chat-hover-actions{position:absolute;top:-8px;right:4px;display:none;gap:2px;background:var(--cardSolid);border:1px solid var(--border);border-radius:8px;padding:2px 4px;z-index:10}
.chat-bubble.other .chat-hover-actions{right:auto;left:4px}
.chat-bubble:hover .chat-hover-actions{display:flex}
.chat-hover-actions button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;transition:background .1s}
.chat-hover-actions button:hover{background:rgba(255,255,255,.1)}
.chat-input-wrap{display:flex;gap:8px;padding:10px 14px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end}
.chat-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:18px;padding:9px 14px;color:var(--txt);font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:none;max-height:80px;min-height:36px;line-height:1.3;transition:border-color .15s}
.chat-input:focus{border-color:var(--rescue)}
.chat-input::placeholder{color:var(--muted)}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--rescue);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.chat-send:disabled{opacity:.3;cursor:default}
.chat-new-msg-btn{position:sticky;bottom:8px;align-self:center;padding:6px 14px;border-radius:16px;background:var(--rescue);color:#fff;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;border:none;cursor:pointer;box-shadow:0 2px 12px rgba(230,81,0,.4);z-index:5}
/* mention dropdown */
.chat-mention-dd{position:absolute;bottom:100%;left:14px;right:14px;max-height:180px;overflow-y:auto;background:var(--cardSolid);border:1px solid var(--border);border-radius:var(--radius-sm);z-index:20;display:none}
.chat-mention-dd.visible{display:block}
.chat-mention-dd-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--txt);display:flex;align-items:center;gap:8px;transition:background .1s}
.chat-mention-dd-item:hover,.chat-mention-dd-item.selected{background:rgba(230,81,0,.12)}
.chat-mention-dd-item .cmdi-role{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted)}
/* DM sidebar */
.chat-dm-list{display:flex;flex-direction:column;gap:2px;padding:8px}
.chat-dm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s}
.chat-dm-item:hover,.chat-dm-item.active{background:rgba(230,81,0,.1)}
.chat-dm-item .dmi-name{flex:1;font-size:12px;font-weight:600;color:var(--txt)}
.chat-dm-item .dmi-badge{width:8px;height:8px;border-radius:50%;background:var(--rescue)}
/* tab badge */
.tab-badge{display:inline-block;min-width:16px;height:16px;line-height:16px;text-align:center;border-radius:8px;background:var(--rescue);color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;margin-left:4px;padding:0 4px}

/* ── RESPONSIVE 375px ── */
@media(max-width:500px){
  .app{max-width:100%;padding:0}
  .header{padding:10px 12px}
  .header-logo{width:28px;height:28px}
  .header-title{font-size:11px}
  .header-sub{font-size:8px}
  .tab-bar{gap:0}
  .tab-btn{font-size:9px;letter-spacing:.5px;padding:8px 4px;min-width:0}
  .summary-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px!important}
  .sbox .sn{font-size:22px}
  .sbox .sl{font-size:7px}
  .chef-card{padding:10px}
  .cal-day{min-width:32px;font-size:11px}
  .team-grid{min-width:0!important}
  .matrix-table{font-size:9px}
  .matrix-table td,.matrix-table th{padding:4px 3px}
  .chat-input-row input{font-size:13px}
}
@media(max-width:360px){
  .tab-btn{font-size:8px;padding:7px 2px}
  .header-title{font-size:10px;letter-spacing:1px}
}

/* ═══ MICRO-ANIMATIONS ═══ */
@keyframes status-flash{0%{box-shadow:0 0 0 0 rgba(212,160,23,.5)}50%{box-shadow:0 0 16px 4px rgba(212,160,23,.3)}100%{box-shadow:none}}
.flash-status{animation:status-flash .3s ease}
@keyframes slide-up-in{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slide-right-in{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse-orange{0%,100%{box-shadow:0 0 0 0 rgba(230,81,0,.4)}50%{box-shadow:0 0 8px 3px rgba(230,81,0,.2)}}
.pulse-badge{animation:pulse-orange 1.5s ease infinite}
@keyframes skel-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,#1a1d27 25%,#222632 50%,#1a1d27 75%);background-size:200% 100%;animation:skel-shimmer 1.2s ease infinite;border-radius:8px;min-height:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.tab-fade{animation:fadeIn .15s ease}
.slide-msg{animation:slide-up-in .15s ease-out}

/* Tap button effect */
.tap-btn{position:relative;overflow:hidden;transition:transform .1s ease}
.tap-btn:active{transform:scale(.95)}

/* Lisibilité terrain */
.tab-btn,button{min-height:48px}
input,select,textarea{min-height:52px;font-size:16px}

/* Onboarding tour */
.tour-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.tour-card{background:#1a1d27;border:2px solid #E65100;border-radius:20px;padding:32px 24px;max-width:380px;width:90%;text-align:center;animation:slide-up-in .2s ease-out}
.tour-step{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:#71717a;margin-bottom:12px}
.tour-title{font-family:'Oswald',sans-serif;font-size:1.3rem;letter-spacing:2px;color:#E65100;margin-bottom:8px}
.tour-body{font-size:.85rem;color:#e4e4e7;line-height:1.6;margin-bottom:20px}
.tour-dots{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.tour-dot{width:8px;height:8px;border-radius:50%;background:#2a2e3a;transition:all .2s}
.tour-dot.active{background:#E65100;width:20px;border-radius:4px}
.tour-btn{padding:12px 28px;border-radius:10px;border:none;font-family:'Oswald',sans-serif;font-size:.8rem;letter-spacing:2px;cursor:pointer;min-height:48px}
.tour-btn-primary{background:#E65100;color:#fff}
.tour-btn-primary:active{transform:scale(.95)}
.tour-btn-skip{background:transparent;color:#71717a;border:1px solid #2a2e3a}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.skeleton{animation:none}.pulse-badge{animation:none}}
</style>
</head>

<script>

const LS='volo_agenda_';
const MONTHS=['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];

const SCSS={DISPO:'dispo',JOUR:'jour',NUIT:'nuit',INDISPO:'indispo',VACANCES:'vacances',FORMATION:'formation'};
const SCOLORS={DISPO:'#27AE60',JOUR:'#F39C12',NUIT:'#8E44AD',INDISPO:'#C0392B',VACANCES:'#E67E22',FORMATION:'#3B82F6'};
const ICONS={DISPO:'✅',JOUR:'☀️',NUIT:'🌙',INDISPO:'🚫',VACANCES:'🏖',FORMATION:'📚'};
const MISSION_TYPES=[
  {id:'espace-confine',   name:'Espace confiné'},
  {id:'vertical',        name:'Sauvetage vertical'},
  {id:'atmospherique',   name:'Risques atmosphériques'},
  {id:'shutdown',        name:'Shutdown / Arrêt planifié'}
];

let currentUser=null, viewMonth=new Date().getMonth(), viewYear=new Date().getFullYear();
let activeTab='calendar', pinBuffer='', bookerTeam=[];
let rStart=null, rEnd=null, rState='idle';
let calDaySelected=null;
let chefView='grid';
let chefSel=null, chefFilters=['DISPO','JOUR','NUIT','INDISPO','VACANCES','FORMATION','NONE'];
let swipeX0=null;
let bookerRegion='ALL', bookerNbReq=4, bookerAlerts=[];
let bookerDateStart='', bookerDateEnd='', bookerSiteVal='', bookerTypeVal='';
let recapRegion='ALL', recapDays=14, recapSauvOpen=true, recapSurvOpen=false;
let dashOpen=true; // dashboard collapsible
let syncStatus='idle'; // 'idle'|'syncing'|'ok'|'err'
let lastSyncTime=null;

// ── Helpers ──
const tsKey=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const parseK=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const fmtFR=s=>{const d=parseK(s);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();};
const fmtShort=s=>{const d=parseK(s);return d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3);};
const CHEF_OVERRIDE=['V0205']; // Jonathan Milone — droits chef par override
const isChef=p=>p&&p.role&&(p.role.toUpperCase().includes('CHEF')||p.role==='COORDONNATEUR')||CHEF_OVERRIDE.includes(p?.volo);

// ══════════════════════════════════════════
//  FIREBASE-FIRST DATA LAYER
//  Règle: toute écriture → Firebase + localStorage
//  Toute lecture → cache local (mis à jour par listeners Firebase)
//  Offline → queue locale, flush à reconnexion
// ══════════════════════════════════════════

// ── Cache local en mémoire (hydraté par Firebase listeners) ──
const _cache = {
  avail: {},     // { uid: { date: status } }
  contrats: [],  // [ {id, debut, fin, site, type, membres, nomsMembres, createdAt} ]
  sondages: [],  // [ {id, titre, options, createdAt} ]
  votes: {},     // { pollId: { uid: [optionIds] } }
  appel: {},     // { uid: { date: status } }
  _contratsLoaded: false,
  _sondagesLoaded: false,
};
let _fbListenersActive = false;
let _offlineQueue = []; // [{path, data, ts}]
const LS_QUEUE = LS+'offline_queue';
const LS_CONTRATS = LS+'contrats';
const LS_SONDAGES = LS+'sondages_list';
const LS_VOTE = LS+'vote_';
const LS_APPEL = LS+'appel_';

// ── Helpers Firebase ──
function fbRef(path){ return firebaseDB ? firebaseDB.ref(path) : null; }
function fbSet(path, data){
  // Écrit Firebase + localStorage backup
  const ref = fbRef(path);
  if(ref && navigator.onLine){
    ref.set(data).catch(()=> _queueOffline(path, data));
  } else {
    _queueOffline(path, data);
  }
}

function fbRemove(path){
  const ref = fbRef(path);
  if(ref && navigator.onLine){
    ref.remove().catch(()=> _queueOffline(path, null));
  } else {
    _queueOffline(path, null);
  }
}

// ── Offline Queue — jamais perdre une donnée ──
function _queueOffline(path, data){
  _offlineQueue.push({path, data, ts:Date.now()});
  _saveOfflineQueue();
}
function _loadOfflineQueue(){ try{_offlineQueue=JSON.parse(localStorage.getItem(LS_QUEUE))||[];}catch(e){_offlineQueue=[];} }
function _saveOfflineQueue(){ localStorage.setItem(LS_QUEUE, JSON.stringify(_offlineQueue)); }
async function flushOfflineQueue(){
  if(!firebaseDB || !navigator.onLine) return;
  _loadOfflineQueue();
  if(!_offlineQueue.length) return;
  let ok=0;
  for(const entry of _offlineQueue){
    try{
      const ref = firebaseDB.ref(entry.path);
      if(entry.data===null) await ref.remove();
      else await ref.set(entry.data);
      ok++;
    }catch(e){ break; } // arrête au premier échec, on retry après
  }
  if(ok>0){
    _offlineQueue = _offlineQueue.slice(ok);
    _saveOfflineQueue();
    if(!_offlineQueue.length) showToast('✓ '+ok+' changements synchronisés','ok');
    else showToast(ok+' sync — '+_offlineQueue.length+' en attente','off');
    render();
  }
}

// ── DISPONIBILITÉS ──
function getAvail(uid, ds){
  // Lecture depuis cache mémoire (hydraté par Firebase listener)
  if(_cache.avail[uid] && _cache.avail[uid][ds]) return _cache.avail[uid][ds];
  // Fallback localStorage (premier chargement / offline)
  return localStorage.getItem(LS+uid+'_'+ds) || null;
}
function setAvail(uid, ds, st){
  // 1. Cache mémoire
  if(!_cache.avail[uid]) _cache.avail[uid]={};
  if(st){ _cache.avail[uid][ds]=st; } else { delete _cache.avail[uid][ds]; }
  // 2. localStorage backup
  st ? localStorage.setItem(LS+uid+'_'+ds, st) : localStorage.removeItem(LS+uid+'_'+ds);
  // 3. Firebase
  if(st) fbSet('availabilities/'+uid+'/'+ds, st);
  else fbRemove('availabilities/'+uid+'/'+ds);
}

// ── CONTRATS ──
function getContrats(){ return _cache._contratsLoaded ? _cache.contrats : (function(){ try{return JSON.parse(localStorage.getItem(LS_CONTRATS))||[];}catch(e){return [];} })(); }
function saveContrats(c){ _cache.contrats=c; _cache._contratsLoaded=true; localStorage.setItem(LS_CONTRATS, JSON.stringify(c)); }
function addContrat(contrat){
  const c = getContrats(); c.push(contrat); saveContrats(c);
  // Firebase: écrire le contrat individuel
  fbSet('contracts/'+contrat.id, contrat);
}
function removeContrat(id){
  saveContrats(getContrats().filter(c=>c.id!==id));
  fbRemove('contracts/'+id);
  render();
}

// ── SONDAGES ──
function getSondages(){ return _cache._sondagesLoaded ? _cache.sondages : (function(){ try{return JSON.parse(localStorage.getItem(LS_SONDAGES))||[];}catch(e){return [];} })(); }
function saveSondages(arr){ _cache.sondages=arr; _cache._sondagesLoaded=true; localStorage.setItem(LS_SONDAGES, JSON.stringify(arr)); }
function getSondage(sid){ return getSondages().find(s=>s.id===sid)||null; }
function addSondage(s){
  const arr=getSondages(); arr.push(s); saveSondages(arr);
  fbSet('polls/'+s.id, {titre:s.titre, options:s.options, createdBy:currentUser?.id||'', createdAt:s.createdAt, active:true});
}
function removeSondage(sid){

function getAllVotes(sid){

  if(_cache.votes[sid]){

      if(p && Array.isArray(opts)) opts.forEach(oid=>{ res[oid]=(res[oid]||[]); res[oid].push(p); });

// ── FIREBASE LISTENERS — sync temps réel ──
function startFirebaseListeners(){
  if(!firebaseDB || _fbListenersActive) return;
  _fbListenersActive = true;
  syncStatus='syncing'; renderSyncBadge();

  // Listener: availabilities
  firebaseDB.ref('availabilities').on('value', snap=>{
    const data = snap.val() || {};
    _cache.avail = data;
    // Sync → localStorage backup
    Object.entries(data).forEach(([uid, dates])=>{
      if(dates && typeof dates==='object'){
        Object.entries(dates).forEach(([ds, st])=>{
          st ? localStorage.setItem(LS+uid+'_'+ds, st) : localStorage.removeItem(LS+uid+'_'+ds);
        });
      }
    });
    lastSyncTime=new Date(); syncStatus='ok'; renderSyncBadge();
    render();
  }, ()=>{ syncStatus='err'; renderSyncBadge(); });

  // Listener: contracts
  firebaseDB.ref('contracts').on('value', snap=>{
    const data = snap.val() || {};
    _cache.contrats = Object.values(data);
    _cache._contratsLoaded = true;
    localStorage.setItem(LS_CONTRATS, JSON.stringify(_cache.contrats));
    render();
  });

  // Listener: polls
  firebaseDB.ref('polls').on('value', snap=>{
    const data = snap.val() || {};
    _cache.sondages = Object.entries(data).map(([id,v])=>({id,...v}));
    _cache._sondagesLoaded = true;
    localStorage.setItem(LS_SONDAGES, JSON.stringify(_cache.sondages));
    render();
  });

  // Listener: votes
  firebaseDB.ref('votes').on('value', snap=>{
    _cache.votes = snap.val() || {};
    // Sync votes to localStorage
    Object.entries(_cache.votes).forEach(([sid, users])=>{
      if(users && typeof users==='object'){
        Object.entries(users).forEach(([uid, opts])=>{
          localStorage.setItem(LS_VOTE+sid+'_'+uid, JSON.stringify(opts));
        });
      }
    });
  });

  // Listener: appel
  firebaseDB.ref('appel').on('value', snap=>{
    _cache.appel = snap.val() || {};
    // Sync appel to localStorage
    Object.entries(_cache.appel).forEach(([uid, dates])=>{
      if(dates && typeof dates==='object'){
        Object.entries(dates).forEach(([ds, st])=>{
          st ? localStorage.setItem(LS_APPEL+uid+'_'+ds, st) : localStorage.removeItem(LS_APPEL+uid+'_'+ds);
        });
      }
    });
  });
}

function stopFirebaseListeners(){
  if(!firebaseDB) return;
  ['availabilities','contracts','polls','votes','appel'].forEach(p=>{
    try{ firebaseDB.ref(p).off(); }catch(e){}
  });
  _fbListenersActive = false;
}

function detectConflicts(){
  const contrats=typeof getContrats==='function'?getContrats():[];
  if(!contrats.length) return [];
  const today=tsKey(new Date());
  const conflicts=[];
  contrats.forEach(c=>{
    if(!c.membres||!c.fin) return;
    const fin=c.fin||c.debut;
    if(fin<today) return; // terminé
    const allDates=[];
    const lo=parseK(c.debut),hi=parseK(fin);
    for(let d=new Date(lo);d<=hi;d.setDate(d.getDate()+1)) allDates.push(tsKey(new Date(d)));
    c.membres.forEach((uid,i)=>{
      const name=(c.nomsMembres&&c.nomsMembres[i])||uid;
      allDates.forEach(ds=>{
        const st=getAvail(uid,ds);
        if(st==='INDISPO'||st==='VACANCES'||st==='FORMATION'){
          conflicts.push({uid,name,date:ds,status:st,contrat:c.site||c.type||'Mission',contratId:c.id});
        }
      });
    });
  });
  return conflicts;
}
function renderConflictAlerts(){
  const conflicts=detectConflicts();
  if(!conflicts.length) return '';
  // Group by person
  const byPerson={};
  conflicts.forEach(c=>{(byPerson[c.name]=byPerson[c.name]||[]).push(c);});
  let html=`<div style="margin-bottom:10px">
    <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:6px">⚠️ CONFLITS DÉTECTÉS (${conflicts.length})</div>`;
  Object.entries(byPerson).forEach(([name,items])=>{
    const dates=items.map(i=>fmtShort(i.date)+' ('+i.status+')').join(', ');
    html+=`<div class="conflict-alert">
      <span class="ca-icon">🚨</span>
      <div><strong>${name}</strong> — ${items[0].contrat}<br><span style="font-size:10px;color:var(--muted)">${dates}</span></div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// ══════════════════════════════════════════
const LS_HISTORY=LS+'weekly_snapshots';
function getSnapshots(){ try{return JSON.parse(localStorage.getItem(LS_HISTORY))||[];}catch(e){return[];} }
function saveSnapshots(s){ localStorage.setItem(LS_HISTORY,JSON.stringify(s)); }
function takeSnapshot(){
  const snaps=getSnapshots();
  const today=tsKey(new Date());
  // Un snapshot par semaine max
  if(snaps.length&&snaps[snaps.length-1].date===today) return;
  const lastDate=snaps.length?snaps[snaps.length-1].date:null;
  if(lastDate){
    const diff=Math.round((parseK(today)-parseK(lastDate))/86400000);
    if(diff<7) return;
  }
  const field=getAllField();
  const week=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);week.push(tsKey(d));}
  const byPerson={};
  field.forEach(p=>{
    const answered=week.filter(ds=>getAvail(p.id,ds)).length;
    const dispo=week.filter(ds=>DISPO_LIKE(getAvail(p.id,ds))).length;
    byPerson[p.id]={answered,dispo,total:7};
  });
  const totalAnswered=field.reduce((s,p)=>s+(byPerson[p.id]?.answered||0),0);
  const totalDispo=field.reduce((s,p)=>s+(byPerson[p.id]?.dispo||0),0);
  const maxPossible=field.length*7;
  snaps.push({
    date:today,
    tauxReponse:maxPossible?Math.round(totalAnswered/maxPossible*100):0,
    tauxDispo:maxPossible?Math.round(totalDispo/maxPossible*100):0,
    effectif:field.length,
    topRepondeurs:Object.entries(byPerson).sort((a,b)=>b[1].answered-a[1].answered).slice(0,5).map(([id])=>id),
    nonRepondeurs:Object.entries(byPerson).filter(([,v])=>v.answered===0).map(([id])=>id)
  });
  // Garder max 12 semaines
  if(snaps.length>12) snaps.splice(0,snaps.length-12);
  saveSnapshots(snaps);
}

    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">
      <span>${fmtShort(snaps[0].date)}</span>

  return html;

    const imgW=190,imgH=canvas.height*imgW/canvas.width;
    let y=10;
    if(imgH>270){
      // Multi-page
      const pageH=270;
      const pages=Math.ceil(imgH/pageH);
      for(let p=0;p<pages;p++){
        if(p>0) pdf.addPage();
        pdf.addImage(canvas.toDataURL('image/png'),'PNG',10,10-p*pageH,imgW,imgH);
      }
    } else {
      pdf.addImage(canvas.toDataURL('image/png'),'PNG',10,y,imgW,imgH);
    }
    pdf.save('VOLO-SST-Recap-'+tsKey(new Date())+'.pdf');
    showToast('✅ PDF téléchargé','ok');
  }catch(e){
    console.error('PDF error:',e);
    showToast('Erreur PDF — essayez de nouveau','err');
  }
  container.remove();
}

function getReliabilityScore(uid){
  // Calcule sur les 30 derniers jours le % de jours où le membre a répondu
  const days=[];
  for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);days.push(tsKey(d));}
  const answered=days.filter(ds=>getAvail(uid,ds)).length;
  return Math.round(answered/30*100);
}
function renderReliabilityBadge(uid){
  const score=getReliabilityScore(uid);
  const color=score>=70?'#27AE60':score>=40?'#F39C12':'#C0392B';
  const label=score>=70?'Fiable':score>=40?'Moyen':'Faible';
  return `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;background:${color}18;color:${color};border:1px solid ${color}44" title="Fiabilité: ${score}% (30j)">${score}%</span>`;
}

// ── DASHBOARD ──
const DISPO_LIKE=s=>s==='DISPO'||s==='JOUR'||s==='NUIT';
function getDashStats(){
  const today=tsKey(new Date());
  const field=getAllField();
  const week=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);week.push(tsKey(d));}
  const todayDispo=field.filter(p=>DISPO_LIKE(getAvail(p.id,today))).length;
  const todayNone=field.filter(p=>!getAvail(p.id,today)).length;
  const weekDispo=new Set(week.flatMap(ds=>field.filter(p=>DISPO_LIKE(getAvail(p.id,ds))).map(p=>p.id))).size;
  const weekNone=new Set(week.flatMap(ds=>field.filter(p=>!getAvail(p.id,ds)).map(p=>p.id))).size;
  const total=field.length;
  return {todayDispo,todayNone,weekDispo,weekNone,total};
}

  if(swipeX0===null)return;
  const dx=e.changedTouches[0].clientX-swipeX0;

function doVoloLogin(){

  if(!raw){showLoginErr('Entre ton numéro VOLO');return;}
  const padded=raw.padStart(4,'0');
  const voloId='V'+padded;

let sondageTitre='', sondageDeb='', sondageFin='', sondageQuarts={JOUR:true,NUIT:false,COMPLET:false};
let sondageActifId=null; // null = liste, 'new' = formulaire, id = résultats d'un sondage

function publishSondage(){
  if(!sondageTitre){showToast('Titre requis','err');return;}
  if(!sondageDeb){showToast('Date de début requise','err');return;}
  const fin=sondageFin||sondageDeb;
  const quarts=Object.keys(sondageQuarts).filter(q=>sondageQuarts[q]);
  if(!quarts.length){showToast('Choisis au moins un quart','err');return;}
  const options=[];
  const lo=parseK(sondageDeb), hi=parseK(fin);
  for(let d=new Date(lo);d<=hi;d.setDate(d.getDate()+1)){
    quarts.forEach(q=>options.push({id:'o'+Date.now()+Math.random().toString(36).slice(2),date:tsKey(new Date(d)),quart:q}));
  }
  if(!options.length){showToast('Aucune option générée','err');return;}
  const s={id:'s'+Date.now(),titre:sondageTitre,options,createdAt:tsKey(new Date())};
  addSondage(s); sondageTitre=''; sondageDeb=''; sondageFin='';
  showToast('🗳 Sondage publié ('+options.length+' options) — visible dans MOI','ok');
  // Partage automatique dans le chat
  shareSondageChat(s.id);
  render();
}

  h+=`</div>`;

    const isDeb=ds===sondageDeb, isFin=ds===sondageFin;
    const inRange=sondageDeb&&sondageFin&&ds>sondageDeb&&ds<sondageFin;
    const isEnd=isDeb||isFin;
    let bg='transparent', color=isPast?'rgba(184,169,154,.3)':'var(--txt)', border='transparent', fw='400';
    if(inRange){bg='rgba(230,81,0,.12)';border='transparent';}
    if(isEnd){bg='var(--rescue)';color='#fff';fw='700';border='var(--rescue)';}
    if(isToday&&!isEnd){border='var(--muted)';}
    h+=`<div onclick="${isPast?'':'sondagePickDay(\''+ds+'\')'}" style="text-align:center;padding:5px 2px;border-radius:6px;font-size:13px;font-weight:${fw};cursor:${isPast?'default':'pointer'};background:${bg};color:${color};border:1px solid ${border};transition:all .12s${isPast?';opacity:.3':''}">${day}</div>`;

    if(sondageDeb&&sondageFin){

      h+=`<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;margin-left:auto">${nb}j</span>`;

    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

function sondagePickDay(ds){
  if(!sondageDeb||sondageFin||(sondageDeb&&ds<sondageDeb)){
    // Premier clic ou reset
    sondageDeb=ds; sondageFin='';
  } else {
    // Deuxième clic
    if(ds===sondageDeb){sondageDeb='';sondageFin='';}
    else sondageFin=ds;
  }
  render();
}

// ── Partage sondage ──
function sondageToText(s,withResults){
  const votes=getAllVotes(s.id);
  const sauvs=getPers().filter(p=>p.type==='SAUVETEUR');
  let txt='🗳 SONDAGE — '+s.titre+'\n';
  if(withResults){
    const sorted=[...s.options].sort((a,b)=>(votes[b.id]||[]).length-(votes[a.id]||[]).length);
    sorted.slice(0,5).forEach((o,i)=>{
      const icon=o.quart==='JOUR'?'☀️':o.quart==='NUIT'?'🌙':'🔁';
      const n=(votes[o.id]||[]).length;
      txt+=(i===0?'🏆 ':'   ')+icon+' '+fmtShort(o.date)+' '+o.quart+' — '+n+' vote'+(n>1?'s':'')+'\n';
    });
    const voted=sauvs.filter(p=>{try{const v=JSON.parse(localStorage.getItem(LS_VOTE+s.id+'_'+p.id)||'null');return v&&v.length;}catch(e){return false;}}).length;
    txt+='\n'+voted+'/'+sauvs.length+' ont voté';
  } else {
    const dates=[...new Set(s.options.map(o=>o.date))].sort();
    const quarts=[...new Set(s.options.map(o=>o.quart))];
    txt+='📅 '+fmtShort(dates[0])+(dates.length>1?' → '+fmtShort(dates[dates.length-1]):'')+'\n';
    txt+='⏰ '+quarts.join(' / ')+'\n';
    txt+='\nVotez dans l\'app VOLO SST → Agenda → MOI';
  }
  return txt;
}

const APPEL_STATES=['','APPELE','CONFIRME','REFUSE'];
const APPEL_ICONS={'':'📞','APPELE':'⏳','CONFIRME':'✅','REFUSE':'❌'};
const APPEL_LABELS={'':'À appeler','APPELE':'Appelé...','CONFIRME':'Confirmé','REFUSE':'Refusé'};
const APPEL_COLORS={'':'var(--muted)','APPELE':'var(--gold)','CONFIRME':'#27AE60','REFUSE':'#C0392B'};

function buildMissionMsg(ds){
  const contrats=getContrats();
  const actif=contrats.find(c=>ds>=c.debut&&ds<=(c.fin||c.debut));
  const site=actif?.site||actif?.type||'';
  const debut=actif?fmtFR(actif.debut):'';
  const fin=actif&&actif.fin&&actif.fin!==actif.debut?' au '+fmtFR(actif.fin):'';
  const dateStr=debut?(debut+fin):'le '+fmtFR(ds);
  return `Bonjour,\n\nVOLO SST Golden Eagles — ${site?'Mission '+site+' — ':''}`+
    `Êtes-vous disponible ${dateStr} ?\n\nMerci de confirmer rapidement.\n\n🦅 VOLO SST`;
}

function copyContactMsg(name,ds){
  const msg='Bonjour '+name.split(' ')[0]+', VOLO SST — Êtes-vous disponible le '+fmtFR(ds)+' ? Merci de confirmer.';
  navigator.clipboard.writeText(msg).then(()=>showToast('📋 Copié !','ok')).catch(()=>showToast('Erreur copie','err'));
}
function copyContactMsgAll(ds){
  const survs=getSurvs().filter(p=>!getAppel(p.id,ds));

function cycleAppel(uid,ds){
  const cur=getAppel(uid,ds);
  const next=APPEL_STATES[(APPEL_STATES.indexOf(cur)+1)%APPEL_STATES.length];
  _setAppel(uid, ds, next); // Firebase + localStorage
  // Update just the button without full render for speed
  const el=document.getElementById('appel_'+uid+'_'+ds);
  if(el){
    el.textContent=APPEL_ICONS[next]+' '+APPEL_LABELS[next];
    el.style.borderColor=APPEL_COLORS[next];
    el.style.color=APPEL_COLORS[next];
    el.style.background=next?APPEL_COLORS[next]+'1A':'transparent';
  }
}

let emailDateDeb='', emailDateFin='', emailTarget='non-repondus', emailRegion='ALL';

function renderEmailComposer(){
  const regions=getRegions();
  const todayStr=tsKey(new Date());

  let people=getAllField();
  if(emailRegion!=='ALL') people=people.filter(p=>p.region===emailRegion);

  let recipients=[];
  if(emailDateDeb){
    const days=[];
    const deb=parseK(emailDateDeb);
    const fin=emailDateFin?parseK(emailDateFin):deb;
    for(let d=new Date(deb);d<=fin;d.setDate(d.getDate()+1)) days.push(tsKey(new Date(d)));
    if(emailTarget==='non-repondus'){
      recipients=people.filter(p=>days.some(ds=>!getAvail(p.id,ds)));
    } else if(emailTarget==='dispos'){
      recipients=people.filter(p=>days.every(ds=>DISPO_LIKE(getAvail(p.id,ds))));
    } else if(emailTarget==='surveillants'){
      recipients=people.filter(p=>p.type==='SURVEILLANT');

      recipients=people;
    }

  const withEmail=recipients.filter(p=>p.email);
  const emails=withEmail.map(p=>p.email).join('; ');
  const periode=emailDateDeb?(emailDateFin&&emailDateFin!==emailDateDeb?fmtFR(emailDateDeb)+' au '+fmtFR(emailDateFin):fmtFR(emailDateDeb)):'';

    ?`Bonjour,%0A%0ANous avons besoin de confirmer les disponibilités pour la période du ${periode}.%0A%0AMerci de répondre dès que possible en indiquant votre statut :%0A%0A✅ DISPONIBLE%0A🚫 INDISPONIBLE%0A🏖 VACANCES%0A📚 FORMATION%0A%0ACordialement,%0AVOLO SST`
    :`Bonjour,%0A%0AVeuillez confirmer votre disponibilité pour les prochaines dates.%0A%0AMerci,%0AVOLO SST`;

  return `<div style="display:flex;flex-direction:column;gap:10px">

        <span style="color:var(--muted)">→</span>
        <input type="date" class="finput" style="flex:1;padding:8px;margin:0;font-size:13px" value="${emailDateFin}" min="${emailDateDeb||todayStr}" onchange="emailDateFin=this.value;render()">
      </div>

      <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:2px">2 · ENVOYER À</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        ${[
          {v:'non-repondus',l:"N'ont PAS répondu pour ces dates",i:'❓'},
          {v:'surveillants', l:'Tous les SURVEILLANTS',i:'🦺'},
          {v:'dispos',       l:'Confirmés DISPO toute la période',i:'✅'},
          {v:'tous',         l:'Tout le monde',i:'👥'},

          <input type="radio" name="etarget" value="${o.v}" ${emailTarget===o.v?'checked':''} onchange="emailTarget=this.value;render()" style="accent-color:var(--rescue);width:15px;height:15px">
          <span style="font-size:15px">${o.i}</span>
          <span style="font-size:13px;font-weight:600;color:var(--txt)">${o.l}</span>
        </label>`).join('')}
      </div>

      <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:2px">3 · RÉGION</div>
      <select class="finput" style="margin:0;padding:9px;font-size:12px" onchange="emailRegion=this.value;render()">${regionOpts}</select>

      <button class="btn btn-outline" style="font-size:11px;padding:9px" onclick="navigator.clipboard&&navigator.clipboard.writeText('${emails.replace(/'/g,"\\'")}').then(()=>showToast('Adresses copiées ✓','info'))">📋 COPIER ADRESSES</button>
      `:'<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">Aucun courriel dispo pour cette sélection</div>'}
    </div>`:'<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">Choisissez une période pour voir les destinataires</div>'}
  </div>`;

// ══════════════════════════════════════════
//  VUE MOI — liste agenda scrollable
// ══════════════════════════════════════════
let agendaDays=60;

function selectDay(ds){
  if(rState==='idle'){rState='picking';rStart=ds;rEnd=null;}
  else if(rState==='picking'){
    if(ds===rStart){rState='set';rEnd=null;}
    else{rState='set';rEnd=ds;}
  } else {
    if(ds===rStart||ds===rEnd){resetRange();}
    else{rState='picking';rStart=ds;rEnd=null;}
  }
  vibe(30);
  render();
}

function applyStatus(status){
  if(rState==='idle')return;
  const end=rEnd||rStart;
  const lo=Math.min(parseK(rStart).getTime(),parseK(end).getTime());
  const hi=Math.max(parseK(rStart).getTime(),parseK(end).getTime());
  let d=new Date(lo);
  while(d.getTime()<=hi){setAvail(currentUser.id,tsKey(d),status);d.setDate(d.getDate()+1);}
  const nb=daysBetween(rStart,end||rStart);
  showToast(ICONS[status]+' '+status+(nb>1?' — '+nb+'j':''),'ok');
  vibe([60,30,60,30,60]);
  resetRange();render();
}

function clearSel(){
  if(!rStart)return;
  const end=rEnd||rStart;
  const lo=Math.min(parseK(rStart).getTime(),parseK(end).getTime());
  const hi=Math.max(parseK(rStart).getTime(),parseK(end).getTime());
  let d=new Date(lo);
  while(d.getTime()<=hi){setAvail(currentUser.id,tsKey(d),null);d.setDate(d.getDate()+1);}
  showToast('Disponibilités effacées','off');
  resetRange();render();
}

function renderFixedStatusBar(){
  const isRange=rStart&&rEnd&&rStart!==rEnd;
  const curSt=(rState!=='idle'&&!isRange&&rStart)?getAvail(currentUser.id,rStart):null;
  const active=rState!=='idle';
  return `<div id="fixedStatusBar" style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--cardSolid);border-top:2px solid ${active?'var(--rescue)':'var(--border)'};padding:10px 12px 10px;transition:border-color .2s;${active?'box-shadow:0 -4px 24px rgba(230,81,0,.15)':''}">
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-width:480px;margin:0 auto">
      ${[
        {s:'JOUR',   icon:'☀️', c:'#F39C12'},
        {s:'NUIT',   icon:'🌙', c:'#8E44AD'},
        {s:'DISPO',  icon:'✅', c:'#27AE60'},
        {s:'INDISPO',icon:'🚫', c:'#C0392B'},
        {s:'VACANCES',icon:'🏖',c:'#E67E22'},
        {s:'FORMATION',icon:'📚',c:'#3B82F6'},

          <span style="font-size:18px">${icon}</span>
          <span style="font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:.5px;font-weight:700">${s==='FORMATION'?'FORM.':s==='VACANCES'?'VAC.':s}</span>

    ${active?`<div style="display:flex;gap:6px;margin-top:8px;max-width:480px;margin:8px auto 0">

function renderMyStats(){
  if(!currentUser) return '';
  const today=new Date();
  const uid=currentUser.id;
  const periods=[30,60,90];
  const stats=periods.map(days=>{
    let jour=0, nuit=0;
    for(let i=0;i<days;i++){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const s=getAvail(uid,tsKey(d));
      if(s==='JOUR') jour++;
      if(s==='NUIT') nuit++;
    }
    return {days,jour,nuit,worked:jour+nuit};
  });
  return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px">
    ${stats.map(s=>{
      const col=s.worked>0?'var(--rescue)':'var(--muted)';
      return `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px;text-align:center">
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:${col};line-height:1">${s.worked}<span style="font-size:11px;color:var(--muted)">j</span></div>
        <div style="font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:1.5px;color:var(--muted);margin-top:2px">${s.days} JOURS</div>
        <div style="font-size:9px;margin-top:4px;color:var(--muted)">${s.jour?'☀️'+s.jour+'j':''}${s.jour&&s.nuit?' · ':''}${s.nuit?'🌙'+s.nuit+'j':''}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderCal(){
  const today=tsKey(new Date());
  const sondageBanner=renderSondageBanner();
  const myStats=renderMyStats();

  let selBar='';
  if(rState!=='idle'){
    const isRange=rStart&&rEnd&&rStart!==rEnd;

    const lbl=isRange
      ?fmtShort(rStart)+' → '+fmtShort(rEnd)
      :rStart?fmtFR(rStart):'';
    selBar=`<div style="position:sticky;top:56px;z-index:30;background:${rState==='picking'?'rgba(230,81,0,.95)':'rgba(39,174,96,.92)'};backdrop-filter:blur(10px);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.15)">
      <div style="flex:1">
        <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.7);margin-bottom:2px">${rState==='picking'?'✅ DÉBUT — TAPE LA DATE DE FIN':'✅ SÉLECTION'}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:1px">${rState==='picking'?'📅 '+fmtFR(rStart)+' …':lbl}</div>

        <div style="font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.8)">JOUR${nb>1?'S':''}</div>
      </div>`:''}
      <button onclick="resetRange();render()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer" aria-label="Réinitialiser la plage">✕</button>

  let listHtml='<div id="agendaList" style="padding-bottom:160px">';
  let prevMonthLabel='';
  const normLo=rStart&&rEnd?Math.min(parseK(rStart).getTime(),parseK(rEnd).getTime()):rStart?parseK(rStart).getTime():null;
  const normHi=rStart&&rEnd?Math.max(parseK(rStart).getTime(),parseK(rEnd).getTime()):rStart?parseK(rStart).getTime():null;

  for(let i=0;i<agendaDays;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const ds=tsKey(d);
    const isToday=ds===today;
    const dow=DAYS[d.getDay()];
    const mois=MONTHS[d.getMonth()]+' '+d.getFullYear();
    const st=getAvail(currentUser.id,ds);
    const c=st?SCOLORS[st]:'';
    const icon=st?ICONS[st]:'';
    const isWknd=d.getDay()===0||d.getDay()===6;
    const ts=parseK(ds).getTime();
    const inRange=normLo&&normHi&&ts>=normLo&&ts<=normHi;
    const isRStart=rStart===ds;
    const isREnd=rEnd===ds;
    const isSel=isRStart||isREnd||inRange;

    if(mois!==prevMonthLabel){
      listHtml+=`<div style="padding:14px 16px 6px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:${rState!=='idle'?'92':'56'}px;z-index:19">${mois.toUpperCase()}</div>`;
      prevMonthLabel=mois;
    }

    let rowBg=isToday?'rgba(230,81,0,.06)':'transparent';
    if(isSel) rowBg='rgba(230,81,0,.14)';
    else if(st) rowBg=c+'08';

    listHtml+=`<div onclick="selectDay('${ds}')" style="display:flex;align-items:center;padding:11px 16px;gap:12px;cursor:pointer;background:${rowBg};border-bottom:1px solid var(--border);border-left:4px solid ${isSel?'var(--rescue)':isToday?'var(--rescue)':st?c:'transparent'};transition:background .1s">
      <div style="width:44px;flex-shrink:0;text-align:center">
        <div style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:${isToday?'var(--rescue)':isWknd?'rgba(184,169,154,.4)':'var(--muted)'}">${dow}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;line-height:1.1;color:${isSel?'var(--rescue)':isToday?'var(--rescue)':isWknd?'rgba(184,169,154,.35)':'var(--txt)'}">${d.getDate()}</div>
      </div>
      <div style="flex:1">
        ${st
          ?`<div style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:${c}18;border:1px solid ${c}44">
              <span style="font-size:13px">${icon}</span>
              <span style="font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:${c}">${st}</span>
            </div>`
          :`<div style="font-family:'Oswald',sans-serif;font-size:10px;color:rgba(184,169,154,.3);letter-spacing:1px">— non renseigné</div>`
        }
        ${isToday?`<div style="margin-top:3px;font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:1px;color:var(--rescue)">AUJOURD'HUI</div>`:''}
      </div>
      ${isSel?`<div style="width:8px;height:8px;border-radius:50%;background:var(--rescue);box-shadow:0 0 8px rgba(230,81,0,.6);flex-shrink:0"></div>`:'<div style="width:8px;flex-shrink:0"></div>'}
    </div>`;
  }

  listHtml+=`<div onclick="agendaDays+=30;render()" style="padding:18px;text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-top:1px solid var(--border)">↓ CHARGER 30 JOURS DE PLUS</div>`;
  listHtml+='</div>';

  return myStats+sondageBanner+selBar+listHtml+renderFixedStatusBar();
}
